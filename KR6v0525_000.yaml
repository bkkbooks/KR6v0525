front:
  text: 徑山位於浙江天目山之徑路故謂之徑山唐天寶初七四二國一禪師隱居於此並行開山經宋元迄明代月林鏡禪師共八十七代高僧之經營殿宇廣建紺宇琳宮羅布其主寺為興聖萬壽禪寺唐代宗七六三七七九時僧法欽結庵於此法欽賜號國一禪師乃徑山開山祖師也代宗即其菴建寺僖宗乾符六年八七九改為乾符鎮國院宋大中祥符元年一八改賜承天禪院政和七年一一一七改徑山能仁禪寺孝宗御書額賜徑山興聖萬壽禪寺由宋迄元為禪林之冠元末兵燬明洪武間重建其下院有雙溪化城接待寺大安禪寺小徑山萬壽禪寺西徑山寺安樂寺安衆寺法華寺萬壽正續寺廣化禪寺順慶禪寺實際禪寺妙濟禪寺雲福禪院普慶禪寺等二十餘座佛教史迹林立與東西天目蔚為佛國徑山舊未有志萬曆初年有僧宗淨者刻徑山集僅載諸祖事十之二三詩文亦寥寥天啓初李燁然請宋奎光輯徑山文獻奎光自大藏檢閲諸祖之語録行事輯唐代宗宋理宗逮明高祖成祖與神宗諸制敕及歷代高僧名士之序紀吟詠之詩詞為編徑山志分門十七列祖制敕序文塔銘碑記遊記書啓偈咏名什外護殿宇靜室名勝下院古迹寺産紀事釐為十四卷此志異於一般名山志書首志列祖以徑山因祖席獨著故也列祖資料取自佛祖統載傳燈録禪宗正脈五燈會元高僧傳益以松源所藏抄本達觀禪師創刻方册藏後板移置徑山故刻藏序文輯録甚多全志條理井然搜羅完備蓋集明天啓以前徑山佛教史迹之大成也茲據國立中央圖書館藏明天啓四年一六二四原刋本景印徑山志序古今守西湖者不知凡幾惟白少傅蘇端明最著以故人以頌守輒曰白蘇嗟乎白蘇豈易言哉長公以戒禪師後身示現學士而香山亦參鳥窠有省其先後守西湖一切規為制度悉自無畏光明光中流出嗟乎白蘇豈易言哉余東鄙人也謬承兩公之後仰惟風義雅不欲見笑于湖山顧時異勢殊法微魔旺每于簿書之暇興情臨眺輒低回感嘆兩峰六橋如故也而當年之盛不可復覩因思鳥窠為欽師第一弟子而長公推悟禪師為徑山住持至今尊為十方第一代而又與寶月澄慧諸名宿交最久意者東南法席其在徑山乎顧徑山舊無全志以去省會稍遠而禪那幽杳之地鮮有過而問焉者今年首夏適餘杭博士宋君來謁詢以徑山去餘杭幾何曰一由旬耳因命往搜故實凡三閲月而稿呈首列祖次制敕次序文次塔銘又次碑記遊記及名勝等若干則凡為帙若干卷豫為披繁理緒考證而詮次之又一閲月始竟自唐宋歷元至我明千餘年間祖庭之盛衰名勝之隆替與人物代興制作彪炳稱大備矣夫春柳秋波蘭橈錦障西湖非不豔也而巨人之迹既往三生之魂不來名山法脈幾不復振自雲棲以一聲佛號續佛慧命而永明辨才諸風賴以不墜兹志而成也非敢謂于薄伽之旨有所倡導幾八十七祖一片紹法苦心猶可想見方內外士憑而弔之或者其有興乎雖然豫竊重有感焉西湖自長公以後國朝正德間楊公溫甫始一濬之已稱極難故當時謂湖有葑蘇去之湖有梗楊鋤之蓋鋤更難于去也及今而梗乃愈多余則謂清之尤急于濬夫清與鋤之難易又何如哉是縱不得覩天僖中放生之盛或者萬姓血脈不至壅閼亦五百應真之所樂觀也余何敢自附于白蘇苐以兩公所拂拭者西湖之形勝所揚扢者徑山之宗旨余亦欲兩存之而徑山則獨完固倘亦幽遠者固示人以無爭乎夫𠊓湖之人厥有佛性使兩公而在必已盡攝于無畏光明而余猶日役役焉逐梗者而清濬之為事則余其亦有魔之心也夫天啓甲子秋九月汶陽李燁然文若書于西湖之廣生天徑山志序徑山舊龍宮也自神龍施地與欽師絶類茶林二龍為商那建剎與龍柎率五伯龍衆受具摩羅尊者以故嗣法八十餘祖炳耀海內十方錙素仰之不啻如摩竭印度余少好遊每過名山弔古德應化之地未嘗不徘徊瞻仰一行作吏此事遂廢徑山去西湖不幾由旬而弗淂數向五峰𠫵巾子一喝正如子震所謂邑邑令人氣盡然猶幸陪鶴汀李公之後於古杭境內山川時時一縱吟眺譬如𣪞浩登樓庾公興復不淺致足多耳公顧念徑山震旦祖席志載缺然莫考抑亦守土之責乃命禹航學博宋元實氏搜其故事考校而刪定之凡為志若干卷示余朱受而讀之白椎也𥪡拂也掀床也痛棒也纍朝之明信與當代之涣汗也大藏之所以流通寶所之所以化現與諸大臣長者之鴻萹麗藻昭漢而回雲也挂瓢飛錫名宿如雲㝎淵空而動雷震也畸人不借幽士孤笻倚龍樹而叩天宮也墨汁生香茟花説法𠫵龍象而高法幢也雞靈而兔馴杉𠫵天而竹蔽日也五峰環峙傑閣崢嶸三千寒而雙徑杳也噫嘻真大備矣嘗考徑山自國一開山子孫相繼凡七代而蘇長公草為十方住持今六百餘年而李公始一表章之徑山與公緣豈偶哉有蘇長公而十方始得與徑山之席有公而天下始盡知有徑山之法雨公於徑山其自國一而下必個個明眼覷著先後因緣俱非偶也昔李公度謂釋迦生中國設教如周孔周孔生西方設教如釋迦夫何異同之有慨今天下多事邪術紛起白蓮無為幾同波旬瓔珞然其弊總由於正教之不眀今此志標指正法不啻揭日月於中天令人出迷途而登覺路不特名山信史已也余與同官維立陳年兄不勝贊嘆謂從此已飽啜醍醐不羡龍泉一勺矣何必親見竹箆乃解背觸哉因為之序天啓甲子重陽日新安徐文龍田仲父書於如水齋中徑山志序夫朝市山林皆可學道而古宿求道率依名山何也深巖茂林之間無人而有道凡人載其塵心以行乎山谷則泠然如滌焉及夫峰回壑轉芒間策止巍然而睹梵剎肅然而瞻寶相則又不覺胸中情緣脫落都盡若惟此可永依者至若名師大德夙有道場火盡燈傳法嗣綿邈佇立凝望雖杳不可接而松聲竹韻鳥語泉鳴皆恍然提唱之殶令人與道相視莫逆譬如師延之琴得之濮水固知桐沉絲絶之處猶有不沒其清音者藝事法事可以類求而得也徑山自國一師以來登祖籍者八十七人可謂盛矣桾松夾徑修篁繞麓入其間者杳然而深左望雲海前眺都城越山如黛赤日如圭既幽既邃亦超亦曠可謂山之能載道者矣茲胡繼法席於宗林叩禪心于雙徑者若是寥寥耶夫事有久而無記物有感而思興志者所以記事而感物者也扶策擔具走徑山之道宿諸師之院能有所得乎曷亦求諸記志之林得其書而讀之庶有以窺五峯之靈見八十七祖之心者耶汶陽李文若先生以白蘇之後身作徑山諸祖之護命又得宋元實氏慧手輯志而刪㝎之其於山靈道心兩俱無盡矣豫愧俗質幸陪清幕志成受而讀之翛翛然泠泠然不覺有如滌如脫焉與諸祖相視莫逆處力未逮而神先往矣夫亦安能於語言蕳册之中別其孰為朝市孰為山林添求道者一障耶雖然栁子有言吾病夫世之唯印組是務以相軋也孰與夫不愛官不爭能樂山水而嗜間安者則夫是志也宋元實經其始而李先生成之豫序之即世有栁子奚病哉杭李陳懋德題於西湖之思過齋徑山志序四大部洲名山不可勝紀而以佛祖著稱者惟是燕之清涼蜀之峨嵋吾浙之補陀靈鷲南屏而雙徑略禹杭臨安通東西天目之徑是東南最勝道場也自唐國一師開山至月林鏡師為八十七代稱天下徑山與少林祖庭而二諸山志余不盡見所見清涼質而詄補陀雅而博南屏秀而麗靈鷲近于俚矣獨徑山向無舊志萬曆初年有僧宗淨者刻徑山集載諸祖事十之二三僅存其名與示寂日月詩文亦寥寥戴令邑志更自簡少達觀禪師昔謀刻大藏易以書册廣為流通淡居鎧公承之與吳本如諸公恢復化城寺貯此刻板事甫就而入滅任此志者遂虗無人矣海虞宋元實氏以博雅名流偶寄官禹杭擁皋比與諸生談道論文之暇慨然是山佛法僧具備而獨無志為東南缺典爰自大藏檢閲諸祖之語録行事得十之六自唐代宗宋理宗逮我高祖成祖與神宗諸制勑而一切廢興諸緣與天下高衲道流巨公名人序紀吟詠之章輯而為志列為十有四目帙成出以屬豫序余覽之作而嘆曰燦乎備哉井井乎有倫哉是徑山中興之書也夫惟人弘道惟傑耀靈故列祖首焉不尊不信域中惟王故制勑重焉唱緣闡法文序乃宣形委神傳銘塔斯勒垂像教之範厯巗壑之美故碑記逰記次之通玄契泄祕密暢性靈故書啓偈詠名什次之蘧廬一宿金湯四固故流寓外護次之琳梵代搆支流派演故殿宇下院次之或面壁而證智或杖策以探奇故靜室名勝次之以迹象眙神理于是乎紀古迹以供養資無生于是乎紀寺産十方𠫵同萬靈標異故以紀事終焉燦乎備哉井井乎有倫哉是徑山中興之書也余嘗言王者握符御宇撫有江山不有國史則何以纂圖垂統恢萬世之業士大夫于其後人貽之以堂搆啓之以詩書不有家乘則何以振箕裘而昌門祚今天下佛子法嗣望此山者將紹明祖席奉揚宗風不有梵志則何以知法幢之所繇竪法寶之所繇傳又非徒以林壑煙霞導向平之屐履快少文之卧逰已也然則此山此志彰法詔來所與清涼峨嵋𠫵峙法畍而華藏寶函並揭日月者元實之功焉可泯哉如以山河為幻泡列祖為影像經典為糟粕庋閣此志若滅若沒非古之神明則今之狂惑者爾吾亦惡乎𡚶序之天啓甲子秋九月武林黃汝亨撰并書參閲姓氏李流芳字長蘅嘉定人王宇春字季和常熟人李縠字孟芳常熟人沈煥然字無文餘杭人聞啓祥字子將錢唐人嚴調御字印持餘杭人王道焜字昭平錢唐人時載杲字旭如常熟人釋廣來字無從華亭人釋超宗字曇衍江陵人姓氏終凡例凡志名山者類先形勝以泉石得名故徑山雖勝甲海內實以祖席獨著故首志列祖諸祖惟大慧杲禪師語録最多卷帙浩繁不能悉載今考之年譜及正法眼藏開示警切者採録數則若欲博覽其全則有專行語録在萬曆初年本山僧宗淨重刻徑山集所載諸祖事實十無二三今考之佛祖統載及傳燈録禪宗正脈五燈會元高僧傳諸藏典復益以松源所藏抄本八十七祖稱大備焉馮開之陸五臺諸先生與達觀禪師創刻方册藏板始于清涼後移置寂照再議置化城則雙徑一區遂為震旦流通法寶要地以故刻藏諸序文一一録載以識諸名宿最上願力今已悉萃于此近代名僧如憨山無幻湛然等到山説法有上堂小參等語俱不及載以有別刻專行故本山自唐宋元歷代欽賜莊田最多今已悉歸民間特存其額以俟有力者恢復云本山下院凡見舊志者雖興廢不一並載入以便稽考列祖而下即載制勑及序記諸篇以弘暢祖風繪寫名勝山靈增重故舊套圖畫形勝悉裁革名緇飛錫恆滿山谷無論異代無從徵考即近世亦莫由遍稽祗據一二𦒿宿所知者備載法侶存高風于什一云詩文多方採輯收録不齊總期于增重名山故世代前後爵里遠近悉不及序覽者諒之凡志例載土産此山惟松杉以莊嚴祖席茶笋可供養僧衆別無他物可録故不列諸名公撰述序疏詩偈等不及遍訪第據耳目經見者鋟入餘俟續載諸祖語録悉出自大藏各欵篇章悉回向祖庭俱再四印證方敢登板儼然佛祖心印逈異郡縣志籍信心君子幸無泛視以滋罪過刻板若干塊送入本山常住附大藏流通其刷印板頭規例俱照楞嚴寺定額不得增減徑山志總目卷之一列祖開山起至第七代十方住持一代起至十四代卷之二列祖十五代起至四十代卷之三列祖四十一代起至八十代列祖補遺附法侶卷之四制敕序文卷之五序文卷之六塔銘塔銘補遺卷之七碑記遊記卷之八書啓卷之九偈咏卷之十名什卷十一外護卷十二殿宇靜室卷十三名勝下院卷十四古迹寺産紀事總目終卷之一目録列祖開山大覺國一貞元祖師無上禪師法濟禪師慧滿扶禪師法警庠禪師修禪師廣燈湛禪師十方住持祖印悟禪師淨慧鄰禪師妙湛慧禪師演教賞禪師寶月方禪師澄慧淵禪師維琳無畏禪師淨慧儀禪師覺潤雲禪師玄應仁禪師普明舜禪師大悟裕禪師佛日大慧禪師妙空明禪師卷之一目録終
