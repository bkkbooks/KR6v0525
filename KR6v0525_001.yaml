body:
  text: 汶上李燁然刪定海陽徐文龍鹿城陳𢡟德訂虞山宋奎光輯列祖第一代開山大覺國一貞元祖師祖諱法欽吳郡崑山人姓朱氏世服儒業師初孕母管氏夢蓮生於戶樞折取一花繫於一帶寤乃惡葷餌既誕形貌奇偉神色瑩徹好以佛事為兒戲及冠身長七尺體備諸相立性溫柔雅好高尚服勤經史便從鄉舉年二十二州以克賦道由丹徒因遇寉林素禪師見而異之問曰子何之師曰將求仕於上京素曰雖有五等之爵豈如三界之尊耶師曰可學乎素曰觀子神觀幾於生知若肯出家必悟如來知見師聞悟識本心素乃躬為剃髮謂門人法鑑曰此當大弘吾法蔚為人師師日夜奮勵鍊行安禪領徑直之一言越周旋之三學廼請素示其法要素曰無人得我法師曰以何傳素曰我法實無可傳者師頓釋疑滯久之辤素請示所止素曰乗流而行遇徑即止遂受具於餘杭龍泉寺法崙律師後之臨安行次東北山之下見樵者問曰此何山樵曰此天目山之徑路謂之徑山亦名徑塢師憶素語廼披榛而入四顧非人居適逢苫蓋以覆𦊨罘師就之宴坐大雪經旬絕食安禪既霽獵者見之投誠歸向師誨使更業獵者毁弓矢罟網以其地結菴請就居之日餉於師他日謂獵者曰吾將隱於此山獵者曰此山神異中有龍居師勿往師曰何患焉汝宐導吾即自重岡之西至危峰之北有一石屏師坐其下凡數日有白衣老人前而致拜師曰汝何人也曰龍也師曰何為至此曰自師到此山吾屬五百皆不自安師必久住我將挈其屬而歸天目願捨所居為師卓錫之所引師南進登絕頂入五峰之間中有大湫指謂師曰吾家若去此湫當涸矣願留一穴以通天目我欲時至而衞師焉慎勿湮之言訖乃隱今之龍井是也於是雲霧晦㝠風雨連霄詰旦湫水盡涸漲沙如平地北峰之陽有庵儼然新成師知龍所創遂居之至今基陛諸草不生自是遠近鄉風悉來給奉四方禪納景從菴居滿於巖谷山左前臨海令吳貞捨別墅以蓋精舍未逾數載名震天下馬祖令人馳書書中作一圓相師開緘於圓相中作一點卻封回又令智藏來問十二時中何以為境師曰待汝回去時有信藏曰如今便回師曰傳語卻須問取曹溪有僧問如何是道師曰山上有鯉魚井底有蓬塵又僧問如何是祖師西來意師曰汝問不當曰如何得當師曰待吾滅後即向汝說唐代宗永泰初師一日坐于峰北石屏之下見一白衣人稱是天目巾子山人致禮言曰彼山神告我長安佛法有難遣我護之非僧相不足以增重法門願度我為沙彌師曰汝有何能曰能誦觀音俱胝等咒功力無比師欲騐之指坐後屏石汝能咒之令破否曰可遂叱之石裂為三今喝石巖是也師異之度為沙彌與名曰崇慧入京寓止章敬寺大曆三年戊申九月二十三日太清宮道士史華奏乞與釋氏當代名流角佛法道法勝負于時代宗留神空門道眾憤疾故有是請於東明觀架刀為梯史華登躡而上如履磴道緇侶相顧無敢躡者崇慧聞之謁開府魚朝恩朝恩為奏其事異日勑于章敬寺庭樹間梯架鋒刃銛白如霜增東明觀之梯百尺觀者如堵崇慧跣足而登至絕梯而止忻然躡而下如行平地以至蹈烈火探沸油餐鐵葉為餺飥嚼釘線為脆飴史華與道眾視之駭汗掩袂而走四眾讃仰聲若雷霆帝遣中貴鞏廷玉傳宣慰勞嘉嘆至于再三賜紫衣授鴻臚卿號曰護國三藏勑安國寺居之尋被召𡭊問師承何人慧曰徑山高道僧法欽臣之師也慧辤以未具戒不敢受紫衣之賜帝特命開壇方羯磨慧隱身壇上莫知所往帝駭異賜號性空大師時疑觀音應現救護佛法因慧之奏以禮徑山為師師名益著大曆中代宗遣內侍黃鳳持詔致師詣闕其詞曰朕聞江左有蘊道禪人德性冰霜淨行林野朕虛心瞻企渴仰懸懸有感必通國亦大慶願和尚遠降中天盡朕皈向不違願力應物現形仍勑所經州縣嚴肅舘餉勒石現存既至闕庭帝躬迎登殿設座以咨法要同弟子之禮師一日在內庭見帝起立帝曰師何以起師曰檀越何得向四威儀中見貧道帝悅謂忠國師曰欲賜欽師一名忠忻然奉詔廼賜號國一焉頃之辤歸帝曰此眾生有當度者彼眾生豈有殊乎師曰實無有法以度眾生居內僅一年每賜繒綵設御饌皆抗而不受唯布衣蔬食噐用陶匏如平時相國楊綰見而嘆曰此實方外之高士也難得而名焉崔趙公嘗問弟子出得家否師曰出家是大丈夫事豈將相之所能為趙嘆賞其言一時名公如李泌徐浩第五琦陳少游等凡三十二人皆稱門人問道以求決擇已而力辤南還舊山餞禮榮耀勑本州於徑山重建精舍度僧七人以奉巾瓶命州長吏逐月躬至問候德宗貞元五年遣使齎璽書慰勞并慶賜豐厚久之刺史請居州之龍興寺師亦暫往越之連帥憫其民新被宼願師往臨以福芘之師從其請或半年或一年如是者再復歸龍興與徑山不擇所止師將示滅于龍興先期三日告眾曰當葬吾于南庭𨻶地勿封勿樹恐妨僧徒之菜地俗壽九十二僧臈七十實貞元八年十二月二十八日也師悲願弘深見面聞名如子得母濳符密契者不知其數目之為功德山故東至海岱西及隴蜀南窮交廣北盡朔方學者靡不慕義而來志求咨決至於天龍敬向異類皈依地產靈芝空雨甘露聖燈夜現綵雲朝暉寺之玉芝巖含暉亭因名于此猛獸棲其𠊓眾禽集其室白鷴烏鴉就掌而食有二白兎馴伏靴履之上欲師足煖有一雞常隨聽法不食生命師之西也長鳴三日而絕有一麕常依禪室不他遊師之滅亦三日而𣦸貞元九年德宗賜諡號曰貞元大覺禪師塔曰天中憲宗元和十年賜豐碑比部郎中崔元翰𢰅左散騎常侍龜登書其碑在寺之西南隅師得法于鶴林素素嗣威威嗣持持嗣方方嗣巖巖嗣牛頭融融師四祖信大師天復中錢氏刻土許思兵亂發塔見二缸合藏肉身如生髮長覆面士卒悚拜而去吳越王厚禮重葬于舊塔焉第二代無上禪師禪師名鑒宗湖州長興錢氏子也祖徽禮部侍郎父晟晦德不仕師少而頴異風骨不凡挺然有抜俗志依本州開元寺大德高閒出家年二十七受具戒閒使習經業通淨名思益二經棄之遊方謁鹽官悟空禪師盡得其要領悟空賞識以為堪任大法咸通三年至天目東登徑山見舊寺自國一去後僧徒分散殆盡荒凉如傳舍師意欲追還舊觀遂駐錫焉未幾百廢具舉道望日遠學者相尋而至翕然成大法席冠於江淛門弟子傑出者洪察洪諲洪諧洪寂知名咸啟行謙行滿行真皆從上宗門爪牙先是諲以經論自負師告之曰佛祖正法直截亾詮汝筭海沙於理何益但能莫存知見泯絕外緣離一切心即汝真性諲聞而適悅即呈偈云這箇非他物元來不昧機達而全體現應處不思議師曰汝問取察師兄察曰師弟高見非吾境界諲即辤徧往諸方至大溈方悟玄旨師平時指徒語言切直類皆如此咸通七年丙戌閏三月五日集眾說法端坐而化閱世七十有四坐四十八夏門人奉全身葬于寺之西大寂巖五代梁太祖乾化五年吳越武肅王請于朝賜諡無上禪師唐之名士雲牙先生沈敬修𢰅靈龕銘并序又為之讚曰目清開風神秀發圖入丹青不差毫髮潭底無波天心印月是兮非兮師寧有說第三代法濟禪師禪師諱洪諲其先吳興烏程人也姓吳氏生而神異長而聰頴十九依無上禪師削髮二十二往嵩嶽受具初習律乗未十日而誦畢棄之游心經論機辯風生𦒿宿下之歸覲無上無上問曰汝於時中將何以報答四恩師𦬆然莫知所𡭊廢食三日無上方便慰安之師於言下有省述偈以進無上頷之具無上章未幾乃辤行脚始謁雲巖不契遂造大溈頓釋蒙滯再走石霜得末後句尋遇唐會昌沙汰眾皆悲惋師曰大丈夫鍾此厄會豈非命耶何乃效兒女子態乎大眾初復沙門相師還故里西峰院咸通七年上徑山無上委以住持事師辤甚力無上曰吳中佛法藉於子耳何辤之有開法之初眾不滿百未終歲間堂餘萬指僧問掩息如灰時如何師曰猶是時人工幹僧曰幹後如何師曰耕人田不種僧曰畢竟如何師曰禾熟不臨塲僧問龍門不假風雷勢便透者如何師曰猶是一品二品僧曰此既是階級向上事如何師曰吾不知有汝龍門僧問如霜如雪時如何師曰猶是汚𣑱曰不汚𣑱時如何師曰不同色僧問如何是長師曰千聖不能量曰如何是短師曰蟭螟眼裏着不滿其僧不肯便去舉似石霜石霜云只為太近實頭僧問如何是長石霜云不屈曲曰如何是短石霜云雙陸盤中不喝采佛日長老訪師師問承聞長老獨化一方何以薦游峰頂佛日曰朗月當空挂冰霜不自寒師曰莫便是長老家風佛日答曰峭峙萬重闕於中含寶月師曰此猶是文言作麼生是長老家風佛日曰今日賴遇佛日佛日卻問云隱密至真時人知有道不得太省無辜時人知有道得于此二途猶是時人昇降處未審長老親道自道如何道師曰我家道處無可道佛日曰如來路上無私曲便請玄音和一塲師曰任汝二輪更互照碧潭雲外不相關佛日曰為報白頭無限眾此回年少莫歸鄉師曰老少同輪無向背我家去路勿參差佛日曰一言定天下四句為誰留師曰汝言有三四我道其中一也無師因有偈曰東西不相顧南北為誰留汝言有三四我即一也無許州金明上座聞師說法頗契石霜乃曰徑山老子何敢說石霜禪我往問之彼若果合我則為渠作園頭如其不然我則掀倒禪牀先問石霜一毫穿眾穴時如何石霜云直須萬年後云萬年後如何石霜云登科任汝登科拔萃任汝拔萃後問師云一毫穿眾穴時如何師云直須老去云老去後如何師云光靴任汝光靴結裹任汝結裹明乃作禮為之治圃三年師始至是山適遭黃巢之亂巢之偏帥領卒千餘人見師師宴坐不起帥以劒揮禪牀者再師神色不動帥異之獻寶再拜而去今禪牀二劒迹猶存吳越武肅王微時師一日謂其徒曰翌日有異人至當厚禮以待之詰朝王至師乃門迎延于丈室特異於他堂眾皆訝之乃密謂武肅曰他日獨霸吳越當須護持佛法無忘此言武肅恭謝而去及立軍功收杭州執弟子禮以事於師待遇勤厚莫可為比僖宗中和二年表乞賜師紫衣方袍昭宗景福二年武肅封吳越王復表乞賜號法濟大師皆制可乾寧二年乙卯九月二十九日院前檉樹忽萎㕑內飯如金色知事白師師令鳴鍾大眾雲集乃陞座示眾曰牟尼掩足迦葉藏峰彼彼不落見聞一句莫教人說汝須急切各自知時法界雖長人世景促佛法非遠大道不迷孝順住持如吾在日久立珍重乃修書遺武肅王復命門人冲羽久住智全等遺戒曰自吾去後汝等傳噐住持凡度徒弟皆禮吾真為師兄弟相攝無忘此語三十日寅時入滅俗壽八十三僧臘六十一以元和八年癸巳歲生大和五年辛亥歲出家年一十九大和九年乙卯歲受具戒年二十三咸通八年丁亥歲住持當山至乾寧二年乙卯歲凡二十九年武肅王自為述讚四十句又諡師為建初興國大師及親號塔曰廣濟之塔開平五年辛未歲僧師烈製碑文貞明二年丙子歲立石武肅王將薨謂文穆王曰吾昔自徑山法濟示吾霸業自此發迹建國立功故吾嘗厚顧此山焉他日汝等無廢吾志其後文穆忠獻忠懿王皆不忘武肅之遺旨恩顧山門非他可竝焉第四代慧滿扶禪師秀州人四月初七日示寂第五代法警庠禪師杭州人九月三十日示寂第六代修禪師杭州人九月十八日示寂第七代廣燈湛禪師秀州人四月二十一日示寂十方住持第一代祖印悟禪師杭州人元祐五年內翰蘓公知杭州革為十方命師為一代住持三月十日示寂第二代淨慧隣禪師杭州人正月念五日示寂第三代妙湛慧禪師杭州人二月三十日示寂第四代演教賞禪師杭州人七月初五日示寂第五代寶月方禪師杭州人五月十六日示寂第六代澄慧淵禪師杭州人東坡嘗寄以詩有師住此山三十年妙語應須得山骨之句十二月十六示寂第七代維琳無畏禪師俗姓沈武康人約之後也好學能詩熈寧五年蘓軾通判杭州招住徑山大明僧問師唱誰家曲宗風嗣阿誰師曰不在然燈前亦非釋迦後云莫便是育王兒孫也無師曰神岳峰高尾閭水急問如何是大明家風師曰神鶯頂上軒坐黃鵠岫中昻首行云未審意旨如何師曰會即便會覓甚麼意旨僧珍重便去師曰聽取一偈榾㭾火殘飛白灰老僧身上白如雪地爐宴坐人不知蒼狖山西呌明月久立珍重後居邑之銅山作菴名無畏建中靖國初軾自儋耳還至崑陵以疾告老琳往問疾有詩贈答始琳之在銅山也院有松合抱郡將治屋索材將往伐之琳知之預命削皮題詩其二云大夫去作棟梁材無復清隂護緑苔只恐夜深明月下悞他千里鶴飛來縣尉至讀其詩乃止政和七年琳老朝廷崇右道教詔凡僧尼皆頂冠琳獨不受命縣遣尉諭之四月初三日師即集其徒趺坐而逝遺言以二缶覆其軀瘞山後第八代淨慧儀禪師秀州人二月初五日示寂第九代覺潤雲禪師信州人十一月三日示寂第十代玄應仁禪師台州人九月初十日示寂第十一代普明舜禪師建寧人八月初三日示寂第十二代大悟裕禪師台州人正月初一日示寂第十三代佛日大慧禪師宣州城奚氏子諱宗杲字曇晦夙有英氣年十二入鄉校一日因與同窗戲以硯投之悞中先生帽償金而歸曰大丈夫讀世間書曷若究出世法師即詣東山慧雲院事慧齊年十七薙髮具毘尼偶閱古雲門錄恍若舊習往依廣教珵禪師棄游四方從曹洞諸老宿既得其說去登寶峰謁湛堂凖禪師一見異之俾侍巾裓指以入道㨗徑師橫機無所讓堂訶曰汝曾未悟病在意識領解則為所知障堂疾革囑師曰吾去後當見川勤必能盡子機用勤即圓悟堂卒師為堂求塔銘于無盡居士無盡門庭高少許可與師一言相契下榻延之名師菴曰妙喜洎後再謁且囑令見圓悟師至天寧一日聞悟陞堂舉僧問雲門如何是諸佛出身處門曰東山水上行若是天寧即不然忽有人問如何是諸佛出身處只向他道熏風自南來殿閣生微涼師於言下忽然前後際斷悟曰也不易你得到這田地可惜𣦸了不能得活不疑言句是為大病不見道懸崖撒手自肯承當絕後再蘓欺君不得須信有這箇道理遂令居擇木堂為不𨤲務侍者日同士大夫入室擇木乃朝士止息處悟每舉有句無句如藤倚樹問之師纔開口悟便曰不是不是經半載遂問悟曰聞和尚當時在五祖曾問這話不知五祖道甚麼悟笑而不答師曰和尚當時須𡭊眾問如今說亦何妨悟不得已謂曰我問有句無句如藤倚樹意旨如何祖曰描也描不成畫也畫不就又問樹倒藤枯祖曰相隨來也師當下釋然曰我會也悟遂舉數因緣詰之師酬𡭊無滯悟曰始知吾不汝欺遂著臨濟正宗付之令分座室中握竹箆以騐學者叢林浩然歸重名振京師右丞相呂公舜徒奏賜紫衣佛日之號趨吳度夏虎丘閱華嚴至菩薩登第七地證無生法忍洞曉問湛堂殃崛摩羅持鉢產婦家因緣時圓悟詔住雲居師往省命師居第一座冬至秉拂昭覺禪師出眾問曰間掛劒時如何師曰血濺梵天圓悟于座下以手約云住住問得極好答得更奇元乃歸眾叢林由是改觀悟歸蜀師于雲居山後古雲門舊址創菴以居學者雲集久之入閩結茅于長樂洋嶼從之得法者十三人又徙小溪雲門庵紹興丁巳應張丞相魏公浚命主徑山開堂僧問人天普集𨕖佛塲開祖令當行如何舉唱師曰鈍鳥逆風飛曰徧界且無尋覓處分明一點座中圓師曰人間無水不朝東復有僧競出師約住云假使大地盡末為塵一一塵有一口一一口具無礙廣長舌相一一舌相出無量差別音聲一一音聲發無量差別言詞一一言詞有無量差別妙義如上塵數納僧各各具如是口如是舌如是音聲如是言詞如是妙義同時致百千問難問問各別不消長老咳嗽一聲一時答了乗時於其中間作無量無邊廣大佛事一一佛事周徧法界所謂一毛現神變一切佛同說經於無量劫不得其邊際便恁麼去鬧𤍠門庭即得正眼觀來正是業識𣴭𣴭無本可據祖師門下一點也用不著况復勾章棘句展弄詞鋒非唯埋沒從上宗乗亦乃笑破衲僧鼻孔所以道毫𨤲繫念三塗業因瞥爾生情萬劫覊鎻聖名凡號盡是虛聲殊相劣形皆為幻色汝欲求之得無累乎及其厭之又成大患看他先聖恁麽告報如國家兵噐豈得已而用之本分事上亦無這箇消息山僧今日如斯舉唱大似無夢說夢好肉剜瘡檢點將來合喫拄杖只今莫有下得毒手者麽若有堪報不報之恩共助無為之化如無倒行此令去也驀拈拄杖云橫按鏌鎁全正令太平寰宇斬癡頑卓拄杖喝一喝便下座少卿馮公檝問曰和尚常言不作這蟲豸為甚麽今日敗闕師曰盡大地是箇杲上座你作麽生見馮公擬議師便掌時羣寮失色馮大笑曰長老與檝佛法相見曩時師與同叅超然居士趙表之每以不宦游出世為戒時表之辟宗正師赴徑山適晤官驛師述偈見意云超然妙喜兩同叅驀地相逢各負慚我去住山君躍馬前三三與後三三明年眾將一千皆諸方角立之士師行首山令起臨濟宗憧憧往來其門如市學徒咨扣日入玄奥規䋲不立而法社肅如也給事馮公坐夏山中館不動軒日只一食長坐不臥遣道謙往零陵問訊紫巖居士謙中途打發大事及歸師于半山亭望見便云這漢和骨都換了也謙聞大驚云這些驗人處設使釋迦達摩亦不讓次年坐夏者一千七百有奇自真贊云一千七百痴衲子圍繞這個無明叟以神龍未有封號敷奏于朝蒙賜侯曰廣潤廟曰靈澤庚申剏建千僧閣參政李邴漢老作記別録是年侍郎張公九成狀元汪公應辰登山問道談格物之旨又問臨濟因緣得大自在嘗曰九成每聞徑山老人所舉因緣豁然四達如千門萬戶不消一踏而開非出常情莫知我二人落處然九成了末後大事實在徑山此瓣香不敢孤負他也明年張公以父卒登山修崇請師陞座因說圓悟謂張昭遠鐵剗禪山僧以無垢禪如神臂弓乃偈曰神臂弓一發透過千重甲子細拈來看當甚臭皮襪未幾遭論列以張坐議朝廷除三大帥事因及徑山主僧應而和之追牒責衡州先是元豐戊午師始出家慧雲院塑釋迦像有異人丁生語寺僧曰若像之毁是人嬰禍于時慧雲後昆忘丁生之讖毁像新之正此日七月至貶所時昭遠知臨川師以偈戲之曰小郡知州說大禪因官置到氣衝天常攜剗子勘禪客誰知不直半文錢昭遠戲酬偈曰小菴菴主放憨痴愛向人前說是非只因一句臭皮韈幾乎斷送老頭皮師初到衡陽諸處道友送錢米遣兩侍者往嶽山溈山散處齋僧衡人初不知是說因普說方與言宣律師問韋䭾天神世間功德何者最大曰齋僧功德最大人即聽信稍知歸向焉師居廖季繹通直之西園四方衲子雲委川會攍糧景從庵無以容十七年侍者冲密慧然錄師與衲子問答語請名師目之曰正法眼藏示眾云古人道大智無分別大用無理事如月印千江似波隨眾水且那箇是無分別底大智那箇是無理事底大用莫是問一答十辯㵼懸河是大智麽莫是麤言及細語皆歸第一義掀倒䋲牀喝散大眾欄腮贈掌拂袖便行擬議思量劈口便𡎺之類是大用麽若作遮般見解莫道我是衲僧便做他衲僧門下提破草鞋挈骨董袋底奴子也未得在善知識實悟實証而大法不明為人時未免以自悟自證處指似人瞎却人眼况無悟證學語之流瞎人眼不在言也此事大難沒量大人到這裏無插足處你小根無知魔子輩如何敢造次開大口你試靜處坐地微細揣摩你方寸裏還實到不疑之地也未若實未到我却賞你放得過把得定不受人走作遮般的喚作地獄滓十方施主一粒米一莖菜將來供給你只要你道業成就同趣佛乗求異世他生福報道業不明如何消得你諸人决欲紹繼此箇門風直須心境一如方有少分相應你莫見我說恁麽事便閉目藏睛做𣦸模樣硬差排心與境一如遮個儘你伎倆如何差排你要得真個心境一如麽直須啐地折嚗地斷拈却髑髏裏作𡚶想底將第八識斷一刀自然不着差排你不見巖頭和尚有言纔有所重便成窠臼你諸人一生在叢林參尋此事無所得者不在言也其間多有頭白齒黃坐在窠臼裏一生出頭不得都不知非向古人言句上得些滋味者以奇言妙句為窠臼于經教中聲名句義上得滋味者以經教為窠臼於古人公案上得滋味者以古人問答代語別語抑揚語褒貶語為窠臼于心性上得滋味者以三界唯心萬法唯識為窠臼于寂然無言無說處得滋味者以閉目藏睛威音那畔坐在黑山下鬼窟裏不動為窠臼于目用動轉施為處得滋味者以揚瞬目舉覺提撕為窠臼謂法不在言語上不在情識上不在舉動施為處錯認業識為佛性於此得滋味者以擊石火閃電光為窠臼如上所說皆于得滋味處有所重若無大丈夫氣槩退步知非即以所重處便作奇特想玄妙想安穩想究竟想解脫想作如是等想者佛出世亦不奈何教中謂之癡闇惑何以故為你癡故執邪為正為你闇故墮在所重處不能動轉若于心無所起于法無所著則無所重無所重則自然赤骨力地無欲無依於法自在你即今便要恁麽相應亦不難但於心平等無所𣑱著如何是𣑱著作眾生想佛想世間想出世間想求出離想求佛智想皆名𣑱著你但向欲起未起時猛著精彩一躍跳出來此心朗然獨脫纔覺恁麽便轉向上面去自然頭頭上明物物上顯得到恁麽田地亦不得采顧著若采顧著則有所重纔有所重此心即滲漏矣只名滲漏心不名平等心謂平等者善與惡等背與向等理與事等凡與聖等量與無量等體與用等遮個道理唯證者方知諸人若未證直須證取證得了方得名為真出家兒若心不正向心外取證此名出家外道不堪為種草此心廣大無分劑無邊表塵沙諸佛成等正覺山河大地萬象森羅皆不出此心此心能與一切安名立字一切與伊安名立字不得故諸佛諸祖不得已隨你顛倒著個名字喚作真如佛性菩提涅槃强立種種差別異號為你眾生界中見解偏枯有種種差別故立此差別名號令汝于差別處識取此無差別底心非是此心有差別也所以僧問馬祖如何是佛祖曰即心是佛你若實證實悟不信此心决定是佛只此即心是佛便是差別因緣佛言欲以譬喻而顯示終無有喻能喻此說箇廣大已是限量他了也况以限量心欲入此廣大境界縱然入得如持蠡酌海一蠡縱滿能得幾何然只遮蠡中之水未入蠡時即是無限量底水為你境界只如此大生滿足想故此無限量境界亦隨你噐量滿足非是大海水只有許多故佛有言譬如大海不讓小流乃至蚊䖟及阿修羅飲其水者皆得充滿此水喻心蚊䖟阿修羅喻大小差別此心體上本無若干差別汝但不起諸見識取此心種種差別亦自識得矣先聖尚不許執此心為實心外更有什麽實底物為你作障難我今拖泥帶水亦是不得已為提獎嬌兒撫憐愛子老婆心切故牽枝引蔓你莫記我說底便以為是今日恁麽說明日又却不恁麽說你纔恁麽我却不恁麽你不恁麽時我却恁麽你向那頭尋我住處只我亦自不知住處他人又如何尋得遮箇是活底門戶𣦸却見行方可入作而今學人將少分精進禮佛持誦戒身口意以為資糧希求證取有什麽交涉大似癡人埋頭向西走欲取東邊物轉走轉背轉急轉遲此是無為無漏無功用大法門若起纖毫取證心則背馳矣如何欲憑些小有為功行便擬希求所以古人見得太近故云我坐地看你究取又云我立地看你究取即不曾教你起模畫樣積功累德希望成道縱你希望得成隨成即壞徒自疲勞你莫見恁麽道了便撥無因果作地獄業以平常無事喚作無佛法知見飢來喫飯困來即眠以此為無修證以此為無功用且莫錯會好荷擔此事也須是箇渾剛打就生鐵成底漢始得豈容你小根小噐造次承當不見臨濟三問黃檗佛法的大意三度被打後得大愚點破遂忽然大悟不覺失聲云噁元來黃檗佛法無多子愚云你適來覓有過無過而今却言黃檗佛法無多子你見箇甚麽便恁麽道臨濟于大愚脇下𡎺兩𡎺愚遂托開云汝師黃檗非干吾事你諸人參禪還得恁麽也未雲菴和尚頌云資糧更不著些些岐路年深恐轉賖直下痛施三頓棒夜來依舊宿蘆花又頌臨濟悟旨云便言黃蘗無多法大丈夫兒豈自垂脇下兩拳明有信不從黃蘗付將來又端和尚頌云一拳拳倒黃寉樓一踢踢翻鸚鵡洲有意氣時添意氣不風流處也風流據遮兩箇老漢頌便可承嗣臨濟作他兒孫真不忝竊古來幸有恁麽體格如何略不着些眼腦看是個甚麽道理此事如青天白日有甚麽遮障諸方有奇特差別海蠡兒禪曲曲折折此語又是討他那語又是識破遮語又是不上他鉤線不入他圈䙡遮語又是偏正回互遮語又是尊堂有諱不敢當頭又有一種以楞嚴宗鏡臨濟偈語所說眼見耳聞無非是心更非別法引通玄峰頂不是人間心外無法滿目青山之類為證謂之根脚下事謂之基趾謂之綿密地你不妨會得好若恁麽會豈不是認物為心既是你心又要認他作麽又有一種將臨濟三玄雲門三句逐句解說以傳燈廣燈祖師言句各分門類以一塵纔起大地全收一毛頭師子百億毛頭師子現盡大地是箇解脫門盡大地是沙門一隻眼若人識得心大地無寸土山河大地明暗色空咸是妙明真心中之類配為體中玄函蓋乾坤句以三脚驢子弄蹄行鋸解秤椎火裏蝍蟟吞大蟲文殊起佛見法見貶向二鐵圍山東山水上行北斗裏藏身凡語言注解不得處便道蚊子上鐵牛無你下嘴處如此之類謂之句中玄截斷眾流句如蹋着秤椎硬似鐵蹋破草鞋赤脚走饑來喫飯困來打眠山是山水是水行但行坐但坐大盡三十日小盡二十九將如此之類謂之玄中玄隨波逐浪句豈不見汾陽和尚頌云三玄三要事難分得意忘言道易親一句明明該萬象重陽九日菊花新此老子明明為你指出臨濟骨髓却來逐句下解注謂三玄三要事難分是總頌得意忘言道易親是體中玄一句明明該萬象是句中玄重陽九日菊花新是玄中玄此是前輩中負大名望有真實悟處而大法不明無師承杜𢰅如此瞎眾生眼其餘禆販之流不在言也想汾陽老人未肻點頭在分明向你道三玄三要事難分得意忘言道易親一句明明該萬象重陽九日菊花新恁麽道了更將鉢盂安柄莫道你負大名具大辯才有大智慧便是達磨大師出來作遮般去就政好捉來活埋免致教壞人家男女一盲引眾盲問着三要却注解不得便將同德山托鉢巖頭末二句南泉斬猫猊百丈野狐歸宗斬蛇大隋燒畬趙州勘婆子勘菴主睦州擔板陳撡尚書勘僧玄沙敢保老兄未徹在洞山道即太煞只道得八成達磨隻履西歸如此之類皆謂之末後句便引洛浦云末後一句始到牢關把斷要津不通凡聖任從天下樂欣欣我獨不肻謂之我為法王于法自在任你學者逞盡神通逞盡伎倆我只一向把住不許你謂之牢關直待舉立僧住院密室口耳傳授如斯之類自毁正因返行魔說又有一種道南泉斬猫兒百丈野狐歸宗斬蛇大隋燒畬趙州勘婆子勘菴主之類謂之建立門庭本無恁麽事貴要羅籠學者又有一種以偏正回互為宗旨如洞山與雲居過水次洞山問水深多少云不濕山云麤人雲居却問水深多少云不乾謂水諱濕而當頭道濕不能回互謂之麤人雲居却云不濕是觸諱而不能回互洞山道不乾乃有語中無語何謂有語不乾是何謂無語不乾是不乾乃是濕是活語能回互不觸諱故也又以黑白圈兒作五位形相以全黑圈兒為威音那畔父母未生空劫以前混沌未分事謂之正位以二分黑一分白圈兒為正中偏却來白處說黑底又不得犯着黑字犯着黑字即觸諱矣更引洞山頌云正中偏三更初夜月明前謂能回互只言三更三更是黑初夜是黑月明前是黑不言黑而言三更初夜月明前是能回互不觸諱以兩分白一分黑圈兒為偏中正却來黑處說白底而不得犯白底消息云偏中正失曉老婆逢古鏡不言明與白而言失曉與古鏡是能回互明與白字而不觸諱葢失曉是暗中之明古鏡亦是暗中之明老婆頭白不說白而言老婆白在其中矣能回互白字故也又說正中來頌云正中來無中有路隔塵埃或云出塵埃謂凡有言句皆無中唱出便自挾妙了也無不從正位中來或明或暗或至或到皆妙挾通宗凡一位皆具此五事如掌之五指無少無剩兼中至謂兼黑兼白兼偏兼正而至何謂至如人歸家未到而至別業乃在途為人邊事亦能回互妙在體前兼中到謂兼前四位皆挾妙而歸正位謂之折合歸來炭裡坐亦是說黑處而回互黑字不道黑而言炭或者又謂曹山有言正位者即空界也一向無物偏位者即色界也內有種種諸雜萬象兼中至者捨事入理正中來者背理就事兼帶者即㝠應眾緣不隨諸有非𣑱非淨無正無偏故云虛玄要道無著真宗從上先德推此一位最妙最玄須是審詳辯明當體又說五位皆三字成句偏正上下回互而不犯中中即正位也說理說事教有明文教外單傳直指之道果如是否若果如是討甚好曹山邪又引浮山作大陽真讃曰黑狗爛銀蹄自注云此語正位中有偏位黑狗是正位爛銀蹄是偏位白象崑崙騎自注云此語偏位中有正位于斯二無礙自注云此語不墮有無二邊所以洞山云不落有無誰敢和木馬火中嘶自注云妙挾然雖妙挾而虛玄唱道者也似遮般說話須教你燒頂煉臂發誓願不得𡚶傳然後分付亦謂之末後句師舉了遂彈指云好掩彩底禪若是皮下有點血底還肯喫遮茶飯麽我且問你臘月三十日四大相將解散平昔記持學得底還回互得麽回互時還着意也無當恁麽時心識已昏如何回互既回互不得定撞入驢胎馬腹中隨業受報當此之時欲觸諱作麤人亦不可得况能敵他生𣦸耶又有商量洞山示眾云向時作麽生奉時作麽生功時作麽生共功時作麽生功功時作麽生時有僧問如何是向山云喫飯時作麽生如何是奉云背時作麽生如何是功云放下鉏頭時作麽生如何是共功云不得色如何是功功云不共向時作麽生謂趣向此事答曰喫飯時作麽生謂此事不可喫飯時無功勳而有間斷也奉時作麽生奉乃承奉也如人奉尊長先致敬而後承奉向乃功勳之所立纔向即有承奉之義答曰背時作麽生謂此事無間斷奉時既爾而背時亦然言背即奉之義蓋奉背皆功勳也功時作麽生功即用也答曰放下鉏頭時作麽生把鉏頭是用放下鉏頭是無用洞山之意謂用與無用皆功勳也亦是無間斷之義共功時作麽生謂法與境敵答曰不得色乃法與境不得成一色正用時是顯箇無用底無用即用也若作一色即是十成死語洞山宗旨語忌十成故曰不得色乃活語也功功時作麽生謂法與境皆空謂之無功用大解脫故曰不共乃無法可共不共之義全歸功勳邊如法界事事無礙是也你靣前無我我面前無你所以夾山道此間無老僧目前無闍𥠖是也如此之說皆趣向承奉于日用四威儀內成就世間出世間無不周旋謂之功勳五位你道他古人意果如是乎若只如此有甚奇特只是口傳心授底葛藤既不如是且古人意畢竟作麽生妙喜為你下箇注脚也要諸方檢點不見汾陽道面目見在一任揀取故淨名云但除其病而不除法又首楞嚴云汝以緣心聽法此法亦緣古人一言半句雖是垂慈皆在未屙已前著到如三玄三要四種料揀十智同真亦是遮箇道理妙喜恁麽說不是貶剝諸方且要箇中人辨明緇素而已又有一種也不在言語上也不在古人公案上也不在心性上也不在玄妙上也不在有無得失邊如火相似觸着便燒非離真而立處立處即真信手拈來超今越古一句來一句去末後多一句便是得便宐似遮般底只是弄箇業識癡團便謂無因果無報應亦無人亦無佛飲酒食肉不礙菩提行盗行無妨般若如此之流正是師子身中蟲自食師子身中肉永嘉所謂豁達空撥因果莽莽蕩蕩招殃禍是也有一種商量古人公案謂之針線工夫又謂之郎君子弟禪如商量女子出定語云文殊是七佛之師為甚麽出女子定不得云文殊與女子無緣罔明是初地菩薩為甚麽出得女子定云與女子有緣下語云𡨚有頭債有主又有商量道文殊不合有心所以出不得罔明無意所以出得下語云有心用處還應錯無意求時却宛然又有商量道文殊為甚麽出女子定不得杓柄在女子手裏罔明為甚麽出得如蟲禦木又云因風吹火又云爭奈女子何邪解甚者至于作入定勢又作出定勢推一推彈指一下哭蒼天數聲伏惟尚饗拂袖之類冷地看來慙惶殺人又芭蕉云你有拄杖子我與你拄杖子你無拄杖子我奪却你拄杖子商量云你若是遮般人我與你說這般話謂之與你拄杖子你不是遮般人我當面換却你眼睛謂之奪却你拄杖子下語云量才補職又云看樓打樓又有商量道有無與奪是擒縱學者似恁見解如麻似粟如上所說皆口傳心授露布葛藤印板上打來模子裏脫出非唯自𧩂亦乃𧩂他古人此是諸方學得底海蠡禪諸上座還信得及麽不見道垂慈則有法無法不垂慈識取鉤頭意莫認定盤星我遮裏是海蚌禪開口便見心肝五藏羞珍異寶都在面前閉却口時何處覓伊縫罅不是强為法本如是諸上座光陰可惜各各趂色力强健猛着精神了取莫愛他奇特奇特處賺悞人雜毒在心識裏他時後日莫道得力只死時也死得不瞥脫更說甚麽敵他生死世間無明煩惱却有限量一念識破則當體寂滅惡知惡見法塵煩惱無限量能障道眼使得你心識晝夜不停謗佛法僧造地獄業雖是善因反招惡果果有智慧大丈夫漢方識得破不被他作惱不見雲門大師有言盡乾坤一時將來着你眼𥈤上你諸人聞恁麽道不敢望你出來性懆把老僧打一摑且緩緩子細看是有是無是箇甚麽道理直饒你向遮裏明得若向衲僧門下好椎脚折若是箇人聞說道甚麽處有老僧出世便好驀面唾汚我耳目你若不是箇手脚纔聞人舉便承當得早落第二機也又不見羅山和尚有言玄門無法不立紀綱若欲討尋聲前看取諸佛子真心無定真智無邊我若縱遮兩片皮從今日說到盡未來際鉤鎖連環相續不斷亦不借他人氣力此是人人分上各自具足底事添些子不得減些子不得佛祖得之喚作大解脫法門眾生失之喚作塵勞煩惱然得亦不曾得失亦不曾失得失在人不在法故祖師云至道無難唯嫌揀擇但莫憎愛洞然明白毫𨤲有差天地懸隔欲得見前莫存順逆你禪和家箇箇念得還曾略着意理會麽祖師安箇名字謂之信心銘只要諸人信此廣大寂滅妙心決定不從人得故中間有言一心不生萬法無咎無咎無法不生不心能隨境滅境逐能沉境由能境能由境能又云大道體寛無易無難又云執之失度必入邪路放之自然體無去住你但言此一心之法不可取不可捨便好向遮裏放身命若放不得是你根性遲鈍臘月三十日不要錯怪老漢時𤍠久立喝一喝下座庚午准命移梅州至曹溪禮六祖塔十月至貶所郡守謝朝議語僚屬曰朝廷編置所謂長老者但一僧耳兵馬東偏𨻶地從其居止既而僧行日至幾數百指施鍬钁而平基址運竹木而縛屋廬聽其指呼無敢怠者守雖聞其服勤如此亦未知果何人也於是延見一二觀其能為南閩修仰書記適承命乃與從容彌月語論英發榷古商今逢原左右守復徴等伍更有蘊異能者否仰遂告以負大經論者有之博極書史者有之詩詞高妙者有之翰墨飄逸者有之其所以未能明徹則佛祖大事因緣而已是以不憚艱險隨侍而來得依仁政幸莫大焉守且駭異知其徒皆為法忘軀之士自是于師日益加敬遣子謝純粹求入道㨗徑示之以法語八篇臨安陳安常張處俊各具一百問答遣价求印證師題後略云自問自答自倒自起蚊錐鐵牛賣弄口嘴賞伊膽大來呈妙喜盡令而行埋入地底放過一著各自看取若不放過打出骨髓師遷梅六年遐陬遠俗靡不從其攝化家繪其像敬事虔肅乙亥十二月蒙恩自便答經略方公務德書云往歲南遷參隨僧行零落瘴鄉六十三人義難以忘今之所存于兹無幾間或熏爐茗盌必異于眾蓋不忘南荒朝游夕處之義也師在梅受人供養臨行菴中所有動使之物盡散與人平昔所收施利悉用辦齋遍請合郡僧道士并現任官云師離梅太守鄧公酢賔禮委官兵津發居民扶老攜幼遮道祖餞眷戀有不勝情者取道汀州時張子韶自橫浦蒙旨守永嘉師維舟俟之既見留連欵語遍賞名山聯舟東下各賦詩分袂于臨江之新淦三月被旨復僧謝恩陞座有青氊本是吾家物今日重還舊日僧珍重聖恩何以報萬年松上一枝藤丞相和國張公德遠居長沙其母秦國夫人問道于師臥疾將亟曰妙喜老師今不復見也老婆有私恩未報和公凡三走价之宐春趣師之行及至秦國捐館矣和國公語師曰先妣願供養和尚一年為報德之私遂館光孝寺之東堂明年却饒州薦福之命遂作桑梓之行中書舍人唐公文若字立夫于道自謂有所趣向每聞師有未語已前之騐立夫時召赴行在維舟謁師相見次師曰莫是子西之後否立夫曰乃大人也師曰尊丈與某昔在無盡府第相從甚久不如公有個無師自得底道理但未喫得徑山手內竹箆在立夫乃俛首感服炷香致謝遂連檣之鄂渚抵九江太守朱公請說法于能仁寺而以廬山圓通敦請住持三辤不獲因舉道顏長老補其處然後解維至宣城館于敬亭山適明州阿育王山專使至准朝命住持師住育王裹糧問道者萬二千指百廢並舉冠于今昔雲巖典牛游禪師以頌寄師云五濁海底輾屎猪躍出那邊三脚驢鐸聲既已喧四衢雲間騰踏天馬駒諦聽典牛一句子世上有你何用余寺以眾多食貧陳請海岸閒地千頃開築為田率八萬四千人結般若會人出緡錢餘竭衣盂以成丞相湯公思退敷奏詔賜其莊名般若二十八年師七十被旨遷住徑山坐夏千餘眾師之再住此山道俗欽慕如見其所親雖老引接後進不少倦一日忽厨房傾仆蓋神龍欲師興建之始師即檛鼓示眾云去歲育王方修了今日徑山又倒却雲堂大眾一時驚只有老僧渾不覺問大眾因甚不覺豈不見道不啞不聾不做大家公由是廣其址以新之建孚佑王殿及嚴像設置東坡祠像于殿之右廡己卯求退于朝纔進表即渡江之四明府尹張公偁致書差衙校挽師再歸徑山有重理舊詞連韵唱之語孝宗皇帝在普安潜藩遣內都監黃彥節命師就山中舉揚般若師說偈曰大根大噐大力量荷擔大事不尋常一毛頭上通消息徧界明明不覆藏獻上上嘉嘆之孝宗皇帝居建邸內都監黃彥節侍次誦於妙喜處所授祖師偈心隨萬境轉轉處實能幽隨流認得性無喜亦無憂上聞之理與神遇欣愜盈懷委內都監訪師請陞堂遂說偈以獻曰豁開頂門眼照徹大千界既作法中王于法得自在上甚嘉訥焉尋復請為眾說法親書妙喜庵三字及製真賛題曰文囿賛真呈妙喜師師演成四偈其引曰宗杲伏承文囿至人頒示妙喜讃大哉言乎而思惟所不能及也宗杲雖不敏演成四章謹繕寫上呈偈載語錄辛巳夏謝事徑山遂所請知省李公伯和施錢重建明月堂為師佚老之居師以衣盂重建𨕖佛堂壬午師居明月堂雖老益健以法求人接物為己任學者益親賢縉紳為道而至者無虛日孝宗皇帝即位之九月詔師問佛法大意適師臥疾特賜大慧禪師號隆興元年師七十五歲三月聞王師凱旋作偈曰氛埃一掃蕩然空百二山河在掌中世出世間俱了了當陽不昧主人公出衣盂命闔山清眾閱華嚴經七百餘部用祝兩宮聖壽保國康民六月之寧國上冢葺治還山上復取向所賜宸翰以御寶識之曰賜大慧七月十二日示微恙大眾力請說法于千僧閣以為末後垂訓師委曲付嘱其語懇勵至切于時眾皆悲歎十四日夜有大星隕于寢室之後流光有聲師微笑曰吾將行矣八月初二日凌晨法皷震裂初九日薄暮學徒識師無意于世環擁寢室師以手搖曳曰翌日始行矣至五更親書遺奏及作丞相張公德遠書以端石硯寄別丞相湯公進以外護吾宗為嘱仍書委曲以示參徒了賢請偈師高聲曰無偈便死不得也眾懇乃大書曰生也只恁麽死也只恁麽有偈與無偈是甚麽𤍠大投筆就寢吉祥而逝度門弟子八十四人嗣法自教忠而次數過百十星分棊布列剎相望皆其的子親孫潜通密證匿曜韜光唯恐有聞于世者殆不可勝數士大夫恪誠扣道親有契證如叅政李公邴等十八人摳衣與列佩服法言如內翰汪公藻等二十一人其餘空而往實而歸者眾矣是月二十日眾以全身葬于明月堂之後皇帝聞之嗟惜製師真賛曰生滅不滅常住不住圓覺空明隨物現處詔以明月堂為妙喜庵賜諡普覺塔名寶光所賜御書建閣以藏其八處九會全錄編為八十卷褒其綱要為五冊詔入大藏流行焉第十四代妙空明禪師濠州人正月十五日示寂卷之二目錄列祖真歇清了禪師佛行月堂昌禪師佛海妙空訥禪師照堂了一禪師圓悟粹禪師佛慧可庵衷禪師大禪了明禪師無等才禪師佛日普慈聞禪師寓庵潜禪師密庵傑禪師別峰寶印禪師塗毒智策禪師佛照德光禪師雲庵慶禪師佛智蒙庵元聰禪師佛日石橋宣禪師佛心浙翁琰禪師佛行少林崧禪師佛鑑無凖範禪師痴絕道冲禪師石溪心月禪師偃溪廣聞禪師荊叟如珏禪師淮海原肇禪師虛堂智愚禪師卷之二目錄終
