康里公奉師所讃觀音像于紫薇閣是夕瑞光煜然苗獠焚掠徑山丞相延至郡城雲居時詣師叩宗門玄旨一日看經次問長老何不看經師云尋行數墨為看經耶丞相無語師翻經云老僧看經去也丞相以手掩經云請為說破師云伊尹周公是阿誰做中天竺用真良公謂師嘗闡化是山請歸了幻菴尋示疾致書囑丞相外護書偈曰生死純真太虛純滿七十九年搖籃繩斷擲筆而逝是為正月二十二日第五十二代佛慧慈照正源禪師字竺遠母夢梵僧入室而生南康歐陽氏文忠公是其遠祖年二十七受具戒始見虛谷陵禪師谷以龍潭滅紙炬語問之師曰焦石可破層冰谷曰破後如何師曰探索乃知谷詰曰所知者何事師擬議谷舉杖擊之悚然默喻由是智開識融外內無礙主觀音興聖道場靈隱靈隱厄于回祿悉為灰燼師所居獨存似有神相之者主徑山時見亂兵遺骼暴露師乃焚而㙠之帝聞其賢錫以佛慧慈照普應禪師之號凡五主巨剎皆方鎮大臣遣使邀致嘗勸人念佛曰石鞏張弓三平駕箭遠公徑捷勸修行一句彌陀無別念至元十二年六月十六日預告日期書偈而化遺命塔全身于徑山弟子剪爪髮分瘞于道場舍利叢叢然生共靈異顯著如此第五十三代愚庵智及禪師字以中別號西麓蘇之吳縣顧氏父茂卿母周氏入海雲院為童子釋書儒典竝進閩國王清獻公都中見之特加賞異聽賢首家講法界觀未終章遂莞爾笑曰一真法界圓同太虛但涉言辭即成剩法乃去謁廣智于龍翔微露文采廣智大驚有嶼上人者呵曰子才俊爽若此不思負大法甘作詩騷奴僕乎無盡燈偈所謂黃葉飄飄者何謂也師舌禁不能答即歸海雲胸中如礙巨石踰月忽見秋葉飛墜于庭豁然有省雖喜不自勝不取證明眼恐涉偏執乃走見徑山山勘辨之師應答不滯山遂命執侍久之遷主藏室至正壬午行院舉師出世昌國隆教轉普慈未幾行省左丞相達識公延主淨慈復升徑山僧問語是𧩂默是誑語默向上更有事在如何是向上事師云胡孫上樹尾連顛僧問如何是賔中賔師云君向瀟湘我向秦問如何是賔中主師云常在途中不離家舍問如何是主中賔師云常在家舍不離途中問如何是主中主師云橫按鏌耶全正令太平寰宇斬癡頑一日達失帖穆爾丞相到方丈問淨名丈室容三萬二千獅子座淨慈丈室容多少師云一塵不立相云得與麼覿體相違師揭起簾云請丞相鑑相呵呵大笑云作家宗師不勞再勘師便拱茶上堂舉東山演祖示衆云祖師說不著諸佛看不見四面老婆心為君通一線師云若教頻下淚滄海也須乾上堂諸方今日開爐未免與諸人說些火爐頭話乃以拂子作吹火勢云喚作火燒殺你不喚作火凍殺你上堂一二三四五六七地水火風空覺識拈來數目甚分明明眼衲僧數不出數得出也大奇烏龜鑽敗壁雞向五更啼洪武癸丑詔有道碩師十餘人集天界寺師居其首以病不及召𡭊賜還穹窿山即海雲也戊午八月忽示疾至九月四日索筆書偈而逝其徒以遺骨藏海雲陰分爪髮歸徑山於無等才禪師塔左瘞焉壽六十八臘五十一第五十四代悅堂顏禪師明州人受度於婺之寶林寺遍參諸宿徹悟心源為東嶼之正嫡焉初住崑山之東禪轉吳門萬壽升虎林之南屏遂陟雙徑樹大法幢名聞京國遣使者再降璽書護教賜金襴法衣藩王大臣無不函香問道緇素雲臻如流奔壑師逗機開發多所霑被其接引後進和氣襲人其警策生死若震雷發蟄黃文獻公與師為方外友得敷宣般若之力師住持四大剎有四會語録金華宋公濂為之序八月二十三日示寂第五十五代宗泐禪師台之臨海人字季潭別號全室八歲從天竺笑隱欣公學佛十四剃度二十受具洪武四年住徑山太祖高皇帝詔江南有道浮屠師應召稱旨命住天界上丕建廣薦法會於蔣山太平興國寺宿齊室却葷肉不御者一月服皮辨服搢玉圭上殿面大雄氏行拜獻禮者三詔集幽爽引入殿致三佛之禮命師升座說法上臨幸賜膳無虛日每和其詩稱為泐翁十年冬詔師箋釋心經金剛楞伽三經製讃佛樂章丁巳奉使西域十五年還朝授右街善世復命育髮授以儒職師姑奉命至髮長上召而官之師再辭求免願終釋門上乃嘉歎從之賜師免官說學士宋公濂嘗讃師像曰笑隱之子晦機之孫具大福德足以荷擔佛法證大智慧足以攝伏魔軍悟四喝三玄於彈指合千經萬論於一門向上關如塗毒鼓撾之必死殺活機類金剛劒觸之則奔屢鎮名山教孚遐邇詔升京剎名溢朝紳夙受記於靈山之會今簡知于萬乘之尊雲漢昭回天章錫和於全帙寵恩優渥玉音召𡭊于紫宸屹中流之底柱轉大地之法輪信為十方禪林之所領袖而與古德同道同倫者耶二十四年以老賜歸渡江于江浦石佛寺九月初十日晨起喚侍者曰這箇聻侍者𣴭然師曰苦遂寂有全室集行於世第五十六代象源淑禪師台州人一日趨入門曰殺來了殺來了作麼生避遂坐脫是為六月初四日第五十七代復原福報禪師台之寧海人俗姓方母張氏禀父母命往杭之梁渚崇福出家時石湖美公主淨慈師往參湖器之為祝髮徑山元叟門庭嚴峻師以己事未明往咨決之叟問近離甚處師云淨慈叟云來作甚麼師云久慕和尚道風特來禮拜叟云趙州見南泉作麼生師云頭頂天腳踏地叟云見後如何師云飢來喫飯困來眠叟云何處學得這虛頭來師云今日親見和尚叟頷之次日命居侍司明年升掌藏教久之出世慈溪蘆山遷越之東山四明智門皇朝洪武初驛召道行沙門師與徑山以中及上竺日章稱赴京館天界寺屢入內庭應𡭊稱旨留三年賜還智門菴于寺東扁曰海印為終焉之計徑山虛席起師補處上堂舉一不得舉二放過一著落在第二古人恁麼說話正是抱贓呌屈東山即不然舉二不得舉一放過一著落在第七到這裏須知有向上一路始得如何是向上一路良久云莫種寒巖異草青坐却白雲總不妙上堂一葉落天下秋一塵起大地收誰謂北鬱單越不是南贍部州剛自騎牛更覓牛上堂語是𧩂默是誑還有二俱不涉者麼拍禪牀云洎合停囚長智上堂一默一語一作一止何似水銀落地僧問趙州云乞師指示州云喫粥也未僧云喫粥了也州云洗鉢盂去上堂終日著衣未嘗掛著一縷線終日喫飯未嘗咬著一粒米似地擎山不知山之孤峻如石含玉不知玉之無瑕不著佛求不著法求不著僧求拈拄杖有時乘好月特地過滄州前住山象原經始佛殿未就而終師力完之其費則出姑蘇葛德潤氏兩住徑山甫八年忽一日得疾甚革侍者請偈師叱曰吾世壽尚有三年已而果然及化之日忽拍手曰阿呵呵大衆是甚麼看取竟寂世壽八十四僧夏六十四門人奉全身窆寂照之右岡六月初四日忌辰第五十八代大宗興禪師台州人一日忽嘆曰夫三十婦六齡畢竟偶不成遂坐去是為三月十一日第五十九代止庵祥禪師杭州人守仁嘗題其畫潯陽雪意云殘雪潯陽九疊屏芙蓉華蓋望中青誰將司馬琵琶淚灑作寒江雪滿汀則精于畫可知惜今不能復見忽倚坐曰一隊噇糟漢我爭如你何不道竟寂是為十月十三日第六十代呆庵莊禪師台州人也住持徑山學者雲合說法酬問迅若疾雷有呆庵語録行於世誦師言則見轟轟然誠宗門偉人也忽於十月二十三日云難難二八嬌娘上高山老僧扶不得言竟遂寂第六十一代岱宗泰禪師紹興人王氏子依祥禪學篤行恭謹諸剎僉舉住育王後住徑山一日盥罷即坐寂第六十二代伯蘊琇禪師蘇州人通內外學跋潯津集別載師新膺徑山之命少師姚公贈詩以勸駕焉臨化倚杖而逝第六十三代敬菴莊禪師台州人自幼智慧不凡厭葷穢輕世薄塵好浮屠法出家于廣慈庵久之遍參方外了徹宗源及主徑山化道隆盛永樂十二年冬奉詔修纂大典寓天界三載姚公廣孝等交章舉住持辭還徑山開堂有四會語録行于世其嘉言善行不盡傳呆庵嘗云敬庵禪師嘗主越中二剎既來龍河全室翁以二座處之退休一室以風節自持良可尚也師嘗曰凌霄龍脉接鵬搏水領為蜂腰吾塔宜下不宜上一日含笑坐化門人奉遺言塔于水領小池之上第六十四代雷菴澤禪師蘇州人八月初五日示寂第六十五代月江禪師諱宗淨別號月清金華倪姓父景華母包氏夢神僧入臥室覺而有娠既誕有異質自幼聰慧授以佛經即能成誦十七歲從同邑正覺院文譯為祝髮師受具戒誦楞嚴經至如人以手指月是人因指當應見月豁然開悟聞雙林正庵誾禪師往謁誾一見奇之問黃檗打臨濟你作麼生師云按牛頭喫草誾即留領維那職後出世住徑山開堂說法宗風遠播壽六十七于正統壬戌三月十三日示微疾午時集衆索筆書偈云祖師門下客開口論無生老我百不會日午打三更書訖跏趺而逝七日後茶毗舌根不壞斂骨貯瓶建塔于圓照庵第六十六代雪崖珂禪師金陵人晝沐而逝第六十七代西疇頃禪師會稽人嘗作詩曰願汲龍淵一勺水為雲為雨沃枯田其擔荷大事可槩見矣嘉靖間大尹尹公入寺祝延因檢徑山舊集歲深板壞屬師補缺略捐資重刻焉一日整衣趺坐而去第六十八代宇中宸禪師金華人徑行頃坐去第六十九代傑峰英禪師金華人初為徑山首座歸鄞楚石琦禪師作偈送師有凌霄峰頭第一座摩訶衍法曾明破百非四句俱已離白雪陽春有誰和等句後為住持宗綱嚴肅一日持金剛經竟泊然而逝第七十代一清天禪師江右廬陵人也別號潔祖為歐陽族自幼頴悟異羣不茹葷酒深厭塵俗遂出家于寶禮正宗忠公授業焉宣德改元丙午得度于右街雲海法師潜侍香于大天界達會中即左街講經制授弘慈普應禪師是也隨典藏事未幾升首座開古蹟黑塔于都阜城門之西鄰朝天宮之右𠊓箇磚片瓦皆自手焉正統癸亥聞于上勑額曰弘慶禪寺即黑塔也師拔萃超羣卓卓然如野寉之在雞羣初主水月次遷南通法至開山弘慶自此道風浩蕩朝野知名正統丙寅右街善世大功德兩庵宗師等薦師于春官若大宗伯胡公及諸巨卿名公莫不推賞遂有雙徑之行覺山馮寧印施華嚴大經并函繡幡幢入殿供養一時金臺諸𣐙越沈福誠杜弘真等欣然發心鬻鐵鑄佛三軀鐘磬云板香罏花瓶若干𡭊越明年丁卯入院浙江都指揮使司張公輩敬師道行咸嘉獎助住持所履之事大有徑庭詳翰林張公序中第七十一代無極灝禪師嘉禾人誦心經坐化第七十二代宗勝㣧禪師常時禮佛一日臥去第七十三代正覺成禪師持戒精專無病而寂第七十四代用璚琚禪師禪定不懈端坐而化第七十五代竺芳蕊禪師秀州人元叟端之的孫常說法勉人忽爾坐逝第七十六代庭禮訓禪師十年不出戶飄然坐去第七十七代天才英禪師每勸人念佛念佛而終第七十八代悅山愷禪師常笑無嗔亦笑而寂第七十九代石窗珉禪師耽文證果趺坐而化第八十代月林鏡禪師杭州人師少頴異稚齡出家弱冠剃𣑱專修淨業間叩僧碩俾參本來人久乃省作偈曰本來人本來人無腦無頭作麼尋驀然揪著箇鼻孔試勘元來是白丁碩見睨視曰可是師與一摑由是名振一時正德己卯歸寂年八十六塔凌霄東崕徑山志卷之三終補遺列祖第四代慧滿扶禪師上堂舉云西方聖人為一大事故出現于世後以正法眼付囑迦葉傳至二十七世而達磨入于中國設大法藥開甘露門直接上根不立文字吾於汝等當勤而勿失耳第五代法警庠禪師開堂時集衆曰佛法不是小事老僧前日被大師一喝直得三日耳聾不覺吐舌乃舉拂頌曰蚤因無事侍師前師指繩床角上懸舉放却歸本位立分明一喝至今傳悟了游方却再還全機大用久當權若無喝下忘知解良馬何曾離得鞭下座第六代寶鑑修禪師嘗謂衆曰夫鼻祖西來不立文字直指而已時門人所謂不執文字不離文字而為道用已向第二機矣汝得吾皮之記道不在言也審矣子以為何如衆曰非也道雖不在於言而終日言于道師曰庸何傷否則一語猶以為贅也十方住持第一代祖印悟禪師本州人姓許氏世宗儒業師既冠好與名流游遂有厭塵志于是出家年二十二師于湛盡得道及內翰蘇公軾知杭州與師論及韓退之非佛云退之於聖人之道知好其名而未樂其實其論至於理而不精往往自叛其說師曰人有樂孟子之拒楊墨而以斥佛老為己功莊子所謂夏蟲不可語冰斯人之謂乎由是蘇公深契之舉師為兹山第一代住持第六代澄慧淵禪師嘗會蘇公子瞻于轉物庵時公請師為轉物庵銘曰若能轉物即同如來咄哉瞿曇誑呼癡呆物無自性我亦非有轉者為誰徒勞心手知無自性復是何物暫起情塵捫空揣骨此菴無作住者何人具頂門眼試看疏親公亦登山為師三以詩贈第十代玄應仁禪師台州人上堂舉百丈上堂有一老人常隨衆聽法衆退唯老人不退丈曰汝何人也曰吾非人於過去迦葉佛時曾為比丘因學人問大修行人還落因果否某甲答曰不落因果遂五百生墮野狐身今請和尚代一轉語貴脫野狐身丈曰汝問乃問大修行人還落因果也無丈曰不昧因果老人於言下大悟作禮曰某甲已脫野狐身住在山後敢乞依亡僧事例師令維那白椎告衆食後送人僧衆驚異食後師領衆往山後巖下以杖挑出死野狐乃依法火葬師頌曰明明道不落老人何曾錯的的言不昧玄應何曾會不會將不錯渾然宣妙覺不落與不昧卓爾標正位前機因果有來由脫體升沉無忌諱非自非是誰是言下迷宗生擬議再問重教舉一回潜觀徹底起風雷逆風喝轉雷聲絶飲氣歸家藏醜拙他日如何舉似人雄峰撐破秋天月第十六代月堂道昌佛行禪師湖州寶溪吳氏僧問大用現前不存軌則時如何師曰張家兄弟太無良曰恁麼則一切處皆是去也師曰莫唐突人好問心生則法生心滅則法滅秪如心法雙忘時生滅在恁麼處師曰左手得來右手用問如何是從上宗門中事師曰一畒地曰便甚麼會時如何師曰埋沒不少問如何是諸佛本源師曰屋頭問路曰向上還有事也無師曰月下拋甎上堂與我相似共你無緣打翻藥銚傾出爐烟還丹一粒分明在流落人間是幾年咄上堂雁過長空影沉寒水雁無遺蹤之意氷無留影之心若能如是正好買草鞋行腳所以道動則影現覺則冰生不動不覺正在死水裏薦福老人出頭不得即且置育王今日又作麼生向道莫行山下路果聞猿呌斷腸聲歲旦上堂舉拂子曰歲朝把筆萬事皆吉忽有箇漢出來道和尚這是三家村裏保正書門底為甚麼將來華王座上當作宗乘秪向他道牛進千頭馬入百匹第二十代佛慧可安衷禪師婺州人上堂舉僧問洞山寒暑到來如何回避山云何不向無寒暑處去僧問如何是無寒暑處山云寒時寒殺闍𥠖熱時熱殺闍𥠖僧又問一老宿時節恁麼熱向甚處回避宿云向鑊湯爐炭裏回避僧云鑊湯爐炭裏如何回避宿云衆苦不能到師云二老宿一人在寒暑裏垂手一人在寒暑外垂手寒暑裏垂手者不見有寒暑之相寒暑外垂手者通身是寒暑徑山恁麼道諸人還辨明得麼若辨明得南天台北五臺若辨明不得今日熱如昨日僧問教中道塵塵說剎剎說無間歇未審以何為舌師拍禪床右角一下進云世尊不說說迦葉不聞聞也拍禪床左角一下進云也知今日令不虛行師云識甚好惡次舉興化謂賔維那曰汝不久為唱導之師賔曰不入遮保社化云汝會了不入不會不入賔云總不恁麼化便打云克賔維那法戰不勝罰錢五貫設饡飯一堂來日興化自白槌云克賔維那法戰不勝罰錢五貫設饡飯一堂仍須出院雲居舜和尚云大冶精金應無變色其奈興化令行太嚴不是克賔維那也大難承當總似而今泛泛之徒翻轉面皮多少時也師云雲居恁麼道未免拗曲作直徑山即不然要作臨濟炟赫兒孫直須翻轉面皮始得宋孝宗詔師至內廷帝曰朕觀韓愈原道論文繁而理迂耳朕實非之晉成帝晦德以信道士王浮僞𢰅老子化胡經北魏明昭聽道士姜斌引關經說道老子西入化胡以佛為侍者信乎師曰佛生于周昭王甲寅滅後三百四十五年至周定王老子始生太尉蕭綜刻奏開天化胡二僞經當滅詔流馬邑蓋二僞經且無翻譯朝代豈非僞造也帝乃勑令搜聚僞本一處禁燬准前唐高宗時沙門慧澄乞依前朝勑八學士議燬及中宗勑燬化胡經并畫壁變相違者科罪帝深然之第二十二代無等才禪師杭州人邑之多寶寺正宗和尚實為厥師有僧問逼塞虛空時如何師便喝進云文殊普賢來也師云逼塞虛空何處與徑山相見僧亦喝師云文殊普賢為甚在你腳跟下過僧擬議師便打乃舉永嘉道了了見無一物亦無人亦無佛大千沙界海中漚一切聖賢如電拂有老宿拈杖云既無一物了了見底是箇甚麼師云且道遮老宿恁麼道還具眼也無第二十四代寓庵清禪師興化人中秋上堂云去年人看中秋月今年人看中秋月今年人是去年人去年月是今年月還有人向遮裏著得一隻眼麼若也著得徑山分半院與伊住其或未然歸堂喫茶師一日舉雲門道既知來處且道甚麼劫中無祖師自代云某甲今日不著便師云雲門也是作賊的心虛徑山即不然既知來處且道甚麼劫中無祖師不圖打草且要蛇驚季秋菊旦上堂今朝初九天色半晴半雨衲僧鼻孔眼睛切忌和泥合土乃顧視大衆云惺惺直是惺惺靈利不妨靈利等閒問著十人五雙不知落處不見道事因叮囑起第三十三代佛行少林嵩禪師建寧人師嘗問一僧問睦州云如何是展演之言州云量才補職如何是不展演之言州云伏惟尚饗師云睦州古佛善應來機雖然如是只得八成或問徑山如何是展演之言即向他說問十答百有甚麼難如何是不展演之言喝一喝云且莫是屎窖佛師云拆破東籬補起西壁山門下全無凖的有準的誰委悉僧堂覻破香積厨鴟吻咬殺佛殿脊第三十八代佛心荊叟珏禪師婺州人帝素慕師戒行值端平春福建觀察陳公德剛所陳於帝俄有詔自育王升住兹山始開堂乃述銘以諭曰幻身夢宅空平物色前際無窮後際寧尅出此沒彼升沉疲極未免三輪何時休息貪戀世間陰緣成質從生至老一無所得根本無明因兹被惑光陰可惜剎那不測今生空過來世窒塞從迷至迷皆因六賊六道往還三界匍匐早訪明師親覲高德決擇身心去其荊棘世自浮沉衆緣豈逼研窮法理以悟為則心境俱捐莫記莫憶六根怡然行住寂默一心不生萬法俱息新鞔法鼓嵗旦上堂新歲擊新鼓普施新法雨萬物盡從新一一就規矩普賢大士欣歡乘時打開門戶放出白象王遍地無尋處拈起柱杖云惟有遮箇不屬故新等間開口吞却法身擲下云是甚麼千年桃核裏元是舊時仁第四十七代大圓佛鑑虛谷陵禪師有僧問曰過去心不可得現在心不可得未來心不可得如何師云親不相贈僧禮拜師曰過去諸如來斯門以成就現在諸菩薩今各入圓明未來修學人當依如是法既依如是法只如過去心不可得現在心不可得未來心不可得三世既不可得作麼生依若向遮裏知歸出息不涉萬緣入息不居陰界常轉如是經百千億萬卷只如今日檀越請徑山一千七百大衆所轉者還在百千萬億卷中也無若在其中即取法相若不在其中即取非法相故經云若取法相即著我人衆生壽者若取非法相即著我人衆生壽者正當恁麼時還有定奪得出者麼若定奪不出明日來向汝說先是師貧而苦學寒暑如一早年夢入淨慈羅漢堂至東南隅忽一尊者指楣梁間詩示師云一室寥寥絶頂開數峰如畫碧於苔等間翻罷貝多葉百衲袈娑自剪裁初不諭其意及自仰山而升雙徑良驗蓋仰山有貝多葉經而徑山有楊岐衣也吁師之出處彼應真者為之前定非果位中人能致是歟第四十九代廣慈曇芳忠禪師南康人端禪師之神足也開堂示衆云雲水之人不暫休問君著甚苦來由異鄉彼此皆為客無事相干且縮頭行與住坐與臥兩片唇皮只管播是是非非誰箇無也須檢點自家過出家兒著便宜袈娑不是等間披田不耕親不養不修道業更何為𨶒老子不懡㦬據你所作因還你所受果涅槃堂裏呌阿爺要行不得行要坐不得坐正與麼時是你是我第五十代佛慈法喜南楚悅禪師隆興人上堂云聞聲悟道見色明心驀拈拄杖云遮箇是色卓一下云遮箇是聲諸人總見總聞且那箇是明底心那箇是悟底道喝一喝云貪他一粒米失却半年糧第五十六代象源淑禪師台州人開堂示衆曰善知識何名坐禪此法門中無障無礙外于一切善惡境界心念不起名為坐內見自性不動名為禪善知識何名禪定外離相為禪內不動為定外若著相內心即亂外若離相心即不亂本性自淨自定即為見性思境即亂若見諸境心不亂者是真定也善知識外離相即禪內不亂即定外禪內定是為禪定菩薩戒經云我本性元自清淨善知識於念念中自見本性清淨自修自行自成佛道第五十八代大宗興禪師台州人師舉金峰示衆云老僧二十前有有老婆心二十年後無老婆心時有僧問如何是二十年前有老婆心峰云問凡答凡問聖答聖僧云如何是二十年後無老婆心峰云問凡不答凡問聖不答聖師云余當時若見只將五祖師底𡭊他遂舉手作鵓鴿嘴云谷谷呱第五十九代止庵祥禪師杭州人師作隱龜鑑曰在塵出塵如何處身見善努力聞惡莫親縱居暗室如𡭊大賔樂情養性逢危守貧如愚不愚修仁得仁謙讓為本孤高作鄰少出為貴少語最珍學無廢日時習知新榮辱慎動是非勿詢常切責己切勿尤人抱璞刖足興文厄陳古聖尚爾吾徒奚伸安聞世俗自任天真奇哉快哉怛蕩怡神第六十代呆菴莊禪師台州人或以儒釋內外之辨問曰昔宋儒晦翁曰釋所謂心上做工夫本不是程子曰釋氏之學於敬以直內則有之矣義以方外則未有之也故滯固者入于枯槁疏通者歸於恣肆此佛教所以隘也吾儒則不然率性而已斯理也聖人於易備言之二翁之說何如師曰不然教有內外不同故造理有淺深之異求之於內心性是也求之於外學解是也故心通則萬法俱融著相則目前自昧嗚呼外求之失斯為甚矣今儒學之弊浮華者固以辭章為事純實者亦不過以文義為宗其實心學則皆罔然也宋之真儒深知其病又知吾心工夫為有本是當教本抑末以斥其言語文字之之非可也而復以心上工夫不是何自為矛盾歟本既不是何謂却勝儒者乎此其不能窮心學之理于吾佛之道深自惑亂而不能取決也觀伊川之言亦然夫既愍吾道為有內無外矣果能以內為本得本何憂于末哉繼言枯槁恣肆又愍吾道之隘是未見其大者矣既曰佛有覺之理為敬以直內復言要之亦不是皆反復自惑之言耳豈真知此理者哉若率性之說亦不出吾心上工夫必取證於易易乃心上之妙理先儒不明本心之體遂不明良知良能之所自出謂有氣而後有知乃推性命之源於氣推性為氣中之理以性循理為道故隨事隨物以明理不知天地人物形氣皆生於覺性之中而吾之本心妙明遍照已在思慮未發之時若有得於此即時中之義也失此不能少存于內徒追求于事物之末謂之義以方外豈有是哉取證于易者易言至神至聖皆指不可測不可知之地故不疾而速不行而至又以無思無為為感通之本則易所證固非外矣夫了悟之地非學解所能到悟則謂之內解則謂之外則內教外教所以不同也儒者專用力于外凡知解所不及者不復窮究故不知允執厥中之道天理流行之處皆在思慮不起物欲淨盡之時踐履雖專終不入聖人之域矣蓋因疑佛氏之迹為無父無君遂不究盡其說使孔聖之道不明乃成毁佛之過也惜哉第六十一代岱宗泰禪師紹興王氏子依祥禪學篤行謹諸剎僉舉住育王及兹山所著戒銘示衆略曰卿以出家永為死生剃髮毁容法服加形辭親之日上下涕零剖愛崇道意凌太清當遵此志經道修明如何無心故存色聲悠悠竟日經業不成德行日損穢積遂盈師友慙耻凡俗所輕如是出家徒自辱名今故誨勵宜當專精第六十二代伯蘊琇禪師姑蘇人師引羅睺羅受佛誡云十方世界諸衆生念念已證善逝果彼既丈夫我亦爾何得自輕而退屈六凡四聖同此一性彼既如是我何不然直須內外資熏一生取辦更若悠悠過日是誰之咎古德云此身不向今生度更向何生度此身第六十四代雷庵澤禪師蘇州人或問如何是和尚家風師曰金雞抱子歸霄漢玉兔懷胎向紫微僧曰忽遇客來將何秪待曰金果早朝猿摘去玉花晚後鳳銜來第六十六代雪崖珂禪師金華人師云世尊於臘月八日明星出時忽云一切衆生俱有如來智慧德相但以𡚶想執著不能證得師說頌曰瞿曇失却眼睛時雪裏梅花只一枝而今到處生荊棘却笑春風惱亂吹第六十八代宇中宸禪師金華人師示人心要云近世多以問答為禪家家風不明古人事一向逐末不反可怪可怪昔人因迷而問故問處求證人得一言半句將為事究明令徹去不似如今人胡亂問趂口答取笑達者也第六十九代傑峰英禪師金華倪氏子上堂示衆云衲僧行李豈尋常出匣吹毛不隱藏奪食驅耕全正令東西無復鬼分贓又清平世界罷干戈無奈兒曹籍甚何急水灘頭拋直釣錦鱗不遇枉多羅第七十一代無極灝禪師嘉禾人舉頭云但自無心于萬物何妨萬物常圍繞鐵牛不怕師子吼恰似木人看花鳥本人本體自無情花鳥逢人亦不驚心境如如只遮是何慮菩提道不成第七十二代宗勝㣧禪師或問佛可方東土周孔之聖孰為優劣也師曰不知雖然余少時嘗觀外典商太宰嚭問于孔子曰夫人聖人歟𡭊曰丘博識强記非聖人也又問三王聖人歟𡭊曰三王善用智勇聖非丘所知又問五帝聖人歟𡭊曰五帝善用仁義聖非丘所知又問三皇聖人歟𡭊曰三皇善用時政聖非丘所知嚭駭而問曰然則孰為聖人乎孔子動容有間曰丘聞西方有聖人焉不治而不亂不言而自信不化而自行蕩蕩乎人無能名焉據斯以言孔子深知佛為大聖也時緣未升故默識之有機故舉然未得昌言其致矣第七十三代正覺成禪師初入堂偈全提大用烏投網絶照忘機龜負圖入此門來都不是如何升降老臊胡第七十四代用璚琚禪師嘗問諸學人曰若言舍穢取淨厭此欣彼則是取舍之情衆生𡚶想若言無淨土則違佛語修淨土者當如何修衆無語復云生則决定生去則實不去又云譬如雁過長空影沉寒水雁絶遺踪之意水無流影之心第七十五代竺芳蕊禪師秀州人元叟端之嫡孫也師作讃佛傳法偈云稽首千百億化身釋迦牟尼佛三祗修鍊萬行功圓纖瑕去而法性凝清片善具而報化微妙爾後上生兜率下化王宮三十歲居道樹成佛四十九年住世教化說法三百五十度宣演八萬四千門王候外護于四海九州師僧內傳於人間天上利益廣大道法難思偈曰假使頂戴經塵劫身為牀坐遍三千若不傳法度衆生畢竟無能報恩者第七十六代庭禮訓禪師或問鎮州蘿蔔師曰鎮州蘿蔔話多年嚼著津生齒頰邊多謝趙州言語直至今猶得見南泉第七十七代天才英禪師嘗曰默堂和尚平地上湧起波濤虛空敲出木楔中人毒氣回來剛道親見寶月不知瞎劫多少人眼睛啞洎合饒舌第七十八代悅山愷禪師讃佛云六年辛苦絆蘆牙途路盤桓不到家自謂睹星成正覺依然元著眼中沙第七十九代石窗珉禪師聖節拈香罷雷震師曰震法雷擊法鼓布慈雲兮灑甘露即今法雷已震法鼓已擊慈雲已布甘露已灑事上也合理上也合事理上既合作麼生補遺終法侶附智藏禪師虔化廖氏子八歲從師二十五具戒參禮大寂與百丈海禪師同為入室皆承印記大寂遣師詣長安奉書于忠國師尋又遣送書上徑山屬連帥路嗣延請大寂居府應期盛化師回郡得大寂付授衲袈裟有一俗士問有天堂地獄否師曰有曰有佛法僧寶否師曰有更有多問盡答言有曰和尚甚麼道莫錯否師曰汝曾見尊宿來耶曰某甲曾參徑山和尚來師曰徑山向汝作麼生道曰他道一切總無師曰渠有妻否曰無師曰徑山和尚道無即得俗士禮謝而去後穆宗諡大覺禪師如會禪師始興曲江人也初謁徑山後參大寂即馬祖學徒既衆僧堂牀榻為之陷折時稱折牀會也相國崔公群出為湖南觀察使見師問曰師何以得師曰見性得師方病眼公譏曰既云見性其奈眼何師曰見性非眼眼病何害公稽首謝之公見鳥雀于佛頭上放糞乃問鳥雀還有佛性有無師曰有公曰為甚向佛頭上放糞師曰是伊為甚不向鷂子頭上放唐長慶中寂諡傳明大師鳥窠道林禪師本郡富陽人也姓潘氏母朱氏夢日光入口因而有娠及誕異香滿室遂名香光九歲出家二十一于荊州果願寺受戒後詣長安屬代宗詔國一禪師至闕師乃謁之遂得正法及南歸孤山永福寺後見秦望山有長松枝葉繁茂盤屈如蓋遂棲止其上故時人謂之鳥窠禪師復有鵲巢于其側自然馴狎人亦目為鵲巢和尚元和中白居易侍郎出守杭州因入山謁師問口禪師住處甚危險師曰太守危險尤甚白曰弟子位鎮江山何險之有師曰薪火相交識性不停得非險乎又問如何是佛法大意師曰諸惡莫作衆善奉行白曰三歲孩兒也解恁麼道師曰三歲孩兒雖道得八十歲老人行不得白作禮而退丹霞天然禪師本習儒業將入長安應舉偶禪者問曰仁者何往曰選官去禪者曰選官何如選佛曰選佛當往何所禪者曰今江西馬大師出世是選佛之場遂直造江西見祖祖曰南嶽石頭是汝師也遽抵石頭頭著槽厰去師禮謝入行者房隨次執爨役三年忽一日石頭告衆曰來日剗佛殿前草至來日大衆諸行童各備鍬钁剗草獨師以盆水浴頭于石頭前胡跪頭見而笑便與剃髮又為說戒師乃掩耳而出再往江西後杖策觀方居天台華頂三年往餘杭徑山禮國一禪師唐元和中至洛京龍門香山與伏牛和尚為友後于慧林寺遇天大寒取木佛燒火向院主訶曰何得燒我木佛師以杖子撥灰曰吾燒取舍利主曰木佛何有舍利師曰既無舍利更取兩尊燒主自後鬚墮落敬叟居簡潼川龍氏世業儒幼頴異見佛書必端坐默觀如宿習依邑之廣福院圓澄得度參別峰塗毒于徑山沉默自究一日閲萬菴語有省往育王見佛照機契自是往來十五年後走江西訪諸祖遺跡瑩仲溫嘗掌大慧之記庵于羅湖纂所聞成書發揮祖道與師議論大奇之以大慧竹箆付之久之出世台之般若遷報恩英衲爭附碩儒錢竹巖葉水心莫不推重大參真西山為江東部使者虛東林命之以疾辭乃于飛來峰北澗掃一室居十年人不敢以字稱因此北澗稱之關一室以居名曰薤室作賦以自見晚居天台委羽有二姓爭竹山不已仙居丞王君懌囑諷之乃作種竹賦一首而訟遂已所著有北澗集十九卷行世斷橋妙倫天台黃巖徐氏母夢月而孕十八落髮永嘉廣慈院見谷源道于瑞巖聞麻三斤話疑之遍叩諸方機終未凑自謂口訥耳聵不若把本修行日以誦經為業忽閲楞伽至蚊蟲螻蟻無有言說而能辦事頓然有省曰趙州柏樹子話可煞直截然不以語人還謁無凖凖以狗子因何有業識令師下語凡三十轉不契師曰可無方便乎凖以真淨所頌答之即竦然良久忽聞板聲通身汗下于是始脫然矣凖俾分座說法出世淨慈上堂荊山有玉獲得者不在荊山赤水有珠拾得者不在赤水衲僧有無位真人證得者出入不在面門驀拈拄杖橫按云會麼幽州江口石人蹲將終與大衆入室罷索筆作書辭諸山及魏國公公饋藥不受又使人問曰師生天台因甚死淨慈師答曰日出東方夜落西遂書偈而化崇嶽字松源龍泉吳氏隆興二年得度于南屏白蓮精舍初參淨慈木菴永譏所得大慧杲應庵華之法無益後見密菴傑聞不是心不是佛不是物師侍側憤激力參忽大悟曰今日方會木庵道開口不在舌頭上自後機辨縱橫出世平江澄照慶元三年詔住靈隱自後六住名山六年上章乞老帝許之退居靈隱東庵示寂塔於北高峰之原焉恕中無慍住徑山泰定初送靈石芝主淨慈遂隨例挂搭其時衆滿五百首座忠景初者德臘竝高後生多歸之慍方居學地偶于廊下見鬻文籍人就購莊子一集持歸藏主寮圍爐閲之適忠至見意甚不樂曰汝初入衆不去衣單下做工夫而反從事雜學耶且圍爐乃延客論道之所而汝檢閲外書可乎後復歸徑山二十年再到淨慈凡寮舍圍爐但見少年叢雜或吟詩或撫琴或圍棋或吮墨圖山水如是而已肯檢外書者亦無其人矧衣單下做工夫者乎嘻三思忠之言與妙喜洋嶼衆寮所揭之榜何以異大辨希陵字西白義烏何氏年十九落髮東陽資壽依東叟頴于淨慈掌內記侍石林鞏兼外記後至徑山雲峰高禪師尤敬之分座說法凛凛諸老之遺風元世祖召見說法稱旨賜號佛鑒成宗加號大圜仁宗又加號慧照至治壬戌四月十二日手書付囑說偈而逝諡大辨塔曰寶華有瀑巖集及語録行世風穴延沼禪師餘杭劉氏參南院入門不禮拜院曰入門須辨主師曰端的請師分院于左𦡀拍一拍師便喝院于右𦡀拍一拍師又喝院曰左一拍且置右一拍作麼生師曰瞎院便拈捧師曰莫盲枷瞎棒奪打和尚莫言不道院擲下棒曰今日被黃面浙子鈍置一場師曰和尚大似持鉢不得詐言不飢院曰闍𥠖曾到此間麼師曰是何言歟院曰老僧好好相借問師曰也不得放過便下參衆了却上堂頭禮謝院曰闍𥠖曾見甚麼人來師曰在襄州華嚴與廓侍者同夏院曰親見作家來院問南方一棒作麼商量師曰作奇特商量師却問和尚此間一棒作麼商量院拈拄杖曰棒下無生忍臨機不見師師于言下大徹四衆請主風穴晉天福三年開山善法禪寺今稱安樂寺為徑山接待下院法師行靖與行紹皆錢塘人同居石壁寺時韶國師法道大振初往從之國師觀其法器即使往學三觀于螺溪之席二師既偕往講求大義旦夜不息未幾所學已成乃復回石壁為衆講說前後五十年確守山林之操未嘗出游閭里吳中宿學皆服其高潔石壁在徑山後今廢桐江紹大入同里鳳山寺為沙彌私自計曰化龍之魚肻于蹄汵求生乎即上雙徑謁大辨陵久之辭歷三吳留建鄴經匡廬沂大江之西還止漢沔間名德必往參焉告之者不異徑山時復慨然嘆曰吾今而後知法之無異味也歸浙每夜敷席于地映佛前燈讀一大藏教至三過遂通其旨元至順壬申出世嚴之烏龍景德凡三坐道場至己亥八月七日鳴鐘集衆訣別斂目危坐或請書偈接筆擲地云縱書到彌勒下生寧復離此耶遂翛然而化闍維舍利如紺珠色齒牙貫珠不壞有三會語録石室祖瑛吳江陳氏齠年出家即策杖遊方初從虛谷陵于仰山聞徑山晦機道化亟來投之一見契合遂留掌記聲聞日彰出世昌國之隆教杭之萬壽明之雪竇育王謝天童平石砥問疾有偈曰是身無我病根深慚愧文殊遠訪臨自有巖花談不二青燈相𡭊笑吟吟後造一龕曰水裰日坐其中不涉世事至正癸未三月見一衰婦人叩頭請師應身為國王師曰吾不願生天王家逾十七日趺坐而化一關正逵番陽方氏參晦機機問甚處人師曰番陽機曰番陽湖水多少師曰瞪目不見底機曰恁麼則浸爛衲僧鼻孔也師曰終不借和尚鼻孔出氣機曰畢竟借誰鼻孔出氣師曰恭惟和尚萬福機肯之命克侍者元叟復命掌記出世金陵崇因帝師授以佛日普照之號朴隱瀞禪師台宗諸大老競以書聘欲令出門下師不從元叟端禪師說法雙徑山人尊之為當代妙喜師往從之入門叟厲聲一喝師若聞雷霆聲黏縛盡脫遽稽首作禮叟曰汝果何所見耶復問答三四轉皆愜叟意顧左右曰是般若位中人也遂録為子命歸侍司尋遷掌記見宋濂傳孚上座初在徑山法會一日於大佛殿前有僧問上座曾到五臺否師曰曾到曰還見文殊麼師曰見曰甚麼處見師曰徑山佛殿前見其僧後適閩川舉似雪峰峰曰何不教伊入嶺來師聞乃趣裝而邁初至雪峰廨院憩錫因分柑子與僧長慶問甚麼處將來師曰嶺外將來曰遠涉不易擔負將來師曰柑子柑子九仙清嗣慧日雅和尚間居徑山佛日命清為座元辭曰一千七百大衆皆是英傑安敢行立其前耶堅不允佛日曰只如舉一不得舉二放過一著落在第二意作麼生清曰惺惺底惺惺懵懂底懵懂日曰如何做徑山首座不得遂與衆送歸寮高峰妙禪師上見無凖于徑山凖器之提一歸何處直得東西不辨寢食俱忘一日行廊下見衆出堂不覺混入隊中至三塔閣上諷經擡頭忽覩五祖演和尚真贊云百年三萬六千日返覆元來是遮漢驀打破拖死尸之疑直得魂飛膽碎絶後再蘇何啻如放下百二十斤擔子乃三月二十二日少林忌日也布衲如玉禪師自匡廬至徑山雙溪見陸羽泉上山麓森秀遂結茅息影持鉢乞食隨緣化導自號雙溪布衲久之扶策登凌霄依巖搆室三年不下山一日遙睇吉祥峰五色瑞雲曰此中必有靈氣遂尋至峰陰之坡建寺成叢林焉後敕賜曰大安一日妙嵩禪師戲以詩悼之曰繼祖當吾代生緣行可規終身常在道識病懶尋醫貌古筆難寫情高世莫知慈雲布何處孤月自相宜師讀罷舉筆答曰道契平生更有誰閒鄉於我最心知當初未欲成相別恐誤同參一首詩投筆坐去六十年後塔戶自啓真容儼然寶徹禪師同南泉二三人謁徑山路逢一婆乃問徑山路向甚處去婆曰驀直去師曰前頭水深過得否婆曰不濕腳師又問上岸稻得與麼好下岸稻得與麼怯婆曰總被螃蟹喫却也師曰禾好香婆曰沒氣息師又問婆住在甚處婆曰秪在這裏三人至店婆煎茶一瓶携盞三隻至謂曰和尚有神通者即喫茶三人相顧間婆曰看老朽自逞神通去也於是拈盞傾茶便行資壽尼無著妙總禪師丞相蘇公頌之孫女也年三十許厭世浮休脫去緣飾咨參諸老已入正信休夏徑山大慧升堂舉藥山初參石頭後見馬祖因緣師聞豁然省悟安分庵主少與木庵同肄業安國後依懶庵未有深證辭謁徑山大慧行次江干仰瞻宮闕聞街司喝侍郎來釋然大悟作偈曰幾年個事掛胸懷問盡諸方眼不開肝膽此時俱裂破一聲江上侍郎來淨度本縣人少游獵常射孕鹿胎墮鹿母忍痛就地䑛子因摧弓折矢出家蔬食誦經三十萬言屏處山澤惠勤餘杭人嘗從歐陽修遊修稱其聰明才智尤長于詩修與蘇軾俱有詩贈之惟政禪師住餘杭山靜修時蔣侍郎堂守錢塘與師為方外友師每來謁之則跨一黃牛以軍持掛角上市人爭觀之師自若也至郡庭下牛笑語終日而去一日蔣因會客欵師清話師許之蔣喜甚明日要之則留一偈而去矣曰昨日曾將今日期出門倚杖又思惟為僧只合歸巖谷國士筵中甚不宜坐客皆仰其高韻又作山中偈曰橋上山萬重橋下水千里惟有白鷺鷥見我常來此冬不擁爐以荻花作毬納足其中客至共之清論無窮秀氣逼人秋夏好玩月盤膝大盆中浮於水上自旋其盆吟笑達旦慧靜餘杭人姓邵氏勵行精苦行止可觀顏延之嘆曰荊山之玉惟靜是焉著文翰集十卷僧瑜餘杭人姓周氏孝建二年滅度後十有四日房中生雙桐其徒以為娑羅實木因號曰雙桐沙門平南長史吳郡張辨為讃僧翼餘杭人上廬山依慧遠修學後止徑山慧辨琦禪師名梵琦字楚石嘗閲首楞嚴至緣見因明暗成無見處恍然有省歷覽羣書不假師授文句自通然膠于名相未能釋去纏縛聞元叟端禪師倡道徑山師往問云言發非聲色前不物其意何如元叟就以師語詰之師方擬議欲答叟叱之使出自是羣疑塞胸如填巨石會元英宗詔粉黃金為泥書大藏經有司以師善書選上燕都一夕聞西城樓鼓動汗如雨下拊几笑曰徑山鼻孔今日入吾手矣因成一偈有拾得紅爐一點雪却是黃河六月冰之句翩然南還再入雙徑元叟見師氣貌克然謂曰西來密意喜子得之矣來復字見心豐城人始從笑隱出家後參南楚悅于徑山得其心要幼有聲價洪武三年詔十大高僧于萬機之暇應宣說法大愜皇情遂賜金襴袈裟并御食十五年升僧録司左覺義與諸大臣結方外交有𣽃游集行世懷玉用宣四明彭氏子幼為僧徑超叢席侍泐潭于黃檗值潭晚參有云一葉飄空便見秋法身須透鬧啾啾師聞領旨潭為證據後依大慧慧亦謂其類己以是名卿巨公列剎迎禮不就嘗有頌大愚答佛話曰鋸解稱鎚出老杜詩香稻啄殘鸚鵡粒碧梧棲老鳳凰枝薦福本禪師紹興十年首衆僧於徑山有偈示聰上座曰毒蛇猛虎堂前立鐵壁銀山在後橫進既無門退無路如何道得出常情聰還鄱陽取道徽州謁太守吳元昭因出似之吳曰毒蛇猛虎空相向鐵壁銀山謾自橫長笛一聲歸去好更於何處覓疑情吳與本以同參契分更唱迭和若非透脫情境安能爾耶無趣如空禪師秀水人姓施氏棄家參訪得法于野翁曉禪師嘗駐錫傳衣庵有語録行于世無幻性冲禪師秀水人姓張氏參無趣懇求捷徑趣誨以教外別傳之旨即欲出家母不聽後母終始剃𣑱欲結庵徑山辭趣趣囑曰子緣在水邊今姑從汝志趣欲焚棄生平所作偈頌師乞稿以集之既就往見趣問曰子向在甚麼處師曰徑山做得甚麼事曰某甲買得一假田收得原本契書請和書僉押即將集本呈上趣展看曰這箇是我底汝底聻師曰和尚莫搶奪行市趣擲下師即趨出已而呈四偈趣曰是汝作底麼師曰辜負和尚不少趣點首遂傳衣法趣入滅後師復住徑山三年因思水邊之囑下山禁足圓明三年復應車溪之請居二十年萬曆庚戌徑山請師主禪期不赴次年復請不得已赴之未幾脾疾作歸車溪囑後事端坐而逝闍維奉靈骨塔于徑山達觀真可禪師吳江人塔于文殊臺詳塔銘雲栖蓮池宏禪師錢塘人每歲以衣鉢之餘散給常住及諸靜室嘗曰相傳大慧杲老大悟一十八遍小悟不計其數愚按學道人時有覺觸謂之有省乍而省未大徹也則名小悟容或多遍至于大悟則世尊夜見明星而廓然大悟是一悟盡悟不俟二三矣即如諸祖有直至如今更不疑者有從此安邦定國天下太平者有元來黃檗佛法無多子者雖未至佛亦皆大悟也而必重重纍纍如是則向之不疑者當更起疑矣向之太平者當更變亂矣向之無多子者當更缺少矣云何得稱大悟若夫無明雖斷猶欲斷最後窮微至細之無明公案雖透猶欲透最後極則誵訛之公案則幾畨大悟者容有之但不應多之至于一十八遍也又云妙喜云若是乾屎橛如是說得落時如鋸解稱槌麻三斤狗子佛性等皆可如是說得既不可如是說須是悟始得你若實得悟師家故言不是亦招因果不小學者當切記妙喜此語息却口頭三昧而求實悟古道禪師笑巖弟子為刻笑巖集行于世創靜室于文殊臺力參大事徑山靜室之盛自師始梅谷禪師又號含輝華亭人初住寂照能詩後返嘉禾過三過堂看東坡詩歸本覺寺遂坐化密藏道開禪師達觀弟子馮開之太史及諸縉紳輩請住寂照主刻方冊大藏詳緣起幻豫法本禪師達觀弟子同密藏主刻大藏詳請啓幻居真界禪師嘉禾人住文殊臺著楞嚴纂注化儀如顯禪師嘉禾人大千宗主法子少林書記八年後住徑山惟一室入寂塔于此儀丰方彖禪師蘷州人年十八參金佛山雲庵和尚令參如何是鬼神覻不破之機三年有省出峽依京師辨融和尚住有年生死大事猶未釋疑遂復南詢登徑山結茆于寂照之後十餘年深究三玄三要之語一日午炊聞甑中作聲忽大徹作釋疑頌曰三玄三要沒來由用盡機思無處求窗前移步灶前下白雲青嶂齊點頭齊點頭南嶽天台共一疇又曰二八女子嫁新郎績麻撚線一如常稱家豐儉隨時過懶插堂前這炷香憨山德清禪師先禮徑山後入五臺遣嶺南還南嶽復會葬達觀于徑山有小參及開示禪人諸語門人為刻雙徑録行于世洞聞法乘禪師晚又號雪柏吳江人嘗登山頌古有雪柏語録行于世後終于虞山之破山寺𣽃居法鎧禪師江陰人先住寂照後恢復化城詳見緣起諸詩文萬松禪師塔于菖蒲田詳塔銘月亭禪師塔于菖蒲田詳塔銘寒灰如奇禪師先住寂照後寂蘇州瑞光寺仍塔徑山倡虞山瞿元初純仁捐資刻西方合論標注行于世瓶陶聞谷印禪師湖州人先住徑山之白雲庵後復于觀音閣結禪期三年一時究心之士多蒙證可後復念諸方參禮徑山自瓶窰而至者絶無寄息之地因覓真寂故趾捐資倡信施創真寂禪院不日落成歸者雲集師因避入閩中後瓶窰諸學人得師所在相率虔請不得已復歸真寂至今稱東南叢林第一焉湛然圓澄禪師紹興人萬曆乙卯登山上堂有語録行于世鶴林大寂禪師嘉定人先結茆徑山後登匡廬歷五臺返杭州之蓮居參究惟識有省常熟瞿元初王季和錢受之諸公請住藤溪因倡導虞山焉漢月法藏禪師無錫人初住徑山寂照檢視大藏後創禪期于常熟之三峰有山居詩及諸法語行于世卷之四目録制勑唐代宗迎國一大覺禪師敕宋理宗蠲免徑山和糴指揮劄又帖明太祖高皇帝賜徑山宗泐免官說成祖文皇帝敕諭神宗顯皇帝敕諭附進大慧禪師語録奏劄釋蘊聞序文正法眼藏序吳潜古鼎和尚四會語録序宋濂悅堂禪師四會語録序宋濂重刊寂照和尚四會語録序宋濂愚庵禪師四會語録序宋濂送月江禪師住持徑山寺貝秦重刊鐔津文集後序琇禪師癡絶禪師語録序尤𤋾贈一清和尚住徑山序張益徑山集序李照重刊徑山集序方一重刊五燈會元募緣文陸光祖徑山志序釋德清化陽和王捨田疏釋了明題傳衣庵緣冊陸光祖重建大殿募疏沈季文徑山佛殿緣起釋真可議復化城緣引馮夢禎題重興化城接待寺疏吳用先重興化城寺疏黃汝亨募植松杉引釋廣印西方合論標注跋釋如奇卷之四目録終
