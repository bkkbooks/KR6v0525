body:
  text: 汶上李燁然刪定海陽徐文龍鹿城陳𢡟德訂虞山宋奎光輯列祖第四十一代藏叟禪師名善珍泉州南安縣呂氏子年十三依郡之崇福寺南和尚落髮十六遊方至杭受具足戒謁妙峰善公于靈隱入室悟旨後出住里之光孝升承天繼遷安吉之思溪圓覺福之雪峰復以朝命移四明之育王臨安之徑山師示衆云古者道知之一字衆妙之門又有道知之一字衆禍之門只者二門入得更須出得三世諸佛出不得歷代祖師出不得天下老和尚出不得何故變鐵成金易變金成鐵難上堂盡大地是紫磨金身諸人終日開眼覻見釋迦老子心肝舉步築著釋迦老子鼻孔說有說無是誑說生說滅是𧩂說即心非心是𡚶不誑不𧩂不𡚶春風吹落桃李花淡烟踈雨籠青嶂上堂春雪寒春宵短古佛心破燈盞正法眼乾紙撚抖擻精神只管看看到北斗西移南斗東轉上元依舊正月半上堂靈雲見桃花悟去玄沙道敢保老兄未徹香嚴聞擊竹悟去仰山道祖師禪未會禪和十箇五雙道我此一門全無肯路亦未知靈雲香嚴在要知二大老麼醉我落花天借他絃管裏又據室云這裏便是問訊燒香了來老僧身邊立地底所在麼呆子你自鈍置猶可莫來鈍置老僧嘗自題其像云參禪無悟識字有數眼三角似燕山愁胡面百摺如趙婆呷醋一著高出諸方敢道飯是米做送忍書記偈云鬢絲不可織寒衣煮字那能療得飢別欲語君安樂法正𢗅却未有閒時師生于宋紹興甲寅十月十二日示寂于嘉定丁丑五月二十一日世壽八十三僧夏六十塔全身于南院第四十二代虛舟普度禪師維揚江都人姓史氏稍長雖習世書絶無處俗意母識其志俾依郡之天寧出家會與畢將軍再遇共語大奇之曰此兄短小精悍音吐如鍾他日法中向上爪牙也攜歸武林禮東堂院祖信為受業師侍信左右五年奮志參方初見鐵牛印于靈隱已而江東西河南北悉偏歷焉時無得唱道饒州薦福師决志叩請其遷福嚴華藏亦與之俱偶入室次得問不與萬法為侶者是甚麼人師曰金香爐下鐵崑崙得曰將謂這矮子有長處見解只如此師曲躬作禮曰謝和尚證明若天童晦巖光大慈石巖璉虎丘石室迪一見器異留與法務淳祐初制府趙信菴以金陵半山請出世遷潤之金山潭之鹿苑撫之疏山蘇之承天景定間太傅賈魏公奏補中天竺復請旨升靈隱至元丁丑被命徑山上堂邪人說正法正法悉皆邪正人說邪法邪法悉皆正卓柱杖一下邪耶正耶又卓柱杖一下說耶不說耶向這裏揀辦得出黃金為屋未為貴玉食錦衣何足榮上堂萬法是心光諸緣惟性曉本無迷悟人只要今日了既無迷悟人了箇什麼卓柱杖一下千言萬語無人會又逐流鶯過短墻上堂舉雲門和尚示衆云汝等諸人在此過夏山僧深不欲向你道惜取毛好師云雲門靈龜曳尾拂跡跡生靈隱即不然汝等諸人在此過夏山僧直截向你說口是禍門上堂舉臨濟和尚道有一人論劫在途中不離家舍有一人離家舍不在途中那箇合受人天供養師云兔馬有角牛羊無角寸毫尺𨤲天地寥廓潘閬倒騎驢攧殺黃畨綽師住徑山值火餘志圖興復將有緒俄示微恙索筆大書曰八十二年駕無底船踏翻歸去明月一天全身塔寺東十里𦊱罳塢之陽四月二十四日示寂第四十三代雲峰妙高禪師福之長溪人也家世業儒母阮夢池上嬰兒合爪坐蓮華心手捧得之覺而生師因名夢池幼而神彩秀發嗜書力學尤耽釋典願學出世法依吳中雲夢澤公繼受具戒師鋭意在道首參癡絶次見無凖凖尤器重尋之育王見偃溪入室掌藏鑰一日溪舉譬如牛過窗𣠄頭角四蹄都過了因甚尾巴過不得師劃然有省即答曰鯨吞海水盡露出珊瑚枝溪云也只道得一半後出世南興大蘆遷江陰勸忠霅川何山後蔣山虛席奉朝命居之歷十有三載衆踰五千指德祐改元寺被兵軍士有迫師求金者以刃擬師師延頸曰欲殺即殺吾頭非汝礪刃石辭色了無怖畏軍士感動擲刃而去丞相伯顏見師加敬施牛百齊糧五佰寺賴以濟至元庚辰遷徑山寺罹回祿草創才什一師究心興建不十年悉還舊觀示衆前念是凡後念是聖一刀兩假更莫遲回是以涅槃會上廣額屠兒放下屠刀便言我是千佛一數雖然若無舉鼎拔山力千里烏騅不易騎示衆言前辨旨句下明宗東計山熾然說法湛瀆水轉為流通這裏搆得未免相鈍置若是尚存觀聽擾擾匆匆晨雞暮鐘上堂聲色為無生之鴆毒受想乃至人之坑穽者般說話阿誰不知然粗餐易飽細嚼難飢上堂世界未形乾坤泰定生佛未具覿體全真無端鏡容大士鷹巢躍出擘破而皮早是遭人描邈那更缺齒老鬍不依本分遙望東震旦有大乘根器迢迢十萬里來意在攙行奪市直得鳳堂鼓響阿閣鐘鳴轉喉觸諱插腳無門合國難追重遭訐露新蔣山迫不得已跨他船舷入他界分新官不理舊事畢竟如何拍禪牀云戍樓靜貯千峰月塞草間鋪萬里秋上堂五峰峭峙到者須是其人一鏡當空無物不蒙其照祖師基業依然猶在衲僧活計何曾變遷著手不得處正要提撕措足無門時方堪履踐直得山雲淡濘澗水潺湲一曲無私萬邦樂業正恁麼時功歸何所車書自古同文軌四海如今共一家至元戊子春有譛毁禪宗者師嘆曰此宗門大事吾當忍死爭之遂趨京敕集諸徒廷辨上問禪以何為宗師進前奏云禪也者淨智妙圓體本空寂非見聞覺知之所可知非思量分別之所能解上又云禪之宗裔可歷說歟師云禪之宗裔始于釋迦世尊在靈山會上拈起一枝金色波羅花普示大衆惟迦葉微笑世尊云吾有正法眼藏涅槃妙心分付迦葉由此歷代佛祖授受而至菩提達磨達磨望此東震旦國有大乘根器航海而來不立文字直指人心見性成佛是為禪宗也上嘉嘆之師因從容奏云禪與教本一體也譬如百千異流同歸于海而無異味又如陛下坐鎮山河天下一統四夷百蠻隨方而至必從順承門外而入到得黃金殿上親覩金顏方可謂之到家若是教家只依著文字語言不達玄旨猶是順承門外人若是禪家雖坐破六七箇蒲團未得證悟亦是順承門外人謂之到家俱未也是則習教者必須達玄旨習禪者必須悟自心如臣等今日親登黃金殿上面覩金顏一畨方可稱到家人也上喜賜食陛辭南歸示衆云我本深藏巖竇隱遁過時不謂日照天臨難逃至化又云納被蒙頭萬事休此時山僧都不會徑山復灾師謂衆曰吾負此山債耳遂竭力再營建匯殿坡為池他屋以次而成癸巳六月十七日書偈而逝壽七十五臘五十九葬寺之西麓第四十四代虎巖伏禪師淮安人至元二十一年甲申正月己卯帝御大明殿受朝賀因問南禪才者右相和禮霍孫首舉師師作偈以進其略曰過去諸如來安住祕密藏現在十方佛成道轉法輪未來諸世尊一切衆生是由妄想執著結煩惱蓋纒迷成六道身虛受三塗苦唯念過現佛不敬未來尊與佛結冤讐或烹宰殺害不了衆生相全是法性身昔有常不輕禮拜於一切言我不輕汝汝等當作佛若能念自他同是未來佛現世增福壽生生生佛國帝覽悅而問曰戒勿殺有道者試為朕言之師奏𡭊曰有宋仁宗皇帝一日語羣臣曰朕夜來飢甚思欲燒羊羣臣奏曰陛下何不宣付有司辦之仁宗曰朕偶飢思爾慮為常例寧忍一時之飢不忍啓無窮之殺殿下皆稱萬歲上嘉納即受帝師戒七月初二日示寂第四十五代本源善達禪師仙居柴氏早年與及庵信行腳誓不歷職往江西見雪巖于仰山隨衆入室無所省發後歸仙居里人請主多福棄去游湖南主福嚴尋還浙西見徑山雲峰入室有省峰印可之適慧雲虛席命師補處後住保寧淨慈徑山皆有成績可紀師凡住處不設臥榻夜則焚香然燭安坐至旦率以為常又體所禀與人異遇嚴寒則衣絺綌大熱則衣繒絮以餘資建大圓院於東路半山接待雲侶一日自知時至會衆敘平生行腳事畢須臾端坐而寂是為十二月十八日第四十六代佛智晦機禪師諱元熙族豫章唐氏世業儒西山明覺院明公乃師之族叔父聚其宗族子弟教之世典師與兄元齡俱從進士業元齡既登第師年十九遂從明公祝髮將遊方其母憐之私具白金為裝師謂財足喪志即善辭母不持一錢以行聞物初觀禪師闡化玉几往依之物初與語驚異留侍左右後謁東叟頴公於南屏命掌記至元間總統揚璉真加奉旨取育王舍利塔進供養乃親詣師求記述舍利始末因招與俱師辭曰我有老母兵後存亡不可知遂歸江西則元齡先以臨江通判從文丞相起兵死獨母在堂師奉之以孝聞元貞二年出世應百丈之請居十二載法席振典至大初應淨慈請入寺日行中書省行宣政院官屬俯伏迎請發揚宗旨四方英衲一時輻凑上堂雲門道箇普字盡大地人不奈何殊不知雲門四稜踏地當時若與震威一喝待此老惡發徐徐行箇問訊道莫怪觸忤好非徒扶起此老管取話行天下上堂舉太原孚上座聞角聲悟道話頌曰琴生入滄海太史游名山從此楊州城外路令嚴不許早開關上堂三界無法何處求心白雲為蓋流泉作琴古今無間誰是知音擊拂子云一曲兩曲無人會雨過夜塘秋水深上堂獨坐大雄峰寒灰撥不紅一星熒火出孤寉過遼東結制上堂以手作結布袋勢云南山今日結布袋口了也汝等諸人各各於中身心安居平等性智忽有箇衝開碧落撞倒須彌底莫道結子不堅密良久云縵天網子百千重居七載遷徑山閲三月師杖策歸南屏山下復起之不往也江西學者聞師退間咸傾誠法味以致百丈大仰之徒爭來請師師辭不獲已遂返仰山居三年將示寂手書與所往來作偈示衆擲筆化去延祐六年閏八月十有七日也壽八十二臘六十三大仰之下有金雞石者建塔葬焉又分爪髮塔于淨慈之西隱以存詹敬之所嗣法者有笑隱欣石室瑛仲芳倫云第四十七代大圓佛鑑虛谷陵禪師時右丞相和禮霍孫言於帝師曰江南禪丈虛谷陵者國寶也一日帝師奏帝賜大圓佛鑑之號詔住兹山四月十二日示寂第四十八代佛日元叟端禪師諱行端族臨海何氏世業儒母陳氏師生而秀拔幼不茹葷年十二從族叔父茂上人得度於餘杭之化城院十八受具戒一切文字不由師授自然能通初參藏叟和尚於徑山叟問汝是甚處人師云台州叟便喝師展坐具又喝師收坐具叟云放汝三十捧參堂去師于言下豁然頓悟即延入侍司叟告寂師至淨慈依石林鞏公即處以書記室尋以靈隱山水清勝往挂錫焉師嘗自稱寒拾里人橫川珙公在育王以偈招曰寥寥天地間獨有寒山子師竟不渡江而謁覺菴真公於承天復參雪巖欽公於仰山巖問何處來師云兩浙巖云因甚語音不同師云合取臭口巖云獺徑橋高集雲峰峻未識書記在師拍手云鴨吞螺螄眼睛突出巖笑顧謂侍者點好茶來師云也不消得居三歲而巖逝乃還浙右大德庚子出世湖州之資福學徒奔凑名聞京國敕旨賜慧文正辨禪師中書平章事張閭公任行宣政使首舉師主中天竺開堂之日公率僚屬親臨座下皇慶壬子遷靈隱有旨設水陸大會于金山命師升座設法拈香畢乃云盡不可說不可說微塵數世界是箇金剛正體淨裸裸絶承當盡不可說不可說微塵數世界是個寶覺真心赤灑灑無空闕如天普蓋似地普擎如日普照如風普吹無一時不遍無一處不周無一理不圓無一事不具塵塵剎剎八面玲瓏物物頭頭十方通暢拈一莖草作丈六金身將丈六金身作一莖草腹中現百億𨶒浮提室內湧三萬二十獅子座七縱八橫千變萬化左之右之無可不可三世諸佛以此正體以此真心坐寶蓮花成等正覺津濟四生梯航九有六代祖師以此正體以此真心開甘露門廣度羣品啓迪盲聾炳耀癡昧奕世人王帝主以