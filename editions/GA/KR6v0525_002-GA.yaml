body:
  text: 汶上李燁然刪定海陽徐文龍鹿城陳𢡟德訂虞山宋奎光輯列祖第十五代真歇清了禪師左綿雍氏師叅丹霞霞問如何是空劫以前自己師擬對霞云你鬧在且去一日登鉢盂峰豁然契悟歸白霞霞掌云將謂你知有師便禮拜師一日因丹霞陞堂云日照孤峰翠月臨溪水寒祖師玄妙訣莫向寸心安便下座直向前云和尚今日謾某甲不得也霞云試舉我今日底看師良久霞云將謂你瞥地師拂袖便出師出世真州長蘆遷四明寶陀台之天封閩之雪峰詔住兹山師一日看厨下煮麵忽桶底脫麵潑地上眾皆失聲云可惜師云桶底脫自合歡喜因甚却煩惱僧云和尚即得師云灼然可惜一桶麵師問僧云你死後燒作灰撒了骨頭向什麽處去僧便喝師云好一喝只是不得飜欵僧又喝師云公案未圓更喝始得僧無語師便打云這死漢師一日普請路逢一僧師以拄杖指地上竹擔僧拈起云短些子師劈脊打云這裏是什麽所在說長說短師嘗作無盡燈記曰東平打破鏡已三百餘年龍潭吹滅燈復四百餘載後代子孫迷於正眼以謂鏡破燈滅而不知行住坐臥放大光明燈未曾滅也見聞覺知虛鑑萬像鏡未曾破也燈雖無景能照生死長夜鏡雖無臺能辯生死魔惑鏡與燈光光常寂明與鑑幻幻皆如照之無窮則曰無盡燈鑑之無窮則曰無盡鏡日用不昧昭昭於心目之間但眾生迷而不知故有修多羅教開如幻方便設如幻道塲度如幻眾生作如幻佛事譬如東南西北上下四維中點一燈外安十鏡以十鏡喻十法界一燈况一真心一真心則理不可分十法界則事有萬狀然則理外無事鏡外無燈雖鏡鏡中有無窮燈唯一燈也事事中有無盡理惟一理也以理能成差別事故則事事無礙由一燈全照差別境故則境境交叅一鏡不動而能遍能容能攝能入一事不壞而即彼即此即一即多主伴融通重重無盡悲夫眾生居一切塵中而不知塵塵皆毘盧遮那無盡剎海普賢示一毛孔而不知一一毛孔含眾生三昧色身然則一切眾生日用在普賢毛孔中毘盧光明內慈氏樓閣中出沒文殊劒刃上往來念念中與諸佛同出世證菩提轉法輪入滅度如鏡與鏡如燈與燈一切時普融無礙誠謂不可思議解脫法門非大心眾生無以臻于此境或問即今日用見聞覺知畢境是燈耶非燈耶是鏡耶非鏡耶答曰鏡鏡燈燈本無差大地山河眼裏花黃葉飄飄滿庭際一聲砧杵落誰家後慈寧皇太后命開山皋亭示寂塔全身于華桐塢第十六代佛行月堂昌禪師湖州人拈世尊初降生一手指天一手指地周行七步目顧四方云天上天下唯吾獨尊頌曰奴兒婢子十生九死於裏不正被外邊使縱饒開口便過頭未免渾身輥泥水正月二十日示寂第十七代佛海妙空訥禪師秀州人僧問牛頭未見四祖時如何師曰坐久成勞曰見後如何曰不妨我東行西行十一月二十六日示寂第十八代照堂了一禪師明州人上堂叅玄之士觸境遇緣不能直下透脫者蓋為業識深重情𡚶膠固六門未息一處不通點絕純清含生難到直須入林不動草入水不動波始可順生死流入人間世諸人要會麽以拄杖畫曰秪向這裏薦取拈首山竹箆示眾曰汝諸人若喚作竹箆則觸不喚作竹箆則背汝諸人且道喚作甚麽速道速道頌曰竹箆舉起成生殺豈可容人亂札錐劈脊一揮如薦得銀山鐵壁也光輝三月十九日示寂第十九代圓悟粹禪師福州人垂戒曰住持以眾智為智眾心為心恒恐一物不盡其情一事不得其理孜孜訪納惟善是求當問理之是非詎論事之大小若理之是雖靡費大而作之何傷若事之非雖用度小而除之何害蓋小者大之漸微者著之萌故賢者慎初聖人存戒涓涓不遏終變桑田炎炎靡除卒燎原野流煽既盛禍災已成雖欲救之固無及矣古云不矜細行終累大德此之謂也正月二十八日示寂第二十代佛慧可菴衷禪師婺州人六月初九日示寂第二十一代大禪了明禪師秀州人妙喜會中龍象叢林所謂明大禪也身長八尺腹大十圍所至人必聚觀之始妙喜謫梅州州縣防送甚嚴或以為禍在不測師為荷枷以行間關辛苦未曾少怠既至貶所衲子追隨問道者率不下二三百人杲以齋粥不給且慮禍嘗勉之令去師輙不肯以身任齋粥每肩栲栳行乞至晚即數十人為之荷米麵薪疏食用之屬成列以歸衲子雖多無不具足如是者十七年如一日杲法嗣之盛在貶所接者居其半師之力也杲被旨復僧衣自便繼被旨住育王師嘗在座下師為人豪邁機鋒敏速妙喜室中不許衲子下喝師每入室必振聲一喝而退妙喜一日榜方丈前云下喝者罰一貫錢師見之乃密具千錢于袖中至室中先頓於地高聲一喝便出如是者數矣妙喜無如之何再牓曰下喝者罰當日堂供一中師見之即驟步往庫司語曰和尚要十兩金主事者不疑即與之乃遣行者隨往方丈師袖之以入復頓於地高聲一喝而妙喜大駭入室罷徐問知其然為之一笑每語師云你這肥漢如是會禪驢年也未夢見在然念其勤劬之久舉令出住舒州之投子先是投子諸庄牛遭疾疫死斃幾盡比歲不登師以大願力化二百隻牛以實之連歲大稔倍常頗有異跡遷住長蘆衲子輻凑叢林改觀及妙喜住徑山師來供施及飯大眾泊歸長蘆妙喜送以偈云人言棒頭出孝子我道憐兒不覺醜長蘆長老恁麽來妙喜空費一張口從教四海𡚶流傳野干能作師子吼孰云無物贈君行喝下鐵圍山倒走後奉詔住徑山道望愈著先是楊和王夢一異僧長大皤腹緩行言欲化蘓州一庄覺而異之未言也翌日師忽杖履徒步而至門者呵不止以白和王和王出見之遙望師奇偉與夢中見者無異遽呼其眷属出觀之眷属竝炷香作禮茶罷師首言大王庄田至多可施蘓州一庄以為徑山供佛齋僧無窮之利和王未有可否因令辦齋師飯罷便出更無他語時內外閧然傳言和王以蘓州庄施徑山長老遂達孝宗聖聽會和王入朝上為言聞卿捨蘓州一庄施徑山朕當為蠲免賦稅和王謝恩歸次日以書至徑山請師入城而二日前先已遷化矣自是和王宴居寤寐之際或少倦交𥈤即見師在前語曰六度之大施度為先善始善終斯為究竟和王即以庄𨽾本山此庄歲出十萬犂牛舟車解庫應用百事具足復有蠲賦之恩至今蒙其利師於緇素有大因緣所在施供雲委衲子臻萃佛事殊勝江淛兩湖皆號之為布袋和尚再出焉六月初七日浴罷趺坐而逝第二十二代無等才禪師杭州人六月二十六日示寂第二十三代佛日普慈聞禪師台州人僧問如何是道師曰水冷生冰曰如何是道中人師曰春雪易消曰如何是談論師乃鳴指一下問東西密相付為甚麽眾人皆知師曰春無三日晴曰特伸請益師曰拖泥帶水曰學人到這裏却不會師曰賊身已露上堂城裏喧繁空山寂靜然雖如此動靜一如死生不二四時輪轉物理湛然夏不去而秋不自來風不凉而人不自爽今也古也不改絲毫誰少誰多身無二用諸禪德既身無二用為甚麽龍女現十八變君不見弄潮須是弄潮人珍重上堂風雨蕭騷塞汝耳根落葉交加塞汝眼根香臭叢雜塞汝鼻根冷𤍠甘甜塞汝舌根衣綿溫冷塞汝身根顛倒妄想塞汝意根諸禪德直饒汝飜得轉也是平地骨堆叅上堂嚴風刮地大野清寒萬里草離衰千山樹黯黲蒼鷹得勢俊鶻橫飛頗稱衲僧鉢囊高掛獨步遐方似猛將出荒郊臨機須扣敵今日還有麽良久曰匣中寶劒袖裡金錐幸遇太平挂向壁上參上堂諸禪德還知麽山僧生身父母一時䘮了直是無依倚處以手搥胸曰蒼天蒼天復顧大眾良久曰你等諸人也是鐵打心肝便下座上堂舉栢樹子話師曰趙州庭栢說與禪客黑漆屏風松楞亮槅僧問如何是無為師曰山前雪半消曰請師方便師曰水聲轉嗚咽十一月初四日示寂第二十四代寓庵潜禪師興化人入門彈指一下便入六月四日寂第二十五代密庵咸傑禪師福州鄭氏子母夢廬山老僧入舍而生自幼頴悟出家為僧不憚游行遍叅知識後謁應庵於衢之明果菴孤硬難入屢遭呵叱一日庵問如何是正法眼師遽答曰破沙盆庵頷之未幾辤回省親庵送以偈曰大徹投機句當陽廓頂門相從今四載徴詰洞無痕雖未付鉢袋氣宇吞乾坤却把正法眼喚作破沙盆此行將省覲切忌便跥跟吾有末後句待歸要汝遵出世衢之烏巨次遷祥符蔣山華藏未幾詔住徑山靈隱晚居太白僧問虛空銷殞時如何師曰罪不重科上堂牛頭橫說竪說不知有向上關棙子有般漆桶輩東西不辨南北不分便問如何是關棙子何異開眼尿床華藏有一轉語不在向上向下千手大悲摸索不着天雨無處曬㫰今日普請布施大眾良久曰達摩大師無當門齒上堂世尊不說說抝曲作直迦葉不聞聞望空啟告馬祖即心即佛懸羊頭賣狗肉趙州勘庵主貴買賤賣分文不直秪如文殊是七佛之師因甚出女子定不得河天月暈魚分子槲葉風微鹿養茸上堂卓拄杖曰迷時秪迷這箇復卓一下曰悟時秪悟這箇迷悟雙忘糞掃堆頭重添搕𢶍莫有向東涌西沒全機獨脫處道得一句底麽若道不得華藏自道去也擲拄杖曰三十年後上堂舉金峰和尚示眾云老僧二十年前有老婆心二十年後無老婆心時有僧問如何是和尚二十年前有老婆心峰云問凡答凡問聖答聖曰如何是二十年後無老婆心峰云問凡不答凡問聖不答聖師曰烏巨當時若見但冷笑兩聲這老漢忽若瞥地自然不墮聖凡窠臼上堂舉婆子燒庵話師曰這箇公案叢林中少有拈提者傑上座裂破面皮不免納敗一上也要諸方檢點乃召大眾曰這婆子洞房深隱水泄不通偏向枯木上糝花寒巖中發𦦨箇僧孤身逈逈慣入洪濤等閑坐斷潑天潮到底身無涓滴水子細檢點將來敲枷帶鎻則不無二人若是佛法未夢見在烏巨與麽提持畢竟意歸何處良久曰一把柳絲收不得和烟搭在玉欄干上堂動弦別曲葉落知秋舉一明三目機銖兩如王秉劒殺活臨時猶是無風匝匝之波向上一路千聖把手共行合入泥犂地獄正當與麽時合作麽生江南兩浙春寒秋𤍠上堂盡乾坤大地喚作一句子擔枷帶鎻不喚作一句子業識𣴭𣴭兩頭俱透脫淨倮倮赤洒洒沒可把達摩一宗掃地而盡所以雲門大師道盡乾坤大地無纖毫過患猶是轉句不見一法始是半提須知有全提底時節大小雲門劒去久矣方乃刻舟晚居天童六月十二日示寂塔于天童之中峰第二十六代別峰寶印禪師嘉州李氏得法于華藏民禪師師初謁圓悟隨眾入室悟問從上諸聖以何接人師𥪡起拳悟云此是老僧用底作麽生是從上諸聖用底師以拳便打悟亦舉拳相交笑而出師謁大慧慧問甚處來師云西川慧云未出劒門關與汝三十棒了也師云不合起動和尚慧深肯之淳熈七年秋召入𡭊𨕖德殿當日賜肩輿於東華門內上問云三教聖人本同此理師曰譬如虛空初無南北上曰但立門戶異耳故孔子以中庸設教師曰非中庸何以立世間華嚴有云不壞世間相而成出世間法上曰今時學者秪觀文字不識夫子心師曰非獨今之學者當時顏子為具體秪說得瞻之在前忽焉在後如有所立卓爾亦未足以識夫子心夫子亦曰二三子以我為隱乎吾無隱乎爾以此觀之當時弟子尚不識夫子心况今人乎張商英有云唯吾學佛然後能知儒上曰朕意常作此見上又問曰老莊之教何如師曰可比佛門中小乗人耳小乗厭身如桎梏棄智如雜毒化火焚身入無為界正如莊子形固可使如槁木心固可使如死灰老子曰吾有大患為吾有身大乗人則不然度眾生盡方證菩提正如伊尹所謂予天民之先覺者也予將以斯道覺斯民也如有一夫不被其澤若己推而內之溝中也上大悅即日詔住徑山十年上親註圓覺經成遣使馳賜命作序師具表奏謝仍進頌曰古佛與今佛同一廣長舌于無途轍中為物啟途轍撥開千障雲放出一輪月普令大地人言下悉照徹覺亦無可圓幻亦無可滅只此無亦無紅罏一點雪𥡴首佛與佛字字無異說上覽大悅賜號寶印禪師及年邁益厭住持奏乞菴居得請十二月初八日示寂葬于菴之西岡諡慈辨禪師塔曰智光第二十七代塗毒智策禪師天台陳氏子幼依護國僧楚光落髮十九造國清謁寂室光灑然有省次謁大圓於明之萬壽圓問曰甚處來師曰天台來曰見智者大師麽師曰即今亦不少曰因甚在汝脚跟下師曰當面蹉過圓曰上人不耘而秀不扶而直一日辤去圓送之門拊師背曰寶所在近此城非實師領之往豫章謁典牛道由雲居風雪塞路坐閱四十二日午初版聲鏗然豁爾大悟及造門典牛獨指師曰甚處見神見鬼來師曰雲居聞版聲來牛曰是甚麽師曰打破虛空全無靶柄牛曰向上事未在師曰東家暗坐西家厮罵牛曰嶄然超出佛祖他日起家一麟足矣住後上堂舉教中道若以色見我以音聲求我是人行邪道不能見如來雖然恁麽正是捕得老鼠打破油甕懷禪師道你眼在甚麽處雖則識破釋迦老子爭奈拈鎚䑛指若是塗毒即不然色見聲求也不妨百花影裏繡鴛鴦自從識得金針後一任風吹滿袖香師將示寂陞座別眾囑門人以文祭之師危坐傾聽至尚饗為之一笑越兩日沐浴更衣集眾說偈曰四大既分飛烟雲任意歸秋天霜夜月萬里轉光輝俄頃泊然而逝七月二十七日也塔全身於東岡之麓第二十八代佛照德光禪師臨江新喻人彭氏子父術母袁夢異僧入室有娠既生乃祖曰吾家世積德乃生此兒必光吾門因命名德光年九歲有妙應大師伯華善相曰此子伏犀貫頂出家必作法門棟梁時年十歲遽失怙恃伯父循伯母萬育而教之年二十一聞人誦金剛經忽然通解歸告伯母曰適聞誦經身心歡喜世間萬事真如夢幻力懇出家族不能奪遂散家貲詣本郡東山光化寺足庵吉禪師薙髮一日入室吉問不是心不是佛不是物是甚麽師罔措遂致疑通夕不寐次日詣方丈請益昨日蒙和尚垂問既不是心不是佛不是物畢竟是甚麽望和尚慈悲指示吉震威一喝曰這沙彌更要我與你下注脚在拈棒劈脊打出師於是有省吉攜師入閩寓福之西禪謂師曰是行為擇所依東禪月庵善果具衲僧眼子依之時復省吾足矣一見月庵遽問不落有無中何如露消息師云不落有無中分明露消息月庵云是甚麽消息師便喝庵云未在更道師云我畱口喫飯在即畱叅堂後謁應庵華百丈震終不自肯適大慧領育王四海英才鱗集師亦與焉大慧室中問師喚作竹箆子則觸不喚作竹箆子叫背不得下語不得無語師擬對慧便棒師豁然大悟從前所得瓦解冰消慧說偈以頂相付師曰有德必有光其光無間隔名實要相稱非青黃赤白慧再主徑山拉以偕往閱夏至蔣山省應庵庵稱賞不已謂人曰光兄頓出我一頭地乃移書于李侍郎浩曰光兄一自徑山老叔印可如虎插翅畱月餘而歸乾道丁亥李侍郎浩延住鴻福徙光孝孝宗雅聞師名淳熈三年召入觀堂留五宿數問佛法大意師敷奏直截上大悅賜佛照禪師之號明年改涖徑山師力辤帝曰朝夕相見耳再𡭊便殿進宗門直指兩賜御頌上堂僧問浩浩塵中如何辨主師曰中峰頂上塔心尖上堂臨濟三遭痛棒大愚言下知歸興化于大覺棒頭明得黃檗意旨若作棒會入地獄如箭射若不作棒會入地獄如箭射眾中商量盡道赤心片片恩大難酬總是識情卜度未出陰界且如臨濟悟去是得黃檗力是得大愚力若也見得許你頂門眼正肘後符靈其或未然更為諸人通箇消息丈夫氣宇衝牛斗一踏鴻門兩扇開上堂七手八脚三頭兩面耳聽不聞眼覻不見苦樂逆順打成一片且道是甚麽路逢死蛇莫打殺無底藍子盛將歸上堂聞聲悟道落二落三見色明心錯七錯八生機一路猶在半途且道透金剛圈吞栗棘蓬底是甚麽人披簑側立千峰外引水澆蔬五老前嘉泰三年三月二十日說偈而逝塔全身于東菴之後諡普慧宗覺大禪師塔曰圓鑒第二十九代雲庵慶禪師建寧人師拈袁州楊岐方會禪師僧問如何是佛會曰三脚驢子弄蹄行曰莫只這便是會曰湖南長老頌曰楊岐一頭驢眼光如電爍踏殺天下人說甚三隻脚十月二十三日示寂第三十代佛智蒙庵元聰禪師福州朱氏子晦庵會中得心要眾推為高第慶元三年自福之雪峰被旨而主是山拈藥山首造石頭之室便問三乗十二分教某甲粗知嘗聞南方直指人心見性成佛實未明了伏望指示頭曰恁麽也不得不恁麽也不得恁麽不恁麽總不得子作麽生山罔措頭曰子因緣不在此且往馬大師處去山禀命禮馬祖仍伸前問祖曰我有時教伊揚瞬目有時不教伊揚瞬目有時揚瞬目者是有時揚瞬目者不是子作麽生山于言下契悟便禮拜祖曰你見甚麽道理便禮拜山曰某甲在石頭如蚊子上鐵牛祖曰汝既如是善自護持頌曰倒腹傾腸說向伊不知何故尚遲疑只今便好猛提取莫待天明失却雞上堂舉玄沙見僧禮拜沙云因我得禮你師頌曰因我得禮你莫放屁撒屎帶累天下人錯認自家底上堂舉趙州和尚在東司上見文遠侍者過驀召文遠遠應諾趙州曰東司上不可與汝說佛法師頌曰明明道不說此理憑誰識春風一陣來滿地花狼藉送行者求僧偈曰山前麥熟雨初晴桑柘青連柳色新毫髮不存風骨露頭頭總是比丘身十一月十五日示寂第三十一代佛日石橋宣禪師蜀嘉定許氏橘洲曇公是其同氣嘉定丁丑獲知丞相魯國俾居兹山創化城接待于雙溪之上詳楊汝明記中十二月十三日示寂塔于寺之後第三十二代佛心浙翁琰禪師台州周氏子幼岐嶷頴悟邁倫上堂舉乾峰因僧問十方薄伽梵一路湼槃門未審路頭在什麽處峰以拄杖畫云在這裏後僧請益雲門門拈起扇子云扇子蹦跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾會麽師曰唱愈高和愈峻還他二老者是十方薄伽梵一路湼槃門總未踏著在上堂拈拄杖云蔣山喚這箇作拄杖子諸人亦喚這箇作拄杖子還有緇素也無闌干雖共倚山色不同觀作維摩讃偈云毘耶示疾放憨痴添得時人滿肚疑不是文殊親勘破者些毛病有誰知書懲私篇略曰此書真𨶒老子殿前一本赦書也今之諸方道眼不知若何果能受持此書則他日大有得力處浙翁每以此舉似于人璨隱山亦云常住金榖除供眾之外幾如鴆毒住持人與司其出入者纔霑著則通身潰爛律部載之詳矣古人將錢就庫下回生姜煎藥蓋可見今之踞方丈者非但刮眾人鉢盂中物以恣口腹且將以追陪自己非泛人情又其甚則剜去搜買珍奇廣作人情冀遷大剎只恐他日鐵面𨶒老子與你計筭七月十七日示寂第三十三代佛行少林崧禪師建寧人有語錄十卷板厄于火二月二十二日示寂第三十四代佛鑑無凖範禪師生於蜀之梓潼雍氏九歲依陰平山道欽出家經書過目成誦紹熈五年冬登具戒明年出游至成都坐夏正法有老堯首座瞎堂高弟師請益坐禪之法堯曰禪是何物坐底是誰師受其語晝夜體究一日如廁提前話有省明年辤去謁佛照于育王照問曰何處人師曰劒州人照曰帶得劒來麽師隨聲便喝照笑曰者烏頭子也亂做貧甚無資剃髮故人以烏頭子目之未幾聞破庵住蘓之西華秀峰遂往見焉有純顛者入室次橫機不讓庵打至法堂且欲逐出師解之曰禪和家爭禪亦常事何止如此庵曰豈不聞道我肚飢聞板聲要喫飯去聻師聞其語不覺白汗浹背逮破庵居靈隱第一座復往從之因侍破庵游石笋庵庵之道者請益曰胡孫子捉不住乞師方便庵曰用捉他作什麽如風吹水自然成紋師在侍傍平生礙膺之物頓釋巖雲巢居吳郡穹窿遷瑞光及台州瑞巖皆延師分座師在瑞巖忽夢偉衣冠者持把茅見授翌日明州清涼專使至迨入院見伽藍神姓茅衣冠形貌與疇昔夢無異陞堂開法一香供破菴三年遷焦山升雪竇被旨移育王又三年嵩少林散席復詔住徑山師居徑山二十年儲峙豐積有眾如海號法席全盛僧問趙州道三十年前火爐頭有箇無賔主話未曾有人舉著此意如何師云舌頭拖地僧云畢竟如何是無賔主話師云言滿天下僧云只如玄沙聞得云者老漢脚跟未點地在又作麽生師云一坑埋著僧云可謂焦塼打著連底凍赤眼撞著火柴頭師云一畫畫斷上堂靈山指月曹溪話月代相傳證龜成鱉範上座尋常有一張口挂在壁上未曾動著今日無端入這行戶事到如今只得東𥳽西𥳽未免拈起多年曆日于中點出些子悞賺處說似諸人且要郭大李二鄧四張三知得江南兩浙春寒秋𤍠雖然如是黃河三千年一度清上堂若論箇事直是省要易會多是諸人自作艱難自作障礙所以有時東廊西廊見諸人和南問訊山僧便乃低頭相接其實無他只要諸人識得長老是西川隆慶府人氏若識得去便與諸人打些鄉談說些鄉話如今且未說你識得長老且各自知得自家鄉貫也得還知麽明州六縣奉化八鄉上堂五峰門下百種全無僧牀迫窄堂供蕭踈脚下踏著底破甎頭碎瓦礫面前撞見底王獦獠李麻胡恁麽薄福住山真箇孤負老鬍雖然如是更點分明上堂一夏已滿無事不辦遂府鉢盂邛州磁碗理宗嘗召見于修政殿奏𡭊詳明上為之動色賜金襴僧伽棃仍宣詣慈明殿陞座上垂簾而聽以師所說法要示叅政陳公貴𧧼陳公奏云簡明直截有補聖治乃賜佛鑑禪師號并縑帛金銀等物先是師住山之明年寺燬師逆知其數不動容經意三年寺成閱六年復燬師不驚不變而助施雲湊不數年寺宇崇麗師去寺四十里築室數百楹接待雲水賜額萬年正續又西數百武結菴一區為歸藏所上建重閣秘藏後先所賜御翰敞室東西偏奉祖師與先世香火遇始生日為飯僧佛事以薦㝠福蓋蜀亂師之先祀遂絕故兹祠奉以旌孝慕上聞而嘉嘆賜扁曰圓照淳祐戊申秋築室明月池上榜曰退耕乞老于朝而舊疾適作己酉三月旦日升堂示眾曰山僧既老且病無力得與諸人東語西話今日勉强出來從前所說不到底盡情向諸人面前抖擻去也遂起身抖衣云是多少十五日集兩班畫後事親書遺表及遺書十數言笑諧謔如平時醫者診視次師謂曰你未識這一脉在三月十八日𥠖明索筆書偈曰來時空索索去也赤條條更要問端的天台有石橋移頃而逝遺表上聞上遣中使降香賜幣奉全身葬于正續之側塔曰圓照禀法分化有雪巖欽斷橋倫西巖惠等欝為大宗匠云第三十五代痴絕道冲禪師武信長江荀氏子母郭氏生而豐上短下資性絕人少長以進士業應詔不利棄之受釋氏學詣梓州妙音院禮修證為落髮師游成都習經論于聖慈以名相厭人復棄去紹熈壬子出峽回翔荊楚間時松源岳唱密庵之道于饒之薦福徑造其廬以歲飢不受會曹源以雲居首座生出世妙果師纔入門聞語有省叅堂俾侍香朝從夕游老拳痛棒不少貸平生知見至是多無影響曹源徙龜峰師復侍行久之以偈辭游淛有曰尚餘窮相一雙手要向諸方痒處爬江湖盛傳至杭時松源主靈隱門嚴戶峻八閱月不獲入室或以失士告源曰我已八字打開挂搭他自是他當面而蹉過了師聞其語徹見曹源于妙果龜峰時嘻笑怒罵皆為人善巧方便嘉定己卯由徑山第一座出世嘉禾光孝時英靈衲子皆在會下道聞于朝忠獻史衞王以堂帖除蔣山瀕江卑澇下田無秋師忍飢鳴道行乞養士居十三年無倦嘉熈己亥侍郎曹公豳帥閩以鼓山來聘未行雪峰牒至領事半年而天童詔下眾集如海法度修明雖宏智盛時殆不之過育王虛席攝住持事往來說法兩山間上堂曰天童用底來育王用不著育王用底歸天童用不著雖然如是用不著處用有餘一箭雙鵰隨手落淳祐甲辰有旨移靈隱師謂大父密庵伯父松源弘道之地方欲奮勵力振祖風而世故有不滿其意者伐鼓辤眾歸隱金陵京兆尹遣屬官追挽不可朝命以虎丘養老不就留守虛齋趙公以蔣山起之不應戊申春育王笑翁散席朝論以大覺故家不輕畀付特召師隱所三返卒不奉詔明年京尹趙公以法華請開山將領事而勑牒住徑山之命繼至師欲以法華并辭自謂不赴法華則不信重違君命則不恭失恭與信何以為後學法乃翻然而作畱法華逾月即登徑山故人神響應懽聲若雷上堂僧問心佛及眾生是三無差別如何是過去心師曰故待冷來看僧云如何是現在心師曰你問我答僧云如何是未來心師曰後次上堂向你道僧問如何過去佛師曰去年梅僧問如何是現在佛師曰今歲桺僧問如何是未來佛師曰顏色馨香依舊僧問如何是過去差別智師以拂子擊禪牀左邊僧問如何是現在差別智師以拂子擊禪牀右邊僧問如何是未來差別智師以拂子中間點一點僧云心佛眾生無向背十方剎海一毫收便禮拜師乃曰過去心不可得未來心不可得現在心不可得三世既不可得喚甚麽作差別智若人見得徹去三世諸佛無一時不在諸人頂額上轉大法輪更來這裏挨肩竝足討什麽碗以拄杖一時趕散結夏上堂圓覺伽藍塵塵有路坐斷去來頓空今古那裏十三這邊十五後先不差毫髮許可笑黃面瞿曇至今不知落處上堂盡乾坤大地無絲毫許大是汝諸人橫擔拄杖繞四天下行脚道我無處不到無事不知且道西天那蘭院寺戒賢論師今日說什麽法便下座上堂有一人一念頓證墮在佛數有一人累刼闡提不願成佛且道那個合受人天供養良久云蝶穿芳徑雙濕蜂掠殘花兩股肥臨示寂手書龕記并遺書十數且曰無凖忌在三月十八日吾以十五日即行不能辦香修供矣說偈書讃嬉笑言論如平時侍僧以遺偈請麾斥不顧已而笑謂侍者曰末後一句無可商量只要箇人直下承當即命筆書辤眾十四日上堂語至夜分起坐移頃而逝壽八十二臈六十一茶毘舍利五色者無數其徒遵治命奉骨歸葬金陵玉山庵學者追慕不忍舍分其半建塔菖蒲田玉芝菴第三十六代石溪心月禪師西蜀州人上堂舉僧問九峰和尚如何是學人自己峰曰更問阿誰僧云便恁麽承當時如何峰曰須彌還更戴須彌師頌曰自家冷煖自家知祖意西來更問誰全體承當全體是須彌頂上戴須彌拈黃龍祖心禪師因黃山谷太史乞指㨗徑處龍曰秪如仲尼道二三子以我為隱乎吾無隱乎爾太史居常如何理論公擬𡭊龍曰不是不是公迷悶不已一日侍龍山行次時巖桂盛放龍曰聞木樨花香麽曰聞龍曰吾無隱乎爾公釋然即拜之曰和尚恁麽老婆心龍笑曰秪要公到家耳頌曰渠儂家住白雲鄉南北東西路渺𣴭幾度欲歸歸未得忽聞巖桂送幽香又送僧偈曰未到雙林見舊游橫新月眼橫秋寒暄未舉宐先問因甚橋流水不流六月初九日示寂第三十七代偃溪廣聞禪師閩之侯官林氏子母陳家世業儒疎秀目哆口豐頤從季父智隆于宛陵光孝十八得度受具初見鐵牛印少室睦無際派追隨甚久叅淛翁于天童鍼芥難投自知未及再叅于雙徑翁笑迎曰汝來耶一夕坐簷間聞更三轉入室曳履而蹶如夢忽醒翌朝造室翁舉趙州洗鉢盂話師將啟吻翁遽止之平生疑情當下冰釋紹定戊子四明制閫胡公以小淨慈致之歷住香山萬壽雪竇育王淨慈靈隱徑塢八山所至革弊支傾廣容徒眾開爐上堂舉趙州和尚示眾云老僧三十年前在南方火爐頭有箇無賔主話直至如今無人舉著師云森羅萬象明暗色空日夜舉揚趙州古佛不是不知只為貪程太速上堂楊岐眼中睛臨濟頂上髓一不成二不是點著不來白雲萬里佛成道日上堂錯錯六載草䋲空自縛了了開著眼來天大曉古今天地古今日月古今星辰拍𦡀云劒去久矣切忌刻舟上堂雲門放洞山三頓棒嚼飯餧嬰孩黃檗打臨濟三頓棒按牛頭喫草只今不犯絲毫有箇方便良久云大事為你不得小事自家擔當上堂非風幡動仁者心動浣盆浣盆非風鈴鳴我心鳴耳漆桶漆桶盡古往今來和泥脫墼有什麽限還知萬壽落處麽劫石有消日虛空無盡時上堂十字街頭石幢子無你遮護處一聲江上侍郎來無你廻避處衲僧家早出暮入脚前脚後也須子細忽然築著磕著淨慈拄杖別有分付上堂一升三合拄杖頭邊萬水千山草鞋跟底未言先領誰家竈裏無烟撩起便行是處井中有水莫道空來又空去許多途路不相孤上堂一句絕離微渾淪無縫罅善財七日尋覓不得趙州五年分踈不下靈山今日快便難逢為通一線六月賣松風人間恐無價上堂繞禪牀一匝揮香案一下轉藏已竟講經已竟若具著眼目方知落處其或未然依經解義三世佛冤離經一字還同魔說上堂趙州喫茶去金牛喫飯來龍門多上客有人續得末後句許你入阿字法門景定四年六月十四日示寂壽七十五夏五十八第三十八代荊叟如珏禪師婺州人圓悟五世孫也功用比圓悟益弘際遇穆陵寵遇甚至初見癡鈍室中僧問如何是佛師答曰爛冬瓜復成頌曰如何是佛爛冬瓜咬著冰霜透齒牙根蒂雖然無窖子一年一度一開花又嘗作偈寄呈癡鈍曰鍾山白刃赤身挨幾度曾經被活埋一自人亾家破後了知無位可安排結夏小叅我此一宗正令全提如暴風卒雨鼓蕩無前石火電光追奔不及舉意即迷源擡眸已蹉過不是目前法莫生種種心縱汝三種互修剋期取證第一頭第三首萬柱千撑轉見氣急殊不知髑髏未具己眼先明呱地一聲千了百當然雖如是親證者萬無一二錯會者數有河沙佛成道日頌曰六年雪嶺方成道打失從前鬼眼睛滿面慚惶無著處至今生怕是明星十二月初十日示寂第三十九代淮海原肇禪師通州靜海潘氏子母朱氏邑之利和寺妙觀其諸父也謂其父母曰是子生而有異却葷胾殆亦夙種盍俾出家父母然之年十九薙𣑱受具叅浙翁于徑山翁問汝何處人師曰淮人翁曰泗洲大聖為什麽在楊州出現師曰今日又在杭州撞著翁曰且得沒交涉師徐曰自遠趨風翁以師警敏欲大激發未容其叅堂纔見便云下一轉語來擬開口即喝師以書上又以頌呈末句云空教回首望長安翁云這裏是什麽所在師曰謝和尚掛搭始密就入室之列已而命掌記翁既寂師出世通之光孝遷吳城雙塔金陵清涼天台萬年蘓之萬壽東嘉江心而四明育王虛席廟堂奏師補處遷杭之淨慈靈隱徑山其住徑山歉餘逋券山積僧殘屋老未幾樓閣矗霄雲衲踵至不減浙翁全盛氣象俄示疾囑其徒為吾袝一穴于東磵見生死不忘奉師之意六月初十日浴訖書偈而逝嘗舉達摩偈曰踏翻地軸與天關合國人追不再還去去一身輕似葉長江千古浪如山第四十代虛堂智愚禪師四明人出世嘉禾興聖遷光孝明之顯孝延福瑞巖婺之寶林四明育王柏巖杭之淨慈凡歷住十剎咸淳十年詔住徑山師室中垂語曰己眼未明底因甚將虛空作布袴著畫地為牢因甚透者箇不過入海筭沙底因甚向針鋒頭上翹足僧問聲前一句不墮常機轉位就功如何相見師云問訊不出手僧云且道天子萬年作麽生師云瑞草生嘉運林花結早春僧云直得九州四海雷動風飛師云出門惟恐不先到上堂春風如刀春雨如膏衲僧門下何用忉忉上堂言而足終日言而盡道言而不足終日言而盡物且道道與物是一是二若道是一為甚麽客山高主山低若道是二為甚麽天地一指萬物一馬箇裏緇素得出還你草鞋錢不然但願來年蠶麥熟羅睺羅鬼與一文結夏上堂有一人日銷萬兩黃金同此聖制只是無人認得若有人認得許伊日銷萬兩黃金上堂曰虛堂初無門戶與人近𠊓亦不置之于無何有之鄉只要諸人如鐵入土與土俱化然後可以發越其如運糞人者吾未如之何上堂舉松源師祖臨示寂告眾云久叅兄弟正路上行者有只不能用黑荳法臨濟之道將泯絕無聞傷哉拈云鷲峰老人似倚杖騎馬雖無僵仆之患未免𠊓觀者醜師先在淨慈入院日問答絕忽天使踵門傳旨問趙州因甚八十行脚虛堂因甚八十住山師即舉趙州行脚到臨濟話頌曰趙州八十方行脚虛堂八十再住山別有一機恢佛祖九重城裏動龍顏使以頌回奏上大悅特賜米伍百石絹一百縑開堂安眾十月初八日示寂塔于直嶺下曰天然先是高麗國王請師于彼國說法八載還山問法弟子常隨千指後嘉靖間高麗遣法嗣至山掃塔云彼國法道甚盛焉卷之三目錄列祖藏叟禪師虛舟普度禪師雲峰妙高禪師虎巖伏禪師本源善達禪師佛智晦機禪師大圓佛鑑虛谷陵禪師佛日元叟端禪師廣慈曇芳忠禪師佛慈法喜南楚悅禪師古𪔂祖銘禪師佛慧慈照正源禪師愚庵智及禪師悅堂顏禪師宗泐禪師象源淑禪師復原福報禪師大宗興禪師止庵祥禪師呆庵莊禪師岱宗泰禪師伯蘊琇禪師敬庵莊禪師雷庵澤禪師月江淨禪師雪崖珂禪師西疇頃禪師宇中宸禪師傑峰英禪師一清天禪師無極灝禪師宗勝㣧禪師正覺成禪師用璚琚禪師竺芳蕋禪師庭禮訓禪師天才英禪師悅山愷禪師石窻珉禪師月林鏡禪師補遺列祖慧滿扶禪師法警庠禪師寶鑑修禪師十方住持祖印悟禪師澄慧淵禪師玄應仁禪師月堂道昌佛行禪師佛慧可安衷禪師無等才禪師寓庵清禪師佛行少林崧禪師佛心荊叟珏禪師大圓佛鑑虛谷陵禪師廣慈曇芳忠禪師佛慈法喜南楚悅禪師象源淑禪師大宗興禪師止庵祥禪師呆庵莊禪師岱宗泰禪師雷庵澤禪師雪崖珂禪師宇中宸禪師傑峰英禪師無極灝禪師宗勝㣧禪師正覺成禪師用璚琚禪師竺芳蕋禪師庭禮訓禪師天才英禪師悅山愷禪師石窻珉禪師法侶附智藏禪師如會禪師鳥窠禪師丹霞天然禪師敬叟斷橋妙倫崇嶽松源恕中無慍大辨風穴延沼禪師法師行靖行紹桐江紹大石室祖瑛一關正逵孚上座九仙清嗣高峰妙禪師布衲如玉禪師寶徹禪師資壽尼安分庵主淨度惟政慧靜僧瑜僧翼慧辨琦禪師來復薦福本禪師無趣如空禪師無幻性冲禪師達觀可禪師雲栖宏禪師古道禪師梅谷禪師密藏禪師幻于禪師幻居禪師化儀禪師儀丰禪師憨山禪師洞聞禪師萬松禪師月亭禪師寒灰禪師瓶匋聞谷禪師湛然禪師鶴林禪師漢月禪師卷之三目錄終
