body:
  text: 汶上李燁然刪定海陽徐文龍鹿城陳𢡟德訂虞山宋奎光輯序文募刻大藏疏文釋真可大覺示生順機緣而應質聖人制告愍同體以垂慈大夢雷霆幽霄日月揭萬古之昏蓋活羣生之慧根半字滿字宛轉剖本有之光大身小身方便現圓回之相道高則聲聞自遠義備則圓照無虧理不乖事開凡聖之正因色不異空杜魔外之邪見滋多生之淨種破五使之疑情曰深曰淺總就路以還家若見若聞俱立地而成佛是以補天地之玄化廣君親之至仁挽回薄俗之風啓迪高明之習舍乎大藏別覓真乘何啻飢寒棄捐粱纊或者以釋迦非我國之人而不從其法抑不思文王亦西夷之産奚以被其風渴不辨泉飢不擇飯迷方固當問路愈病必事求醫乃智者之所尊不智者之所棄從長為善舍短稱賢泥塗可以致雲霄行潦可以通滄海故刺血為墨者非無知而作剝皮代紙者必有見而然在昔固有英賢當世豈無豪傑是非曲直義理淺深譬夫九天之上而日星皎如萬鏡之中而燈珠燦爾然非韓愈歐陽修之排斥曷致契嵩洪覺範之發揮陽擠陰助權抑實揚天風起而雲翳消時雨降而枯稿茂爰自運有通塞法以升沉玄奘求經於印度必也唐文皇之朝懷璉鳴佛于洛陽宜乎宋仁宗之世况我太祖高皇帝成祖文皇帝於通訓則頒金湯之詔在會典則列墻塹之條故曰化凶頑而益王綱利良善而資帝道義林幽邃俗世罕聞王臣無愛無憎𥠖宜崇宜正捧王言之煥朗識聖鑒之淵微豈不以功高世憲道格殊方者哉用是吾徒道開法本不揆下愚遠追德意誓刻經律論之全藏願報佛法僧之至恩力微而滿願為艱事勝而資檀須普或十函五函量緣而襄刻或一部兩部隨意而樂成大地慈雲普天甘露一字之功贊揚之莫盡半偈之益思議之難窮乃知常啼東請善財南詢皆重法以輕生亦知恩而報德直以身為如來之床座豈若手持菩薩之慧燈衆生造罪愚昧先之大士利生智光始也萬行波騰離般若則終歸業苦六通雲變舍漚和則俱墮偏空慈母周旋百至未喻佛子之用心良友曲照多方象至人之護念流通大藏稀遘勝因或貴或賤共成堅固之緣無親無疏咸作難遭之想終期克濟永用宣流謹疏募刻大藏文釋道開字密藏衆生非佛法則冥迷長夜流浪三塗而佛法非流通則玄言靡宣妙義將隱故衆生非佛法不能自度佛法非衆生不能自弘凡為佛之弟子必切度生既有願于度生必事弘法法之所被見者聞者皆植般若之緣觸者攖者盡樹菩提之果如來正遍知由荷法而成惡道那落迦由遠法而入苦流無涘非法不濟覺苑無階非法不臻世出世之福以法而成就為無為之業以法而解脫如有弘焉者如羲和御日四海必被其光明娑竭為霖諸方悉承其潤澤所以臚傳句語能空琰魔之獄蟻浥灌瀝爰升提婆之宮况復琅函羅七千之富寶氎具二藏之文哉鎔冶三賢埏埴十聖拯溺三界導迷九類莫不由兹矣是以羣聖幽贊列代咸推屬我熙朝尤尊勝典太祖高皇帝既刻全藏于金陵太宗文皇帝復鏤善梓于北平蓋聖人弘法之願惟期于普故大藏行世之刻不厭于再也後浙之武林仰承德風更造方册歷歲既久其刻遂湮今宇內所行惟南北兩藏北藏既在法宮請施非易南藏雖行諸郡印造猶艱僻壤幽巖何以取辦苾芻蒲塞每自興嗟開等濫被田衣稍窺海墨嘗以宋刻校兹二藏魯魚之訛互有潦寉之舛彰因思法雲以遍覆為功寶筏以畢渡為德教有多門道惟一致時雖異代聖無兩心觀文皇再刻大藏之心即如來悉度衆生之願也今我聖天子凡大藏未收疏論皆收梓于藏中印施于海內豈不欲家握摩尼之珠人入栴檀之林羣生歸善四海蒙休哉顧武林之刻即以久而毁則更梓之謀逮于今為急請以三藏並校參之英賢正其訛謬仍易梵帙以從方册所費既約其行必普是體紫宸之仁心而續如來之慧命也昔之人有以半偈而捨身有以四句而析骨遐討於幾萬里之外不辭流沙熱風冥搜於數十年之遙無憚狻猊虎豹誠不忍永劫之沉昏故寧勞於一世深愍諸有之交喪故甘瘁其四體耳今唱化雖勤無流沙熱風之擾剛強難化非虎豹狻猊之倫捐槖易于捨身而所得不止于半偈鋟梓殊於析骨而所傳有踰于四句集彼衆檀成兹全藏俾日城廣爥雷音遠流不亦善歟一時居士若大司空五臺陸公光祖少司寇雨亭陳公瓉太史具區馮公夢禎等皆聞而悅之力贊開等負笈九州乞金七衆闢無上之因田布希有之聖種云刻大藏緣起馮夢禎世尊説法如大海水相似其在此方者海中一滴耳而金函玉軸已踰五千餘卷益以宗家機緣諸録講下疏鈔等文幾及七千卷自此方衆生心𣊹計之已不勝汗牛充棟之嘆而况印土龍宮所有可令見耶此方藏經自東漢迄趙宋千有餘年而傳譯稍偹時未有板刻俱繕寫流通非勝道場處力不能有自板刻行而流通浸廣矣宋元間除京板外如平江之磧砂吳興之某寺越之某寺某寺等俱有藏板不啻七八副法道之盛此其一端逮國朝僅有兩京之板而諸方之板盡廢北板稍積而藏于禁中請印甚難今江南諸剎所有皆景泰間敕賜物也南板印造雖易而訛謬頗多愈改愈甚幾不成讀然印造裝潢其價亦百金以上以故山陬海隅窮鄉下邑有終年不見藏經者可嘆也時密藏開師尚書五臺陸公與夢禎等商及此事不覺慨然隳淚因記磧砂藏板緣始弘道尼斷臂募化弘道化後其徒復斷臂繼之更三世其願始滿吾儕丈夫不能深心荷擔大法鏤板流通反一女子之不若即生清世遇佛乘空手入寶山豈不愧死遂合掌向佛願盡命為期了此一段公案又念梵策煩重願易為方册可省簡帙十之七而印造裝潢之費不過四十餘金即窮鄉下邑山陬海隅之人可以酬終年不見之嘆豈不幸甚或曰梵策尊重方册輕褻今之應付酒肉之僧可謂至不肖矣然每發梵策無不焚香致敬而世之儒者手揣先哲之書偃仰嬉笑毫無慚愧甚則為枕為籍雖淫房酒肆無擇焉子奈何抑聖經為世典令一切衆生輕蔑佛法長無𣊹罪過此法滅之兆子其忍倡之與夢禎曰吁不然路鼗出於土鼓篆𨽾生於鳥迹繕寫不已而至於鏤板卷軸不已而至於梵策梵策不已而至於方册其法愈簡愈便而流通愈廣矣且子以尊重為佛事而我以流通為佛事今之藏經皆梵策也不委之蠧魚則棄之泥沙糊壁覆瓿在在而有嘗見宋經箋裝潢他書卷者皆從經背剝取輕蔑踐踏莫此為甚安見其尊重耶即知尊重矣日焚香散花禮拜供養而窮年卒歲未嘗開卷究其一字一義此與世俗所謂靠米囤餓死相似即種來生因不已晚乎若方册既行山陬海隅窮鄉下邑不患不能有藏經布帛菽粟隨取隨足即毁棄輕褻者不能盡無而若經若論若祖師機緣一言半句上築著磕著便能徹去如是者得一人兩人便可酬報佛恩即不然而依文𠊓義捱墻摸壁雖是鬼家活計亦是甚深般若因緣其為尊重何如以無窮福利遺一切衆生而一切衆生毁棄輕褻之罪作俑之人皆是某等誓為代受諸佛在上豈敢誑言是尊重流通子所謂兩失之而我所謂兩得之者也子已矣或者退復焚香合掌而白佛曰願十方諸佛世尊及昔有誓願於末法中傳持經典令不損滅一切深慈大士加被於我擁護於我令我願王速得成就一切衆生見者聞者生歡喜心同此誓願同此鼓揚如水入水了無乖異又願板完以後天龍諸鬼神時時擁護不相捨離世界為微塵此經無變壞遂次第其語以為十方同志告募刻大藏經序陸光祖余世業儒誦孔子之言甚謹嘗暇日檢國朝故事竊見太祖高皇成祖文皇所以尊崇佛典特異既刻大藏經板貯兩京又數出內帑金印造數千部頒天下郡邑諸名藍延高僧講演而屬四民共聽焉余始諰諰然疑豈佛氏之教有出吾儒上哉不然聰明聖知莫如我二祖胡信之之篤如是試取內典觀之則廣大無際如望溟渤而莫得其涯涘也久之稍窺端緒則如昏衢之覩日月而仰其照也又久之會文歸己稍獲其用則如布帛菽粟不可一日闕也然後知二祖之見淵哉遠矣夫自道家儒家而下九流百氏之奧禮樂德萟之微性命之精事物之粗方內方外世出世間之法大藏靡不具焉凡至理密義諸家纍千萬言而不能發者以一言發之瞭如也清涼國師有言佛法之淺淺勝外道之深深詎不信夫然則藏經豈可少哉惜歲久板漸刓敝又梵策重大印造甚艱二三名卿開士欲更刻方册俾家藏而人誦之將募施而從事焉或謂聖師之門有不執文字不離文字為道用者秪許其得我之皮則三藏皆文字也縱不即不離文皮焉爾何勤勤是刻為也余應之曰余聞佛性有三曰正因佛性曰緣因佛性曰了因佛性天真本具不假修習者正因佛性也觸發熏修待教而興者緣因佛性也妙明普遍一切圓成者了因佛性也不藉緣因則不明正因不明正因則不得了因兹刻豈非緣因之至要至備者歟或又謂梵策尊重方册輕褻易彼為此則教不尊又謂時詘風微恐費巨而難就余又應之曰佛道廣大不獨尊而敬者生大福慧即輕之詆之侮之仇之者亦終將得益焉如入栴檀之林或躪蹴焉或斬伐焉皆染香氣以出又如塗毒鼓聞之者不論有心無心皆死故方册易造流行必廣廣則聞者衆矣如來本願固欲衆生盡聞而獲益也昔有女子崔法珍斷臂募刻藏經三十年始就緒當時檀越有破産鬻兒應之者聖朝道化宏廣越前朝遠甚豈無勝心豪傑乎不能倡而成之而諉以為難是丈夫之志不如一女子也爰書於册屬禪上人某某居士某某分適四方募焉余老矣不能須三十載願旦暮亟成之也贈幻余密藏二上人唱緣刻大藏序陳瓉夫思漁照乘則遠騖於丹泉懷獵連城則探搜於稷翼求珍者必事于育珍之所珍獲而所忘求道者不離於載道之辭道得而辭泯使未超陰宇尚惑覺城而冥執毗耶杜口之迹不探鉢羅結集之章是猶苕華無獲遽釋垂木之區火齊尚虛不索圓流之澤珍寧赴物道豈弘人是以飲光慶喜並纘微言龍樹馬鳴互揚玄旨皆承善逝之訓誥爰療愚子之冥迷由質分象兔之能乃機異鹿牛之引而真唯一乘教無二致妙運漚和之慈殫溉我法之執語空有者綺互無相函矢談性相者雲起同此津梁辟之秋日炳虛影隨羣有而驤駐天風吹萬響因衆竅以洪纖雖影響之繁興於風日無殊應者也既而寶氎西傳瑤函東被漢蘭肇祕秦什承翻馬馱之典屢臻龍藏之文遂富焜燁十二部璧合神州浩瀚五千軸星羅此土信拯溺之智楫導迷之慧旌也列代咸崇皇朝尤重太祖成祖並寶靈詮金陵金臺率梓全藏以較漢唐必資繕録功殊倍蓰施博億千矣乃有幻于密藏二上人者識利宵練鑒朗龍膏瑩握戒珠堅披忍鎧皆緇流之楩梓淨苑之芝蘭也爰念利生宜普當無方不被般若之光樹行應堅期畢壽自竭僧那之力請悉翻俱舍之言更梓支那之册則箋章大省裝潢不繁舟車之運靡難于遐陬財法所營易足於貧里事功就簡沾被自周俾摩訶法雲含生咸覆頻伽妙韻有識率聞蚩蚩演若悉出狂塗擾擾闡提同臻彼岸余久企莊嚴之林稍涉音聲之海與聞弘誓大𢠢夙心誠輸槃那寐殷勤讃歎才缺鉢底婆蹩躠稱揚嗟乎丹化仙流玉枝終折善嬰天樂花冠有萎匪法輪之是歸詎苦業之能離一言契旨三有圓明半偈證真六根解脫顧獲爵雖由于一日必冠雲霓而張羅悟空無事于繁文必窮人天而立教羅博施於中林則林無逸飛教曲盡於羣機則機罔遺趣欲衆生盡獲一如之妙必率土皆習三藏之玄上人斯舉可謂大庇交喪善啓蔽蒙智豈遜于赤髭德寧弟於青眼大哉勝事行矣上人九州之遊始於跬步七衆之福植於檀那願永毗梨之度爰成無上之功尚令華髮之人獲睹日城之耀勉諸刻大藏緣起序王世貞昔我薄伽梵之宰世闡化也以大慈力攝諸天龍鬼神人非人咸集而收之大法門佛子菩薩阿羅漢隨緣參發贊歎顯密圓通之妙蓋四十九年而所説何啻百千萬言所度之人因聲入悟者何啻百千萬衆薄伽梵遷化大迦葉阿難陀繼起而紹明之尚慮登壇之述不能逮遠而沒身之後微言泯而漸失其真相與結集成篇以梵音寄梵書以梵書寄貝多羅葉上至國王宮下至婆羅門家遠至娑竭龍藏靡不轉寫流布而大教之盛如日中天矣後千餘年而震旦之文明日盛緣亦漸起所謂菩薩阿羅漢者多下降于此方而竺法蘭摩騰遂以四十二章經來其後鳩摩羅什佛陀耶舍輩為姚秦主翻譯蓋以漢兒習梵語作梵字則甚難而法不廣以漢語度漢字傳佛印則甚易而法亦流至唐而法師玄奘西遊天竺諸方遂悉奉諸經及慈氏所撰唯識諸論來𨤲為三藏官置司翻譯易世之後得房融所譯楞嚴而教修備矣然法語既繁傳寫亦不易自通都大邑之外貧賤鮮事力之家有畢生不能見見而不能自致於是始知壽之梓而印行之流傳亦復廣矣顧諸經之流傳見者頂禮供養焚香唄誦而像引隆崇簡帙重大將攜遠致則有所不能循環咀諷則有所不便丹鉛注乙則有所不敢于是開士密藏始發心倣弘道比丘尼磧沙故事以儒書例募梓而尚書陸與繩太史馮開之相與贊助成大因緣而二公仍各敘之太史所云彼梵策者以敬奉為法事今梓以流行為法事其辭甚晳而盡余復何贅獨余嚮者疑觀世音大士以一人之身而具八萬四千爍迦羅首毋陀羅臂清淨寶日以三千大千之界而無所不應隨應隨足以為萬萬無此事今以梓經一端而驗之固可推也夫百應者化身也不動者法身也梓者法身也流傳者化身也昔梓圓也今梓圓而滿也以目為耳是即觀世音如如不動即又曰觀自在也或謂觀世音之轉而為菩提達摩教外別傳不立文字而今乃以梓經擬之不亦左乎是不然當同泰永寧之際南北人主徇於有漏之果而泥於文言之粗其用益繁其浸益遠故達摩出而救之五六傳而後即心非心之教大行而吊奇者至焚像棄經書七佛名於袒服而流至於倡狂自恣併其迹而失之蓋棒喝之教窮而教典與宗皆兩屈矣若觀世音之再轉而為達摩也寧不思所以更救之乎余不敢遽謂密藏為觀世音轉要亦能不失其意耳或又謂此末法時也薄伽梵嘗授記矣念不久且歸之娑竭龍藏而何以梓為即梓豈復有如迦葉阿難者能傳佛印也則又不然後慈氏而成佛者非我瞿曇記耶一奮迅而立超三劫夫焉知末法之中無龍女者出彼龍女寧受記者哉密藏其勉之諸為密藏緣者亦俱勉之刻大藏經序汪道昆不佞故不佞佛守儒家言其書五車其所誦法一稟于六籍丁年始親內典若河伯之涉大方四望汪洋莫窺彼岸既而探西來意跂最上乘乃知教外別傳不立言語文字本然具足非即非非捐耳目黜聰明猥以無得為得矣顧喪家窮子迄今猶復故吾一衲不存珠將焉索要之利鈍異器頓漸殊塗如皆上根無庸大藏則如來出世者何事度世者何因説法何用四十九年集經何用五千四十八卷是訶佛也是燔經也如學人何故太上無言無不言如來無法無非法無以觀其妙則默存有以觀其徼則言顯一真四諦將無同乎吾聞密藏開公通佛心具法眼誓將闡揚三藏利濟衆生則以經度尚方儼若中祕刀布不易購舟車不易通僻壤遐陬千歲不覿彼倀倀乎不知嚮往夫非河沙衆耶乃今校舊梓以求精良易方策以從簡便計期餘什數䙫計費約三萬緡務在流通無擁閼于時質之吾友陸尚書馮太史唯然力贊之王長公能自得師相與印可二三君子為之嚆矢言人人殊尚書則曰不藉緣因則不明正因不明正因則不得了因言悟入也太史則曰或以尊重為佛事我以流通為佛事言權宜也王長公則曰梓者法身也流傳者化身也昔梓圓也今梓圓而滿也言周遍也諸佛子法王子長者子有味乎三君子之言由是發菩提心施菩提力滿菩提願凡諸罪福惡足以溷高談竊惟不佞凡夫自矜狂慧今兹之藥得大醫王顧夸父窮追曾無及于佛日我躬不閲遑恤未來鮮克舉之愛莫助之吾甚慙于開士維兹首事願與諸佛子法王子長者子矢言者三一曰翻二曰契三曰忘經成矣非窮年不能睹其全如櫝而藏之奚益苐齊心誦説如聞獅子吼振給孤園是為栴檀林薌澤攬矣則深心也翻而不契口則是而心則非要必得之口而印之心混融塵剎久之遍踊遍擊觸處洞然是為海潮音鏡智圓矣則妙明心也契而不忘殆將守筌蹄而亡魚兔必也默成而信歸之坐忘無實無權無顯無密是為虛空藏諸有空矣則無所住心也斯意也吾師師師説之詳矣不佞何説哉刻藏緣述曾乾亨震旦自東漢以來佛教隆興其中苾芻建剎焚誦登壇揮麈作佛事者代不乏人惟流通實所鮮覯夫流通者遍植般若之因所謂在在染旃檀香處處聞塗毒鼓泥洹家希有功德也而非大藏廣布其曷臻是有幻于本師密藏開師慨然興思曰昔龍樹大士自龍宮讀華藏遂潛誦八十卷祕文以出而宏顯于世般剌密帝剚膊藏首楞嚴泛重溟而入中土今人願力何獨異古人願力於是誓刻此藏典又以梵策請艱欲易為書册以便流通謀之大司空陸公少司寇陳公及豫同年馮太史而下咸報可豫從長安晤二師實重有感焉頻年奔逐風塵屢入長安覩世態之遷謝觀人心之澆喪至于今日殆不忍名狀蓋國家法令所不能禁而聖賢理道所不能挽澗嘗與二三學佛者俱見其志意堅固戒立精嚴語染業不啻蹈鼎鑊獲解脫不啻斷徽纆乃知如來真為末劫衆生示現而今日流通此法則時節因緣者非歟或者謂豫子學聖人奈何漫為左袒且寂滅之教不可以治家國而孔氏之宮庭胡遽啓籓籬而入他道也豫曰夫遺倫物而趨寂滅者二乘之斷見也一縷三餐孰非究竟酒肆庖宮立證菩提誠何有于治理不識諸法之無性不明萬緣之無體其安能出世不能出世網安足語經綸且廣大深心如來與尼山夫子一也藉令佛道違拒聖道則佛道礙聖道違拒佛道則聖道礙曾謂兩家大師有是乎吾人馳驅名利之坂出入市朝之間啖肉嗜酒未聞有礙未聞扄籓籬不入一切乃獨于此云然何哉其益非尼父之心矣夫無知空空至難言也夫子自明之外惟于陋巷之子許其屢空則何以説焉致虛靜篤之旨視無上菩提殆隔數塵夫子以為猶龍且承稟而趨下風然則大聖人之虛受其於此之流通當必輾然而首肻矣信及夫子之首肻即信自性之真如信自性即信佛祖夫遍觀一切衆生咸具菩提者是佛祖之真如也滋茂熏修能無藉此一段公案是又可緩圖哉近世學者人我山高未究聖人廣大深心不無有妨流通豫深恐其隳彌戾而入泥犁故因表而申之以堅此向往因緣俾願王速成就爾若兩開士刻經機緣暨我二祖崇典弘法之心十方共誓擁護之願已詳諸名卿敘述中兹不具論募刻大藏唱導文瞿汝稷世之誕佛者皆比于范縝之神滅者也而神滅非聖人所立教也夫神也者妙萬物而為言者也即心也即道也範圍天地曲成萬物聖人所以參贊化育者也是豈形之所及也惟聖人為能窮神而庸愚固未嘗人特不知其即道耳故曰百姓日用而不知不知則一徇于形於是遺範圍天地之廣大而自狹棄曲成萬物之微妙而自穢終日役役不過耳目口腹聖人愍焉故諭之曰形而上者謂之道形而下者謂之器謂之道復慮人之自畫而高遠之謂非己所及也故曰利用出入民咸用之謂之神終身由之而不知其道堯之所以堯窮此神也桀之所以桀昧此神也是神者溯之無始推之無終豈形生而始生形滅而隨滅哉形有盡而神無窮故曰原始反終故知死生之説精氣為物遊魂為變是故知鬼神之情狀而縝之言曰形即神也神即形也形生而神生形滅而神滅藉如縝言操則存者存形歟舍則亡者形亡歟出入無時莫知其鄉百骸九竅六臟誰為然歟心不在焉視而不見夢説築巖豈目所矚處今而憶昔在吳而知越何形之能然縝亦不思甚矣履帝武敏而生棄杜伯關弓伯有為厲墳典所載未易悉舉是皆迦文之所倡乎故縝之言形即神也形滅神滅非聖人所立教也君子之所棄也是使人重形而遺神淪胥以溺者也何以言之謂形即神則舍形無我舍形無我則凡形之所欲皆我之所欲而以禮義維之是強也是外鑠也神不滅而謂滅則堯桀均盡顏跖均生均生則縱佚者自適均盡則好修者徒勞于是示之以餘慶戒之以百殃則見以為汒昧而難徴也揭之以仁義則以為仁義攖人心揭之以性善則以為性善非定論善惡混幾何其能信之于是聿皇得喪徽纆貪毒惡積而不可掩罪大而不可解沉淪昏衢莫能自出旋復流浪為苦無已如來智入三世圓應衆機五時説法海墨不可勝紀其流入震旦者才海墨之一滴是為今一大藏其語報則徴之三世其語性則盡之妙覺知三世之報則堯桀不均盡知性覺之妙則性善無所疑故下焉者得其説必惕于三世之報惡不俟懲而革善不俟勸而行矣上焉者得其説則妙契性善之真居仁由義若耳聽目視何有攖吾心哉是以聖賢之教得如來而大暢惜哉縝之不講謂神滅形滅而誕佛也惟如來之教能窮此神之廣大微妙語其大則天地者無盡大海之一漚耳元會運世者無盡時劫之一瞬耳語其妙則無聲無臭此之空諦也精一執中此之尸波羅密也一言演為無量義竟古今而推之莫能竟也儒墨之是非黃老之祕密與夫百家之雄辨一言蔽之而有餘也佐堯而堯佐舜而舜父以之而慈子以之而孝護世以之而護諸衆生帝釋以之而離愛梵天以之而勝慧二乘以之而回向真乘菩薩以之而證入妙覺四聖六凡無根不被故其言必至于海墨也河沙妙德罔越窮神故其要必歸于一乘也世出世法莫不竭盡而無餘矣是以世之興王莫不尊尚三藏之備備于貞觀五宗之盛炳燁于開寶興國于時傳經之僧往返西域至勑王公百辟送迎宿衲出世示寂宸蹕時臨焉而語唐宋之治莫盛于此時乃若三武宣和之毁法則亦自毁其祚理亂之階實有深繫故我太祖太宗彌極紹隆太祖既刻大藏于留都太宗復刻大藏于京師列聖纂緒底今無替至於列代名卿宿儒或行峻一世或文雄百代龍翰鳳雛之彥蘭薰雪白之賢歸命法流頤真靈筏者數之更僕未易終也考其人之操履事業皆彪炳史册故未嘗以嗜此而壞世間法也或者謂當如淫聲美色以遠之惟恐入于其中夫飽梁肉者必無求于粢糲服縞紵者必無取于短褐以短褐而棄縞紵以粢糲而棄粱肉雖愚者不為也使道德之蘊不出于六藝性命之微無過于諸儒則彼固皆含六藝之腴入諸儒之室何肻悅詖辭而釋微言就僻行而盩大道乎是棄縞紵而求短褐之類也非人情矣嗟乎四大假合也百年旦暮也昔之所歷于今奚存今之所存又何可恃至愛終離大業終棄神之未窮汒汒安託適百里而不得其所託則皇皇焉浩劫之適何翅百里七趣紛遝所託非定狃百年之得喪而輕浩劫之流浪可不謂大哀耶故濟我于一時者不及濟我于一世者也俾我一世得所安者不如使我浩劫得所安者也求濟我于浩劫者非如來之教而何姑未敢論受果登地第能泛瀾覺海少溉餘潤則契根根塵塵靡不周遍法界故不獨可以窮神亦可以窮形色之原矣于是纏蓋不能縻陰陽不能控翛兮其翔汩兮其集得固如也喪亦如也未遊焉者不獨喪之為喪既遊焉者不獨得之為得念念滅盡而非斷古今不異而非常畢化沙界而一無事默然宴坐而萬行嚴往來生死未常生死出入淨穢初無淨穢豈將來而後證審于今而不誣是以究曠劫于剎那收九類于半偈莫尚如來之教矣密藏幻于二上人以南北二藏皆梵策流通不易思刻方册廣其流通拯溺之慈甚盛諸龍象敷美其事盡矣豫特恐世之誕佛者或沮之遂書此以輔韋馱氏之跋折羅杵云密藏開禪師募刻大藏序傅光宅夫佛力宏深無生不度羣迷業重正法難聞即聰明之士或終身不耳佛名便博雅之夫亦窮年不目佛典况復愚癡下流無所聞識者哉其或志向高明識趣玄遠者俱謂一言悟道何假博聞諸佛唯心豈須教典寧知竟其妙義固隻字全無布為玄言則萬函莫盡菩薩尚皆依教而入衆生豈能捨經而修哉此大藏之流通所以不容已也密藏開禪師者夙契心宗力承道脈憫末法之易弊悲衆障之難除爰發廣大之心用開方便之路遠乞檀信獨任勤勞使其工費省而便于流通卷册輕而易于攜載幾窮鄉下邑無往不周貧士愚夫咸得而誦雖根有利鈍信有淺深而種菩提因長般若智起剎那之一念證僧祇之三身則不可以彼此論矣况復上智辨才因言悟妙勇猛精進即象超玄者其利益又安可量哉故大司空五臺陸公光祖少司寇雨亭陳公瓉太史具區馮公夢禎等皆以宰官身具菩提智共欣勝事喜助信緣禪師之宏誓大願不可稱量名公之妙德深功豈容思議余作宰吳門既聞善舉今官柱下寧負初心更復參達觀於天池見密藏於帝里針投芥子水入江流幸前劫之有緣期後生之無誤忘其愚謬僭為敘言嗚呼佛為四生之慈父法為苦海之巨航達官長者總為佛子佛孫信女善男盡是法門法器種無漏之良田成無上之正果誰謂雙樹之下久別能仁三會之中難期彌勒也哉贈幻余密藏二師唱緣刻大藏敘于玉立佛典雅以梵策傳及國朝惟南北二藏法窮於所不能普幻于密藏二師慨然悲之願廣以方册聿續慧命此許彥周所稱貫高田光之用心也將挾册以遊玉立贈之言曰諸佛大慈為衆生故破一微塵出大千經卷密之明之權之實之法雨普澍三草二木邪種焦芽無不滋茂而實未嘗外衆生心別立一微塵法蓋衆生心即佛心衆生現前一念全收一大藏教而自情生境發覺路深扄乃安處火宅相恬以嬉非大慈悲父善巧方便有永劫鑊湯爐炭耳即非光明不足如翳眼何由斯而論則四十九年説法不異以頭目髓腦普施十方而衆生仰怙一切修多羅亦如頭目髓腦必不可無無之則命根斷噫可悲矣况以娑婆濁惡涉象季之陵夷乎其津梁何可不廣哉故由梵語而華言由梵策而方册譬震塗毒鼓于須彌巔始得聲際四天下蓋迦文既不容掩口則末代兒孫義當鼓揚而説者曰世册之乃無當于莊嚴殆不知衆生妙得於言音文字而遊行于如來大光明藏於一毫端百千萬億炳煥齊明是所稱無相莊嚴雖盡虛空作琅函玉軸曾未足以喻絲毫許也善建者志存其大識法者事徹其源則幾其見二師之心乎方二師起願時余固籌之念衆生苦惱弗復可忍而沾濡法潤永息苦輪得早一剎那為快然馮虛責實蓋難為功普於為緣則又晚也遂願盟諸吳中法侶為傾資亟其成間以請之吾達觀師師咈然為嘆謂是最勝佛事爾何得以格量心當之夫一毛之施一飯之供終不壞滅况以資財振法鼓則兩施圓收故于是而或一滴一塵一願一力微而至于一讃嘆又不然以至于無心而聞有意而謗即一大藏教未暢波瀾而衆生八識田業已大有是事奈何以無邊因作狹劣想乎則定策廣募嗚呼余立主張速成吾師主張廣募是果同耶別耶善信之士憐余所以速成之心感激於吾師所以廣募之願將必有愴焉而悲烈焉而奮不入思惟而真心自勸者余又嘗考佛之誠言五十六億萬歲有大丈夫來自善足天於龍華菩提木下三轉法輪度諸有緣嗟乎緣寧有逾於此哉則二師所遊疏册所經聲傳所及實龍華老子前旄盡大地人宜急著眼於此蹉過長夜漫漫何時旦乎開公募刻大藏序虞淳熙衆祐與其滿分二身之開心地藏也蓋自開化中陰以至磨胸示趺合為一藏離為八藏結集者羽翼者千門競啓而天龍之所祕青象白馬之所不勝者猶故未入支郍也一時同業之倫富蘭恨不遇于始迦葉幾不遇於終吾等乃幸遇于末法之會其曲指人心直指人心為人心而出現於世乃人心竟安在耶雲臺寶網毛孔光明消香飯聽風柯及淨名所載諸佛事吾不蘄遇矣衆祐為我選卷荷之根八千返而聒之豈不當機哉兜玄國亂黌孰小竪言提其耳咻以七略四庫浸假而化為蟫魚三食其中徴六藝則應以經徴九流則應以術徴千古則應以史徴圓測勾股楓棗之局黑錦之囊推而博盧雉于閻浮括英雄于一洲則有喙三尺無不響應卒徴其心身如枿貌如灰口如緘結即漫然應之剖其中扄飾以丹絳七節曰小九宮曰大拘蔽曰人虛靈曰道此世之所號為誦詩讀書博物君子也而卒不知心永平以來士之闡者疑貝榮漢炬勝竹燔秦熖也出羅什之舌以為證謂夫夫咀薌焦哺我雖失故味心藉其養于是明心者遂不下數千百人大抵多剃髮之徒其間鸚鵡鸜鵒尚與印土泥蛤垤蟻同沾靈澤而薦紳先生顧反攘臂掩耳以自失其心則日外救形之典不及日內濟神之典明矣二典分攻內典者見藏而忘心日理絲算沙于所謂教者無論分河奪衣即賢首天台慧觀光統岌師劉虬諸黨各鳴桴相向而八藏學者遂有八心一旦請平玄覺飲曹溪之鉢子璿登台衡之席永明懸百家之鏡稱一心矣試徴其徒曰何謂心輒遮以百非表以萬法揭頓教圓教滿字無字而當之斯其珍見留悟擬心失心與薦紳先生一節也嗟乎攻內典者往往失心如此開公奚以災木而動梓人為宣灑曰唯唯否否此夫嚴事梵策之過也往宣灑無端求心取天目梵策翻之非盥手不敢近偶得禪源詮集傳佛心印記蘊于心而他策以難數盥弗涉也便讐南宗已獲五燈方册生疑至今假令皆方册也以吾書淫之僻窮年周之何至讐所不當讐者因是以知縉紳先生所云華嚴不如艮卦梵音足比淫聲皆不見大藏之全者耳開公自以方便而貫華方便而員多方便而皮骨方便而楮氎方便而梵策方便而書空書裩書所坐之石無不可隨順者則行方册之方便何不可也毗尼通七衆無取加點呪心恣五辛無取潔壇剖塵而出經塵即經也奚為避穢煩惱等即菩提煩惱等即經也奚為偏上嚴敬幾稻麻竹葦之人乘方便而見全藏見全藏而明真心乎令麻葦人于此明心彼人一毛端上轉法界輪而我災木非但迸出舍利亦復一策一磔攝麻葦人心罄無不盡其視閉藏而僅得五言之解若朱利槃特者不徑庭耶雖然神訶康樂僧糾奉御鬼責庾信物瞽昭明並人非人等加護之力獨奈何容五部六册者而使忽列于金函哉瑜珈禁于天朝演楪害之法眼沉于日本台教妬之此靜藹所以捧心而開公得無意乎或曰六師者論之賔十乘者咒之用百界者夷之府子胡不入魔境而生格量心宣灑曰若無乃稱妙臂經云誦經不驗如嘉種失時若非時而作此言終失心矣尚求之心無為經轉吾所憂者開公必能辦此刻大藏植因疏管志道藏經之議易方策也肇自密藏開上人裁于大司空陸公光祖太史馮公夢禎等而余亦加贊焉或有以輕褻聖典汗漫時日為疑者讀司空太史所為敘蓋詳矣藏上人挾伴比遊將復謀於妙峰禪伯吾知其必有合也則願以此大事因緣訂諸十方佛子昔我釋迦世尊在因地中共諸大菩薩暨無漏聲聞文殊普賢迦葉阿難等衆修無上道或現比丘身則互為師友或現國王身則互為主輔或現居士身則互為眷屬歷百千萬億劫不相捨離以至於登正覺何也則三寶之因厚而植緣深也叔世道微無論拍肩執袂之徒易合易攜即聞三寶名行佛門事而能以道法締深緣者幾哉兹舉也經翻一大藏藏通南北宋三刻期訂十數䙫資募三萬金若倡若和若自施若勸施若校對若繕寫若鋟梓而流通俱有無量功德為當來成佛根本不啻如法華經中所謂散心稱佛尚成佛道已爾篤信審思寧無慶躍至于發願之弘隘持念之堅脆助緣之厚薄共事之久近又成佛後先之頓漸之攸分也深心奉剎世尊且為證明矣而禪者或以為向外馳求事是未知福慧兩嚴事理無礙之説也且藏上人與陸司空馮太史二三開士方究心向上一著求無師智余亦不自揣量以唯心淨土法門樹于吳中而俱不捨此刻經功德豈槩以羊鹿小車自耽娛哉蓋聞道無揀擇貴在知時時節因緣作佛事者之所乘也竺法蘭始入震旦必以四十二章達磨航海傳宗必于梁武之季棒喝交馳之後狂慧將猖則衛元嵩不得不逆行于周武宗教兩衰之日昏散難拯則板獨空不得不猛鍛于牛峰皆時至而事起耳以今末法鬬諍衆生根劣展梵本者憚其煩購全經者艱其費易為方册以從緇若素簡便之情時節因緣至矣佛子其能違諸二三開士所為惓惓諗諸衆也上人行乎哉遄往遄復了此大事微塵國土必有先得此心之同然者募刻大藏經序張壽朋壽朋凡夫也凡夫往往執有執有者𡚶情耳乃謬自指曰吾性則然吾性則然既謂之性矣所有愈真則所執愈堅守漚生電滅之四大如繩結膠固牽鹿夢蝸鬬之五蘊如掌握囊貯持愛憎取舍如別蒼素而分胡越視人間世為吾身必不可脫離必不能超出之境視吾身為必可生不可死之物剎那剎那百結千纏隨斷隨續執有一念為之也嗟吁誰有哉一旦得佛典誦數十字朗然開笑蕭然虛遊蕩然數十年前𡚶情如林間竹柏影耳有情冰泮空境秋澄衆生總是佛身大地無非淨土昔聞半偈者上樹報半偈之恩佛恩如斯壽朋未知所報第令衆生是佛則我報佛矣作如是想密藏開師自南遊燕募刻大藏經若與我想會爰屬壽朋序其事夫所稱卷則數千卷刻經費則數萬金南北兩板未易印請而方册不難于持載諸語此則陸司空馮太史諸公序之矣顧破三藏皆文字之説我苐應之曰如君語佛可以無經破方册起輕褻之説我苐應之曰即稗官農圃之書誰其使汝褻狎之汝自生慢心破數萬金難為作緣之説我第應之曰募金且難捐金且難作佛者亦人持三語破三難經其成矣夫壽朋聞佛典以來求報佛恩第令衆生是佛佛者心也聞佛者經也成佛者非心也非非心也非經也非非經也熏聞衆生經其筏耶壽朋寄迹曹郎需明年之春季當三載考績藉令無罪過復其職復職之日旋自乞身歸西山戲斑娛二親之暇輒與舊日往還二三開士分募東南為藏師偏裨可也彌勒成於佛後意者壽朋刻經于藏師之先也哉稽首訂盟佛曰如是宋文憲公護法録序錢謙益謙益讀高皇帝御製文集稽首揚言曰天命我祖統合三教大哉蔑以加矣已讀故翰林學士承旨宋文憲公集則又嘆曰嗟乎夫憲章聖祖者舍文憲何適矣聖祖稱佛氏之教幽贊王綱開國以來凡所以裁成輔相設教祐神靡不原本一大事因緣而文憲則見而知之為能識其大者廣薦之記楞伽金剛之敘通幽明顯權實大聖人之作用存焉傳有之金鐸振武木鐸振文文憲其高皇帝之木鐸與由文憲以窺聖祖之文其猶易之有翼春秋之有傳也與聖人之言天也算以周髀測以土圭而天體見焉于以憲章聖祖蓋思過半矣聖祖現身皇覺乘願輪以御天文憲應運而起典司禁林輔皇猷而宣佛教前代以翰林學士為內相高皇帝不置相文憲有相道焉雲從龍風從虎聖人作而萬物覩文憲以大儒應聘君臣之際史官頌之至今抑豈知其夙受付囑開華嚴法界于閻浮提其為雲龍風虎又有大焉者乎姚靖之于成祖閟現稍異要皆後天奉時佐二祖以章明佛乘日月未改聖謨洋洋而儒生掩耳如塵沙劫事豈不悖哉或謂文憲故服習程朱程朱辭闢佛氏凛于戎索何可越也於戲聖祖不云乎天下無二道聖人無兩心夫道譬之則日也聖祖出而日中天矣程朱見日于牖隙文憲見日于扶桑其廣狹至不同量也生盛明之世而墨守程朱終不能仰青天而覩白日悲夫文憲集無慮數十本余搜次其關于佛事者合諸雲栖所輯校定付梓而僭為之敘以諗于世之憲章文憲三閲大藏入海算沙有如指掌在儒門中當為多聞總持至其悟因證地著見于文字中必有能勘辨之者固非學人所可得而評隲者也題無生募鑄鐵瓦文釋傳如戒山法師雙徑興聖萬壽禪寺唐國一祖師開山上挹靈鷲之宗風下衍牛頭之法派顧燈傳于八十七代而雷震于千二百年慨金碧既委荒煙龍象徒聞盛世然不有其廢何由以興得吳門中丞沈公之捐資鳳郡知識無邊之殫力遽傷蓮臺之西逝乃當紺殿之垂成但期勝境彌新愈喜哲人間出承常住廓庵而接武兼無生精進以同盟地匪乞緣布金瓦必易泥為鐵頃久總祈乎無漏俯仰惟聽乎有緣霖雨十日寧同敝宇子犁之深悲雲露萬重豈符石室空生之遍觀為因更固受果益圓信佛語不虛善心頓發者矣題無生上人募鑄鐵瓦疏沈㴶若以肉眼觀閻浮提世界等如琉璃脆鐵瓦應無住若以法眼觀不問淨穢土具金剛體性賢劫常不壞云何無生禪却住有為法莊嚴萬壽寺是徑非山義即寺顯能所畢竟所能無離即印空山此山徑常住題無生上人募鑄鐵瓦疏沈演有僧頎然而長燁燁放光手持鐵瓦兩片更兼文字幾行故作狡獪遊戲卸却老衲行藏莫怪主人粗目試將泥鐵較量折戟沉沙半消銅雀子墨生香究竟孰堅孰脆波波著甚于𢗅太史不作戲論鐵在比丘心裏此念亦是能所祗今誰來誰去成住豈離壞空更請下一轉語徑山鐵瓦因緣便作西方公據題無生上人募鑄鐵瓦疏黃汝亨雙徑山有萬壽禪寺唐國一師作開山祖寺以泥作殿瓦日久流壞與諸剎等寺僧證公以解脫智修真實果誓發願力易泥以鐵要于長永而浩費難集過遇庸居士而屬唱緣居士難之曰世間一切成毁堅脆俱非實相當其成時瓦鑠非脆究于流壞金鐵匪堅請公轉一語以解是惑證公曰不然所云成毁堅脆者外相也一念真實無成毁堅脆而大千纍劫不與遷流者實相也法華謂之如如不動金剛謂之般若楞嚴謂之究竟堅固子試究乞者何念施者何念如其真實是鐵非鐵即與如來法身相見歷劫不壞居士聞是語已而歡喜合掌而作偈言世間一切法有成毁堅脆非相名實相起竟一念中實即瓦鑠堅而况金銀鐵給園八十頃樂土七寶塔非以金寶故撝手片念成是種菩提智是見如來身貪乞與慳施起念與墮落以此幻與實證諸歷代祖題無生上人募鑄鐵瓦疏文震孟泥瓦何嘗脆鐵瓦何嘗堅拋却金剛身來尋有漏禪東西日馳走波波亦可憐衣領徑寸珠不雜銅與鉛若能自探取金屑都無緣况復鐵與泥分別都雲煙題無生上人募鑄鐵瓦疏錢謙益無生上人住徑山之萬壽寺以行解聞於諸方頃持錫謁余于虞山莊嚴衍裕具大人相使人見而意清上人發願欲易殿瓦以精鐵為永久計乞余一言以為唱導夫大千界中不離一念上人願力堅固即兜率天宮下移人世亦一彈指間耳於以鐵易瓦乎何有或謂世界依幻蓋茆鎔鐵總歸變壞了無實相不知上人一念劫火洞然不與大千俱壞不應作如是戲論也募鑄鐵瓦疏周祗吳江人嘗聞苦海無邊非法航無由穩載福慧兼修非寶地從何肇業所以高人達士於名山勝地往往注念獨專我震旦國中江南名剎無過雙徑自國一祖開山以來祖祖相傳代不乏人歷諸興廢不知凡幾中丞沈公目覩頺圮為文廣募無邊海公殫力拮據善信響應寶殿崇成渙然鼎新矣獨以山高風廣積雪非經春不化堅冰非大陽不開陶瓦柔脆半損風霜繼此法席者為廓庵觀公遂興憂深慮遠之思誓願廣募賢豪行將鑄鐵瓦為蓋作千年常住之計正所謂一勞永逸利窮算喻矣良以衆生沒在苦海倘不藉三寶為福田長夜何由旦乎今觀公竪此無遮旗鼓與大衆植此無上因緣吾知毒眼漢見鞭影而行又奚俟豫之間言剩語哉偈曰錢高北斗不買常年一息不來餘皆剩物藉有待資肇無待因因因而果疾證真常果不俱因至寂滅地究其功能惟此念始三途極報反此念興孰利孰害誰雌誰雄石火光中各各諦觀但念無常急急著眼化城寺迎佛飯僧募緣疏錢謙益藏經之以書本行也自紫柏道人始也其自清涼而之徑山以其便于刻也自徑山而之化城則以其便于藏也化城之名起于宋賜御書二字遂為寺額燬于元而興于明後稍稍湮廢矣淡居鎧公暨諸金湯案故而克復之築垣搆屋其中鳩工藏板各有其所於是煥然重為名剎而海內稱弘法之區無化城匹矣法具矣不可無佛適有比丘慈門造大像一於虞山之麓思為室以居之而度不能辦也遂舉而歸之鎧公而化城于是不患無佛矣佛具矣不可無僧包腰行腳者朝夕過化城安所取饘粥焉鎧公乃乞粟四方以給之而化城于是不患無僧矣佛法僧三寶具則是化城也即謂之寶所可矣嗟夫事以時興時以緣會道法之有顯晦猶寒暑之有進退果實之有生熟不可強也自世尊説經慶喜結集垂千年而入震旦聖僧輩出易梵為華而經始便於誦説又數百年而有鏤板以傳印代書寫而經始便於流布又數百年至今復以書本代卷帙而經始便於印造便於蓄貯從源遡流愈變愈巧愈簡愈妙紫柏之利益羣生豈有量哉然刻藏之功必待化城而後畢化城之美必待迎佛飯僧而後備則地利天時人事固有相須而成者故愚謂鎧公斯舉也于過去世必有希有奇特之因於現在世即為希有奇特之緣於未來世必有希有奇特之果凡捐施資米乃至一錢一粒之微與夫隨喜勸導一筆一舌之勞皆當於龍華會上歷歷證盟功不唐捐也願我善信聞且見者作希有想作奇特想如趨晨市如赴選場不虛度此福田也安樂寺募建殿堂及供單緣起王在公古德云一法若有毗盧墮在凡夫萬法若無普賢失其境界故六度之中以檀波羅密為首餘杭舊有安樂寺侵蝕有年幾成榛莽宋元實嚴印持諸君竭盡心思與魔力爭以存斯剎無畏禪師捐其衣鉢以修復而殿則漏濕堂則狹小難以安期且供單未備尤為缺典願大心之士慨然樂施一切所施悉回向般若推三輪而無著超二乘而直上勝事既畢福慧二嚴一時成就無上菩提現前不遠題徑山下院安樂寺重建禪堂疏錢謙益武林自雲棲出世精藍寶坊梵唄相聞儼如極樂國土餘杭獨窅焉無聞元實印持二君乃能奪安樂古剎於魔波旬之手化火聚為清涼變屠肆為佛土此末法中甚難希有之事也塵沙諸佛所共讃嘆凡我同人有不轉相告語成此勝因者耶無畏禪師訥訥如不出口然機緣所感當使木馬夜鳴西方日出無待沿門持鉢也募建普慶福田寺疏宋奎光余于凌霄護法識臨安孫茂才云知為篤實居士也未幾以普慶因緣告余曰徑山故名雙徑一自餘杭而東為化城一自臨安而西為普慶自國一開山以來歷唐宋與徑山鼎峙入我明依然寶所後化城夷于草莽而普慶舊額猶存智禪師碑記與趙松雪書法憑而吊之想見莊嚴境界顧化城廢而復興普慶雖未盡廢而一線之額漸歸圮沒自臨安而借徑徑山者每用嘆息謂安得僧如淡居弘護如吳方伯者為恢復舊觀以故僧某發大誓願祈與化城聿還其舊嗟乎普慶與化城難易亦較然矣化城無尺土而普慶寺基無恙化城作難首青襟而普慶發心有居士化城坐落魔境降伏實難而普慶寄剎仁里重以邑大夫撫字之餘易于慮始處易興之地而加以僧某弘誓之初所謂事半功倍端在于此余言不足為建剎重剎自有足為檀施重者何以故徑山雙徑不能阻西來一路也佛法因緣不可思議苐告之十方當必有欣然子來者書一輪禪師徑山結庵卷陳繼儒字仲醇華亭人識時務者謂之俊傑非獨經世即避世亦然方今海內多故遼左川西以及東省赤白羽書旁午奏闕下募兵徴餉椎髓及膏百萬生靈化為血海顱山迄今未有寧宇盻望忠孝男兒為國家出死力而文罔議論束縛太苛莫可措手足若遊衲往來國門輒指為妖為間雖鳩摩羅什佛圖澄復生亦不知揣作何等相矣一輪禪師目擊此時流斃投入徑山之北有同安舊道場縛茆墾田終日參禪透入雲門宗旨其餘惟火耕刀種草衣木食不復問門外十步事矣余嘗謂了明生死便知現前皮袋自無始來拋擲千千萬萬豈必戀此軀殼及眷屬身外物等不戀身家撥轉此念為子孝為臣忠為英雄立榜樣為國家出死力皆由死生上看得分明故也輪公有同心老居士可以此示之題無從禪師徑草李縠字孟芳常熟人遊西竺之大者視東魯不啻一區顧托足不由尼山去印度必不捷他不具論遠若徑山近則雲栖可徴也無從師少師孔氏晚入薄伽般若智圓言思路杳余末由窺第窺之于詩謂非直捷無礙悉自妙明光中流出者耶其于西方品位不知當補何處若詩則已超季潭諸師而上之矣全室外集序朱右編修季潭泐為五十五代禪師著有全室外集古近體諸歌詩凡八卷不能盡載特存其二序云往豫客金陵今中竺季潭師從龍翔廣智業與余同里閈情誼歡合且以遠大相期待日切劘於文事遊從薦紳宿德間往復聞問為甚盛也時嘗厭世之為文辭者識性不高則見地膚陋體裁無度則鋪敘失倫且曰學固弗如是已也乃杜門坐一室取古人載籍矻矻讀之至忘寢食將求其制作之體與所以立言之要其志可謂大矣既而師上徑山掌記室元叟端公會間復歸龍翔余亦還留中吳斆學廣業比載晤金陵而師之學已克然有得沛然不可禦矣自是遭時多故豫避地姚虞間時出主宣之水西寺風塵修阻欲見無由俯仰二十餘年已兹獲遇西湖之上握手道舊因出其平日所著全室藁若古詩樂府歌行唐律凡若干卷讀之終日不厭惟見其高古溫垕風度悠揚燁然若翔空之孤鳳覽德來儀欲快睹而不可得也昻然若霜晨之老寉聲聞九皋欲近之而不可即也追乎黃流之玉瓉縝栗而有章也淡乎清廓之朱弦一唱三嘆而有遺音也是非其識之高工之精而趣之妙能若是乎置諸古人未易甄別詎不可以行後也哉尤足以副豫夙昔之望矣抑余嘗觀晉唐以來高僧以詩名者固不少也若支遁之沖淡惠休之高明貫休齊己之清麗靈徹皎然之潔峻道標無本之超絶惠勤道潛之滋腴雖造詣不同要適於情性寓意深遠至于今傳誦不衰季潭師識地高邁調趣清古導揚規詠有風人託物之思得三百篇遺意傳之將來豈居徹休輩下尚當有知音者矣全室外集序王達侍讀學士釋皎然曰詩有六迷七德以虛大為高古以緩慢為淡濘以詭差為奇以錯用意為獨善以爛熟為隱約以氣劣弱為容易此六迷也識理高古典麗風流精神質幹體裁此七德也余以為論詩若皎然者可謂知詩矣夫六迷者世之恆病七德者罕見其人余嘗嘆息詩雖為道之末藝然有道者之詩則七德無不備也季潭泐公以博大之德圓融淵偉之道陶鑄龍象出而為天下叢林師間作詩章渾涵汪洋千彚萬狀而一以理為主抑所謂七德者歟太祖皇帝恆稱為福慧僧且和其詩百四十五首美其兼通儒而神不𡚶馳夫以太祖皇帝之明聖乃眷寵贊誦若此草茆之士其敢致訾於其間哉今將鋟梓其徒永祚如升求余序之嗚呼成康沒而頌聲寢王澤竭而詩不作非不作也作而不出乎性情失中和之道也詩能出乎性情則中和自萃而無六迷之病矣此集也皆根乎性情而七德具備詩之所用雖同於皎然得君闡教則非皎然之所及也憶余少時頗嗜辭章公一見之大加獎譽謂如風行水面自然成文余之感公非一日矣今讀公詩敢不贅一言以報公哉雖然其徒鋟梓流行者義也余之序公集者禮也若公之圓融淵偉之道如春行大地而無滯迹則豈能以文詞而名狀之哉徑山節要引倪瑗進士嘗聞正法無法闡之以法則支妙心唯心窺之以心則晦自語録雜出觀者望洋而至道為之一病矣嗣禪師明秀乃取徑山語録而萃其深著明切者為一帙以示豫謀重梓而沛其利于天下愚詢其所以利者則曰日月有限而昏明乃出于蓮花山河無垠而胥彌乃藏于芥子至道若是乎難喻也姑即其形聲色相者質之可乎夫如來肉髻觀音千指遍身毛孔作聲華土莊嚴妙相觀之者云有色乎無色乎有聲乎無聲乎有相乎無相乎展轉幻化何以示人證之者云即此相非此相即此聲非此聲即此色非此色超升墮落已歸分別疑之者云法本無相唯相所相法本無聲唯聲所聲法本無色唯色所色即此範彼總成牽合擬之者云無相而相是謂真相無聲而聲是謂真聲無色而色是謂真色隱護雕籠寧為真載要之大中為極人心本虛無為太極之原虛乃萬化之本夫人而不知也于是即相以昭幻即聲以求空即色以顯𡚶夫人而不能自拔也于是即其形聲色相之外使反而求之飫而通之如天之有相而不見如鼓之有聲而無端如風之有色而無迹知我之有真者知形聲色相之有異者知無極太虛之道有不可分別計較者豈方體之可以盡人塵滓之可以盡法哉人性上不可加一物無心上不可施纖功琉璃原非礙眼赤絲原非素質澄海本無驚濤霽空本無點翳薝蔔之香波羅之味空中之聲相中之色學者知之乎乃若摘塗者啓天王之華屋渡𢬩者測海藏之金壺得器者忘千峰之翠色夢醒者悟溪澗之多岐飲冰者知凝解之同兆悟則有舍則無無則一而原非在彼矣何佛非塵何塵非佛何空非相何相非空宮商應節何分律呂夫妻歡洽奚別姓名一志在我何求而不獲雙足在我何行而不至見者性不見者亦性慮者心不慮者亦心顯者相不顯者亦相鳴者聲不鳴者亦聲覿者色不覿者亦色天地日月皆腎腸而皮毛骨骼皆霜露喜怒飲食男女皆家園而聲聲色色皆相皆故物誰為之爾我軌徑抑誰為之內外離即也乃若辨形是而鏡非認光同而影異千言之下字字傳聲無始以來燈燈皆境拗翼求飛孤掌欲鼓匪曰蜚謗實以自沈愚白首儒書雅心佛教慨至道之高明憫童垂之滯劣擬議忽墮于頑空苦思終成夫惡識依稀其一竅者光甫遏而疑興窮研夫百氏者餕愈長而鯁甚輒不自揆譬之木焉蠧則情也火則識也性不可見敷花布葉則性在是矣心不可求其所以為之蠧為之火為之敷花布葉以及人為之聲聲色色相相者則心在是矣人心道心相為出入舍其一則虛明舍其二則廣大至于悠久真常則成佛而作祖矣何空之難求而何如來之不可見耶敬附于篇末以翐夫圓融達順者徑山節要跋文苪楚中人夫道果有節要可傳者乎抑亦無節要可傳者乎余聞諸佛諸祖無實法與人而引導衆生不過以假名字而已是諸佛祖亦無節要示人也然萬法千門自有究竟初機晚學必賴宗旨故設方便以引誘者其節要之傳烏可少哉慨自光明種子之壞也久矣每每學者迷頭認影尋牛遺迹而本地風光竟汒昧焉於是有忘懷默照作鬼家活計者有向言語上思量卜度為門徑者有以心意識為窟宅者有墮我見網中者有落斷常坑者此皆不能絶生死浣垢濁伐稠林而直取無上菩提也彼抱道者安能坐蒲團上視衆生之流蕩而不指其節要以藥之乎江夏秀上人別號素嵓夙有靈骨竪精進之幢悟解脫之境閉關參妙宛然蓮花之不著水寶珠之不染塵所謂歷試于選佛場而心空及第者也至若搦管詠言思超凡界又其餘事楚中士薦紳輩莫不與之歡而氓𨽾景慕者其俯囪拱拱敬如禮佛然一日獲覩徑山禪師語録不覺法喜禪悅油然自生而閲之不厭嘗捧卷示同志曰此其可以藥衆生之流蕩而為引誘之最方便者也既又慮求之者泛而無統乃節其切要者為一卷梓而傳之誠法門之究竟後生之宗旨蓋此語此理上人已活潑於胸中而徑山禪師不過先得上人此心之同然耳學者苟能向腳根下推窮不獨玩節要之言而能會節要之理則斯道之節要不在剡藤間而在吾心中矣是上人一人之佛將溥而為衆生之佛也其功德豈小補哉嗚呼孰謂道真無節要可傳者乎謹跋題無從禪師徑草宋奎光字元實常熟人余自虞來苕師亦自九峰來大安大安廢剎師將起百代于今而為之徘徊焉者也因訪師於所搆廬中索其詩縱觀之風則宗也旨則騷也蓋騷其初地而宗則究竟也昔皎然住杼山往往以詩句牽勸令人入佛智若師詩烏容祕而不傳耶
