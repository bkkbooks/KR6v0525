body:
  text: 汶上李燁然刪定海陽徐文龍鹿城陳𢡟德訂虞山宋奎光輯制勑唐代宗迎國一大覺禪師朕聞江左有蘊道禪人德性冰霜淨行林野朕虛心瞻企渴仰懸懸有感必通國亦大慶願和尚遠降中天盡朕皈向而不違願力應物現形今遣內侍黃鳳宣旨特到詔迎速副朕心春暄師得安否遣此不多及勑令本府縣供送凡到府州開淨院安置官吏不許謁見疲師心力弟子不算多少聽其隨侍宋理宗蠲免徑山和糴指揮劄淮淛發運措置和糴所狀凖省劄備據臨安府徑山興聖萬壽禪寺特差住持僧心月狀奉本寺係朝廷第一祈禱雨暘感應去處累奉聖旨蠲免諸般差科敷役等事竝有省劄昨被不照敷糴米九千餘石本寺九月內具奏恭奉聖旨宣諭平江府發運照上天竺恩蠲免科敷即具依應聞奏已得余發運呈免回奏訖元照本寺已得指揮蠲免劄下平江府發運司及本寺照應永免科糴之患劄付本司契勘去年承准蠲免和糴指揮禀尚書省准此本所照得昨凖朝廷指揮拋糴淳祐十一年分百萬倉米斛本所凖行照劄行下諸縣勸糴當年九月二十三日據臨安府徑山興聖萬壽禪寺知事僧悟心狀理各縣不照指揮蠲免敷糴米九千餘石竊念本寺安眾浩大與官民戶事體不同况上天竺與本寺恩例一體而行上天竺既照指揮不科本寺亦當蠲免乞照例行下各縣照應免科本寺年例勸糴米𨽾籍諸縣計九千餘石今據本寺狀乞蠲免以為供眾之用但上項米皆係已派定數本所遂別行指揮各照諸縣之額且與從免帖長洲常熟崑山嘉定縣將所勸本寺米斛免糴仍帖徑山萬壽禪寺照應永免准前項省劄伏乞照會申聞帖據徑山能仁禪院知事僧淨鑑狀稱本院承前住當山訥和尚退居慶恩院住持小師惠初等立據說是慶恩院一針一芥竝是本師將衣鉢錢建造殿宇并置田地准備養老送終香火安眾焚修追遠去處今來本師化去真身歸殯徑山白雲庵建㙮每年忌辰祭奠實無所出集眾小師議定每遇忌辰就慶恩院常住取先是本師原用衣鉢錢置到田地數內撥米二十石入徑山白雲塔頭追修及香火支用且淨鑑委見佛海妙空訥和尚于慶恩及徑山之住持功迹切恐慶恩院日後忽作名色更改住持於斯難為分雪乞執狀立石永遠為照每年不拘水旱支撥前項米斛貴得香火不絕司府尋行下僧司勘會去後今據本司申結尋即差人前去勘會責據慶恩院甲乙住持僧惠初等狀為見本師妙空佛海大師昔住靈隱寺過此因見金人焚燬空地一方本司即將衣鉢錢於上建造殿宇輪藏庫司具備退歸徑山白雲庵蒙司府給帖今惠初於小師數內輪差一僧作甲乙住持為國焚修本司又將衣鉢錢置買田地貳拾餘頃因界打量盡歸本院常住為戶所收花息永克香燈次備供眾追遠之費師于紹興五年奉勑住持徑山建塔白雲庵請僧在此看守責令慶恩院常住每年供上白糙米二十石惠初與小師議定本院實立文據付徑山塔為憑令蒙勘會且惠初等委初詐胃諸般違礙等情所供是實如有異同甘罪不辤又據徑山能仁禪院知事僧淨鑑狀詞入石即無諸般違礙等事所供是實如有異同甘罪不辤本司所據各人供證委的即無詐冒除責狀入案外保明是實乞照會施行呈奉台判行照大明太祖高皇帝賜徑山宗泐免官說世人災害有三往往皆不自知故其災害周流方寸間日夜無息古今未嘗有能盡去者所以釋迦成道教化眾生指迷破昏乃云災害之三者曰貪嗔癡斯三者孰能不備孰備而不殃所以古今不備者聖人是也雖備而不殃者賢人是也洪武九年春遐游天界見住持僧宗泐博通古今儒術深明詢問僧之苦行本面家風果幽靜𠊓曰是僧動止異常因識儒書大知禮義又非林泉之士於是朕命育髮鬚以官之當時本僧姑且奉命而不辤待至髮長數寸將召而官之其僧再辤而求免願終世于釋門吁難哉世人之於世誰不欲富貴妻子名彰於世者歟是僧却富貴弗美妻妾可謂三害之中善却一者歟人將謂是僧生性淡薄有是歟抑玄悟之有知而若是歟不然其僧性淡薄玄悟不可以言貌而見蓋丈夫之氣初志不奪斯僧是其人也特聽免官放老山林其世之三害僧不為一害所迷妙哉成祖文皇帝勑諭徑山赴會僧朕惟佛氏之道清淨慈仁弘深廣大包含萬有貫徹微妙利益幽明功德無量比者仁孝皇后崩逝舉薦揚之科啟無遮之會廣集僧伽諷揚經典百日之間嘉禎翕集慧燈降于舍剎法雲覆于紺園綉絢五文輝燦諸品毫光累現眾彩畢呈天花雨宣滿祗林之寶樹縞寉飛舞繞碧落之旛𣄢佛之舍利或流輝于梵宮或騰耀于寶塔開照空之菡萏爛湧地之摩尼動若驪珠炳煥午夜晃如虹彩燭影丹宵寶殿之前圓結金梅之果長干之境秀產瓊芝之祥若斯顯靈難以悉舉皆由爾眾毘尼克謹梵行清修瀾翻八藏之文悟解三乗之旨秉至誠以奉朕命攄精意以扣佛慈其中亦有至人道化高妙飛行變化隱顯莫測感應朕誠心來臨法會證明善功朕德薄有未能知藉兹眾善遂致感通睹瑞應之蕃臻想神靈之濟度超游極樂信有明徴朕實歡愉特加褒獎夫觀百川之流者必至海乃止虧一簣之功者則為山不成爾等益勤精進永謝于塵緣究竟真空期早登于覺地利生助化翼我皇家欽哉故諭永樂十五年十月十五日神宗顯皇帝勑諭杭州府雙徑寺住持通會及僧眾人等朕發誠心印造大藏經頒施在京及天下名山寺院供奉經首護勑已諭其由爾住持及僧眾人等務要虔潔供安朝夕禮誦保安眇躬康泰宮壼肅清懺已往愆尤祈無疆壽福民安國泰天下太平俾四海八方同歸仁慈善教朕成已無為之治道焉今准欽差蘓杭等處提督織造兼理蘓松常鎮稅務司禮監太監孫隆奏請前去彼處供安各宐仰體知悉欽哉故諭萬曆二十八年九月初三日附進大慧禪師語錄奏劄釋蘊聞臣僧蘊聞竊以佛祖之道雖非文字語言所及而發揚流布必有所假而後明譬如以手指月手之與月初不相干然知手之所指則知月之所在是以一大藏教為世標凖于今賴之臣山野微賤遭值聖明屢獲瞻望清光禀承音旨聖言高遠非凡所及斯道慶幸有待而興竊欣希闊之逢敢陳誠切之懇伏念臣先師前住徑山大慧禪師宗杲敏悟英發直受正傳善巧方便開悟後學其平日提唱語要臣隨處記錄皆已成書既為廣錄三十卷又為語錄十卷謹繕寫詣闕上進伏望萬機之暇俯垂省覽臣又伏見真宗皇帝景德年中以僧道原所集傳燈錄頒降入藏今臣所進先師語錄十卷欲乞聖慈依上件體例特賜指揮亦令入藏用廣流通使後學皆得預聞在先師益為不朽臣無任戰灼俟命之至序文正法眼藏序吳潜字毅夫宋相國此事亘古亘今漫天漫地端視側視直視橫視開視闔視明視暗視無不視亦無所視亦無無不視無所視直敢道謂正即離謂法即塵謂眼即鑿謂藏即塞是故這四箇字直須撇向大洋海裏方免擔枷帶索受人圈䙡然雖如此初機鈍根也要得一則半則胡言漢覻來覻去綻些光景此時正好𢬵命捨身单鎗直進如老鼠入牛角挨墻拶壁更無去處正迷悶中猛忽地頭破額裂通身流汗得箇休歇始知法眼慧眼天眼佛眼只是一雙凡眼到這裏說道學人事畢也且未在履齋老子即說偈言若以色見我以音聲求我是人行邪道不能見如來正法眼藏已足槩妙喜家風顧當時入室如張無垢猶以忠國致疑而公獨抉開四字直示五眼宣揚妙旨無此痛快嗟乎公可謂了窺印度警策迷方者矣公相業冠趙宋所在尸祝餘杭亦有專祠人苐知為洞霄提舉而不知實徑山津梁也故錄此以存什一云古𪔂和尚四會語錄序賛宋濂古𪔂禪師銘公以臨濟十七世孫四坐道塲為黑白之所宗仰一旦祝𨤲江淛省垣現白光三道丞相康里公見之極加敬禮未幾將示寂語其徒曰觀世音蓮臺至矣安坐而逝及火化舌根齒牙數珠俱不壞五色舍利燦爛無數國史危先生已摭其行業為文勒諸碑而四會語未有序之者師之得法上首今天界禪寺西白金公屬濂作之濂覽已合爪言曰是真正語是不著有無語是雷轟電掃語學者隨所悟入如慈雲徧覆法語普沾小大根莖皆獲生成非入正知見具大力量者孰能與于此嗚呼世安復有斯人乎哉非果無之也求其真淳無偽若師者鮮也濂既為敘其事復歆豔之歆豔之不足復作伽陀一章賛之其辭曰我觀我師四會語一言一句皆真實河沙妙義總含藏其中無餘亦無欠及至能所齊泯時欲覓片言不可得有如十萬虛空界種種色相皆現前或飛或潜或動植以至洪纖高下等枯榮生死及崩竭了然不𣑱虛空相而亦不出于虛空真相如如不動故卬昔嘗登寂照塲耳邊一喝三日聾惟聾故使功用絕絕後通身皆是耳自兹出世入翁川翁川海水亦生耳但聞魚龍哮吼聲即使波濤增洶湧繼升補陀洛伽山合掌問訊觀世音目能觀色耳聞聲音聲何獨以目觀不知本來無耳目見所不見聞不聞盡大千界無礙者中天竺國凌霄峰所談妙法皆如是只因妙法法難思結集已落第二義間放出白毫光七寶蓮臺向空至此皆遊戲神通事于師之道不相攝師之道大不思義千古賛嘆莫能盡姑以第二門中觀可以洗空于結習可以觸動于悟機可以速證于菩提是宐流通于世間視如照耀光明幢我言或誣有如水悅堂禪師四會語序宋濂根有利鈍故所教有異同悟有淺深故所印有大小施其善巧之力釋彼結習之固非假言辭難窮實際所以達摩歷辨于六宗臨濟有發于三要照耀今古函葢乾坤兹其為巨浸之輿梁作昏衢之燈燭也歟有若悅堂顏公禪師以東嶼正嫡弘西來大宗初住崑山之東禪轉吳門之萬壽升虎林之南屏遂陟雙徑樹大法幢凡四坐道塲名聞京國遣使者再下璽書護其教且有金襴法衣之賜藩王大臣無不函香問道黑白駿奔如眾歸市禪師隨機接引霑被為多其善誘弗倦則春氣津津太和襲人也其發蒙撤蔀則翳捲太清冰釋洪河也其警省振勵則震雷虩虩䘮厥匕箸也其含弘攝授則山不讓塵海不擇流也由是而觀所教有同異非根有利鈍者歟所印有小大非悟有淺深者歟前謂施善巧釋結習假言辭窮實際者其道豈不在于斯歟昔者先師黃文獻公現宰官身敷宣般若與禪師為方外交而禪師受度婺之寶林又在予父母之邦𥡴兹緣契實繁中情禪師上首南峰珵公得法最蚤乃出四會語俾題首簡予竊聞之入奥室者能探于幽邃升危岑者始矚于㝠𣴭松月大師印公禪師之獅子法海之長鯨也其稱禪師之道高于圓照佛照二公其言豈虛發者哉惟賢知賢益可徴矣仰前哲之風徽作後武之矩度究其遺轍足證新功是錄之行其必有超然獨得于語言之外者乎雲棲曰四會語錄今無存松月亦未知何許而曰道高于圓照佛照夫二公豈易及哉而曰過之更俟賢者考正重刊寂照和尚四會語題辭宋濂寂照和尚元叟端公既示寂金華黃文獻公為銘其㙮蜀郡虞文靖公為序其四會語二公以文辭名天下亦云備矣其入室弟子清泰子楩金山惠明天寧祖闡復合辭請曰舊刊所錄先師語不幸燬于兵然非此無以見道之所存竊懼不傳子楩三人者已恊力命印生重雕之矣敢重以首簡請為序雖然序猶可略也先師事蹟多涉神異狀行者輒諱而不書神異之事大乗者固所不樂聞苟錄以示入道之士亦足以起其正信初何傷乎願併識之序中予不敢辤𥡴子楩等言公平頂古貌眼光鑠人頷下數髯磔立凛然如雪後孤松坐則挺峙行不旋顧英風逼人凛如也所過之處眾方讙譁如雷聞履聲輒曰端書記來矣噤默如無人賔友相從未嘗與談人間細故舍大法不發一言秉性堅凝確乎不可拔自為大僧至化滅無一夕脫衣而寢其從南屏歸化城受經夏夕啟窗而臥忽一梵僧飛錫而來與談般若樞要亹亹不絕未幾騰空而去虎巖師主雙徑時嘗言道家者流有上章謁帝者其還甚遲因叩之答云為𨕖徑山四十八代住持故天閽久不開爾公正符其數公朝京師夢徑山潭龍君持金匙舉食食公數凡十又八公主法席實十八春秋也公將示滅所剪爪髮留瘞化城幻有庵逮啟視之舍利累累然生矣公之遺事有若此者皆宐補書以見于世不可略也葢公道契佛祖名震華夏誠堪輿間氣之所鍾其祥應之至亦出自然非苟涉于神恠者比也文獻所謂門庭之盛規重矩疊法雷普震裂地轟天文靖所謂譬諸名藩鎮以宿將隱然持重風霆不驚握機行令舒卷自由足以使方城連戍有所仰放不敢踰越其言誠不誣哉濂何敢復賛一辭頗念文靖之學粗聞而知之又執弟子之役於文獻之門者最久於是勦其緒論重申之如此嗚呼公之四會語其尚假濂文以傳之哉子楩字用堂惠明字性源祖闡字仲猷皆設化一方黑白咸皈仰云徑山愚庵禪師四會語序宋濂或問于濂曰世間至大者何物也曰天與地也曰至明者又何物也曰日與月也曰然則佛法亦明且大也其與天地日月竝乎曰非然也曰其義何居曰天地日月寓乎形者也形則有成壞有限量雖百億妙高山中涵百億兩曜百億四天下以至於恒河沙數皆有窮也皆有止也此無他囿乎物者也若如來大法則不然既無體叚又無方所吾不為成孰能為之壞吾不為後孰能為之先吾不能為之下孰能為之上𦬆乎忽乎曠乎漠乎微妙而圓通乎其小無內其大無外真如獨露無非道者所以超乎天地之外出乎日月之上大而至于不可象斯為大矣明而至于不可名斯為明矣是故以有情言之則四聖以至六凡或覺或迷佛法無乎不具也以無情言之則火水土石與彼草木或洪或纖佛法無乎不在也三乗十二分教不能盡宣也八萬四千塵勞門不能𣑱汙也嗚呼罄徂徠之松以為煤斷淇園之竹以為管其能盡賛頌之美乎然而佛法固明且大也其靈明之在人者萬劫雖遠不離當念一念不立即證菩提亦在夫自勉之而已濂雖不敏每遇學佛者喜談而樂道之初不以其證入淺深而有間其意頗有見于斯也徑山住持以中禪師名智及學徒尊之號曰愚庵俗姓某世居姑蘓得法於元叟端公歷住隆教普慈二剎帝師錫以明辯正宗廣慧禪師之號已而陞淨慈遂主徑山四據高座敷揚佛法以聳人天龍鬼之聽緇素相從如雲歸岫其弟子某會粹成書介吾友用堂楩公請文以題其首濂懸燈而疾讀之其解人膠纏如鷹脫絛鏇摩雲而奮飛也其方便為人如慈母愛子一步而三顧也其宏機密用如大將臨陣旗皷動而矢石集也誠一代之宗師而有德有言者歟雖不二門中一法不存何况于言覽者當求禪師言外之意使意見兩忘而忘忘亦忘方近道矣嗚呼佛法超乎天地之外出乎日月之上豈細故哉人患不求之爾今極其賛頌而書于此錄之端實欲起人之敬信也繪畵虛空非愚則惑濂葢無以逃其責矣送月江淨禪師住持徑山寺貝秦國子司業金華人自古沙門雖息欲歸于無為而好與賢士大夫游何也葢其人乃世之頴敏慤愿者假浮屠之名以為高託文章之流以為勝如道安於鑿齒慧遠于元亮道林于居易文暢于退之宗元彼尊竺土之法此服先王之教二者固未嘗不相侔而賢士大夫亦樂與之游浸滛乎恬淡枯寂之境也月江淨禪師頎身偉貌德本宿植覺由性禀以真乗法印叅儒典竝用默而能融辯而不肆所著詩文皆有足觀尤以接物利生為己任總司聞其賢舉公授徑山住持夫徑山天下首剎唐代宗朝國一欽禪師為開山第一祖得其傳為大慧杲杲傳佛照光光傳妙峰善善傳藏叟珎珎傳元叟端端傳靈隱幻隱明明傳正庵誾淨師乃正庵法子也往時翰林侍講王公時彥在祕閣纂修少師姚公實總其事二公論及東南名僧淨師亦居其一師推悟理而信故于孔氏之學習而不懈釋氏之教行而不怠雖小戒律如踐青折萌盥手泛席之類未嘗放心是故異夫縱誕譎亂假託之所為者焉觀少師姚公所𢰅重修記春坊大學士曾公靈徴記則淨師之歷職功行賢士大夫之敬禮推許從可見矣况徑山與竺乾鷲嶺𪔂峙角立淨師又得正庵嫡傳方今朝廷清明裒崇釋道而淨師躡空驅錫舍筏振塵于五髻凌霄之間說法度人脫去穢累行道化凡超詣覺路興起少林妙喜之家世以擅重于千載之後此香火緣也予雖非退之宗元文章之流可以增高益勝然有鄉曲難忘之情故其行樂為致辭以告于慕道風重文雅好事者云洪熈元年乙巳春三月十有七日重刊鐔津文集後序琇禪師學有及物之功文為載道之器學而不能利乎物徒學也文而不能衍乎道空文也若夫推其道發于文章肆其學以援斯人宋明教嵩禪師其人歟嗟夫吾佛之教法心法也生靈同而有焉但為虛𡚶所蔽不能顯現汩四生淪六𧼈何由得已哉而吾佛愍之以此心法隨噐而諭俾各得乎本有或者不仰恩懷德反生譏毁是則自毁其心非毁其教法也教中所謂世智辨聰八難之一且不信而毁又為虛𡚶所蔽若虛𡚶所蔽或能了𡚶即真不信而毁則自昧其心猶種之敗芽之焦不復有發生之日矣得不尤可愍哉而明教性禀生知能體佛意學則必欲援世非徒學也文則必在明道非空文也况是時天下學士宗韓氏以拒我故勸書原教諸文不得不作焉學者總梓號鐔津文集斯文行世真救世明道之要術也可一日而無哉舊版湮沒人皆痛惜嘉禾天寧首座天全叡公乃東海慧眼弘辨禪師之弟子施衣資重梓流行其亦明教之心也歟板既成請敘其後蒙晚生讀其文集有不得執筆從游之歎今獲厠名于後不亦大幸乎不亦大幸乎此六十二代祖師琇公𢰅文也舊誌第載其倚杖而逝未詳說法因存此文以表其一班云癡絕禪師語錄序尤𤋾號木石錫山人徑山癡絕禪師既示寂其徒了源以師平生提唱語一編示錫山尤𤋾曰子知吾師者盍為敘引以傳余晚識師得其數語受用因不復辭余觀近世尊宿語錄多成窠臼惟癡絕師獨較些子蓋其得處超軼用處灑落故平生室中不許人下語專以此着羅龍打鳳而學者鮮能凑泊門庭高峻屹然宗匠之靈光今也則亾徒存劒迹非其種草孰識苦心必有護持流通久遠矣淳祐辛亥端午日序贈一清和尚住徑山禪寺序張益蘇州人修𢰅杭之徑山禪寺住持虛席僧錄以為兹寺乃五山之首補厥處者非戒行學業敻出于其眾者不可於是加慎擇之而得一清天上人焉右街善世兩庵宗師即舉之于禮部上人領劄南行中外士夫需言為贈上人生江右文獻之邦為名家子自幼學出世法于廬陵邑之多寶寺正宗和尚實為厥師上人根性堅利志力勤篤遂能因師之教悟玄義于雜花視師之行絕三業于滿分既而觀光上國復承指授於僧錄右街覺義雲海和尚獲掌藏鑰于弘慈普應禪師前天界住山會中正統初得古剎廢址于都城西山之麓慨然有興復之志由是罄鬻衣資并募眾緣度工庀材招提是建事聞于朝得賜額曰弘慶禪寺而上人遂為開山第一代住持兹之膺薦而有徑山之行也得不由其行業之素著千人乎予聞徑山眾靈所萃五峰高聳乃國一欽禪師卓錫之地自唐至今歷世已久自國一以來相續而主兹席者蓋六十有餘人矣上人當視其行業與己何如哉同其所同而勉其所未至俾列名于諸師之間人將指而議之曰此可為徑山之賢住持也此可以振後而光前也則上人之所得者不既多乎是用書而贈之徑山集序李照宋叅軍天下山水奇秀則吳越稱首越則有天台四明為尚吳則有天目居最徑山乃天目東北峰比諸峰又復奇勝其頂則五峰周抱中有平地實洞天耳承天禪院居北焉余聞是山是寺之名久矣大中祥符辛亥奉命司憲于郡日無清暇故莫遂訪焉今年孟夏既獲美代心腑清適有命駕之興快疇昔之素俄至于是見其峰巒勝異草木鮮瑩基構高下甍檐縈帶非丹青之可狀非詠歌之可記乃問諸僧開山之事始先賢之靈迹其說頗駭人之耳焉再徴其據乃得石碑數片舊錄一卷考其事實得諸僧之說半焉而又乗筆者記述事迹或得前而遺後或得後而遺前觀之者莫能盡見始末之實余惜此山之奇絕高先賢之茂行痛其郡記錯雜難盡行于世使好事者不能傳之乃命筆總集其事使終始一貫前後無失然其事得於古石者存之傳于人口者勿載欲後之見者不復疑焉重刻徑山集序方壹凡集之歆慕於當時而傳於不朽者非以其迹以其實跡無實罔以徴實無迹終莫能廢故古之聖賢所遺之墳索詩書易春秋禮樂以至百家子史等籍皆燦然千古猶一日也何哉以其有實之可以垂教萬世而為法於天下耳我宗門自竺乾七佛迨於六祖以及千七百家咸有經論篇章敷宣無量妙義以顯示真宗故自周抵今之喆聖明王公卿大夫士往往尊崇之不替而與孔孟之道偕存者蓋亦以其實之有在也徑山名列天下道塲之首豈以山盤踞之奥勝與遺蹟之繁夥也邪實由于唐之開山國一欽公與無上宗公法濟諲公之廿數等皆以性地朗徹法境晶瑩其衜足以當代宗皇帝之諸聖眷佇欽承歷朝之羣公企仰禮下而可垂教為法于後世耳暨是涉五代屆趙宋而大慧杲公者相繼輩出又且二三十許員皆雷轟電掣獅吼象驟誠謂古佛現真宗迭顯者也故宋帝孝宗屢賜璽翰及御製真讃以嘉賚之鉅公如魏國張浚丞相張商英侍郎張九成之諸賢達前後相叅叩承事而弗斁抑又豈非以其實之所召與是故道塲居稱天下第一固無忝於徑山矣世欲考見已上諸家之實其玄猷玅旨備載五燈會元條然可討攟摭浩繁兹弗克悉綴至欲求訪往古事跡則必身臨于境自可槩得耳以跡以實惟世之君子取之焉是集舊有刻本歷年兹久書亾板廢有日矣今年首春寺主僧嘗董治樓殿諸冗事者正璠也慮其愈久而愈失之薦至無所從考也乃搜厥殘冊斷編聚鉢資倩工依抄本重繕刻之以𦖂存其故住持自唐國一祖師至此共凡八十代梓既訖持一本示余請以序弁諸端余即展以閱之見其中間魯魚亥豕者屢出余顧謂之曰曷為若是璠曰板失罔所據證之也又祖上之遺籍後人莫敢妄為之臧否耳姑從其敝為是余遂廼弗再詰而撮其略與為之序其傳互之故葢白璧蝇玷也從來既遠咎靡所質矣幸大方觀者抉其梗概而遺其譌繆付之以輾然一笑云爾重刻五燈會元募緣文陸光祖夫佛道東流而至晉宋齊梁之間學佛者競以名理禪觀相高莫竟本心妙明之體自達磨大士來至此方始唱直指人心見性成佛傳至六祖能公斯宗大振厥後五宗竝立門風峻甚其圓機密義不可以隨言而解用智而求至於揚瞬目或喝或棒所以闡呈真體愈出愈奇有省者若痛處喫拳不會者如聾人聞鼓而膚識之士乃或病其難通訾其詭異葢由鈍根之無入則謂聖言之有隱大抵然也然開元之後宗教大明上至旒冕簪貂下及販樵孺婦往往能響答玄言刃游道妙當斯時也見性知心超凡入聖上下數百年內先後幾千萬人自兩儀分奠以來未有若斯之盛者何儒門淡泊寥寥如此釋教流通林林如彼其故何歟良以道䘮多岐智分穿鑿仲尼沒而時乎不再顏淵死而今也則無官失而求之四夷學絕而傳諸方外一晦一明有由然矣至宋巨儒周元公程伯子乃能旁尋墜緒密闡心宗伯子嘆曰我於天壤之間直自孤立伊川晚閱內典遇異人始明此學考亭暮年亦曰達磨盡飜窠臼尤為高妙乃知齊佛老為異端非程朱之定論也由是言之維釋與儒自唐及宋曄然其兩盛矣自兹而降去聖時遙儒昧通方釋拘義學由是西來妙旨東土希聲所幸教外之單傳具載傳燈之五錄濟禪師以其書浩博撮為會元斯固莊生所譏聖人已往而糟粕徒存焉者然而求道之人有能因言筌窮理窟玩其要妙言嚼其無義語日由繹之夕鑚剔之忽焉而鋸窮木斷水到渠成所謂因指以見月假筏而渡海亦易易焉則是此土此書之不可一日無矣近者書殘板燬教末風微有徑山大慈上人苦行薰修發心弘濟欲復募緣刻梓以惠後人不遠千里而來謀因乞一言而為倡賤子幼慕神仙每符瑞夢既聞魯訓知反求於六經載遇竺墳時泛觀乎三藏稍能通其一貫會其殊塗秪自討論無誰告語嗟乎五千退席憫增慢之難移四十無聞嗟寓形之易盡願與同懷之士共成得道之因敢以此書請同戮力昔在先覺有聞半偈而明心或識二字而證果矧二十卷之活句誠百千劫之奇逢入此法門皆當作佛儻有通微俊彥慧徹高賢盡捨牀頭阿堵物成就世間希有事開來而繼往亦自度而度人不亦偉與幸無膠泥曲儒談曰非吾孔氏之書也徑山志序釋德清憨山域內名山大川方輿載籍志之詳矣不志則無所考其源流窮其窈眇探其靈勝故使覽者披圖了然若身履其間謂之臥游豈徒說哉及佛法入中國則琳宮梵宇皆托跡于名山勝槩者在在星羅此葢道脉潜流殊非探奇仰異者比古稱方志為野史而佛法之志則僧史也苟無所考究則何以遡法界之真源乎維雙徑乃東南奇勝昔稱法窟况自國一開山固多靈異以其山自崑崙面東走雄峙五嶽而南幹自衡湘迤邐馳數千里直聳黃山白嶽而飛涌二目融結兹山以鍾靈秀故佛剎始創唐大曆年間而歷宋元我明上下千載其間相繼雄長法門者八十一人非山川蘊結之厚又何能若是之悠且久耶國初尚不乏人頃百年來法幢傾圮殿宇隳頺而僧徒寂寥萬曆己丑間達觀禪師蹶起立宗門赤幟海內由是知有人焉時創刻方冊大藏初議五臺而兹山僧徒蠒足數千里往請于此未幾而果遷于山之寂照而殿宇亦因是以重新乃法輪再轉之機也居頃之馮太史復議啟古化城為藏板地適直當道藩臬諸公有深心者竟恢復之達師入滅弟子𣽃居鎧公克荷其業而達師竟得塔於鵬搏峰下與大慧同條是豈小緣哉然昔之住兹山者雖善揚宗乗但引法海之一滴耳今則全攝如來藏海而注於兹為法門之全提則因緣勝前萬萬矣黃貞父有言蕭何入關子女玉帛秋毫無犯唯收其圖籍卒以王漢今大藏乃法界之圖籍也今盡收於此而拓法王之疆土者必大賴於是矣非此山之鍾氣博厚又何能負重法哉嗚呼因修者易創業者難今中興法門之大業非圖籍斑斑後世將何以考焉是徑山之志不得不作而開疆拓土重在元勳同為休戚始終者則鎧公不得不秉深心焉其事已承餘杭令公戴君入邑志於此所關者大非徒紀勝而已故重輯之以便一家觀覽予特為之序此憨公于萬曆丙辰過徑山作也時澹居鎧公擬輯志而預索其序志未成而序畱化城因錄之以見兩公夙志云化陽和王捨田疏了明禪師天下真勝境烟雲古寶剎徑山三千口每人三寸舌都來九十丈誰能與渠接水食滄溟乾粥飯斛斗竭油鹽許多般蔬菜更羅列百事摠艱難一身當不迭特來謁郡王故意丁寧說冷處着把火大家相暖𤍠兩堂坐禪僧真箇修行徹心源湛如水脊梁硬如鐵等心供養渠因果豈虛設福慧自莊嚴共出輪廻劫大根大行大財主捨田一萬三千畒歸依徑山供眾僧飽暖安然度寒暑兩堂衲子欣欣然高談慷慨賢中賢願君福壽等山川留與聲名萬古傳偈云做事須還烈漢拈起筆來便判若要功果完成切莫前思後筭題傳衣庵緣冊陸光祖嘉靖己未秋余與先學憲君從千松得禪師之請為修徑山傳衣庵則萬松林禪師靈塔在焉葢宋紹定癸巳無凖範大師奉詔住山即後山搆菴匾曰傳衣用黃梅付法之義萬松則無凖範十一世法嗣也自修菴以來又曆三十五歲而千松復化去矣菴僧性悟徒海耀悟者余族姪也欲修葺頺弊稍復舊觀謹撮其始末題之緣冊俾持以謁大方君子有所取徴焉徑山重建大殿募緣疏沈季文惟雙徑者震旦名山江南勝地自國一開山首演牛頭之旨逮鑒宗繼軌兼宏馬祖之宗大慧杲師振玄風於宋世元叟端師展頓教于元時迄於昭代世不乏傳祖祖相沿䋲䋲不絕登壇秉拂嗣法傳燈者八十一人入室投機悟道超凡者莫紀其數用是道以時隆地因人重虛空幻出樓閣荊棘俄成寶坊梵剎嵯峨恍疑兠率之宮從中天而下法堂清閟婉若祗園精舍自西竺移來乃今祖道凌夷宮殿傾廢昔以狐兎窟宅頓化琳瑯今以佛祖道塲幾淪墟莽撫今追昔寧已懷思兹有無邊上人者戒行精嚴願輪深廣覩此頺圮實切拊髀葢往曾于祖師會下發心故今于人天眾前立誓願殚一生精力拮据經營顧興衰起廢匪孑力所能而鳩工集材實眾檀是籍將廣募有緣以共襄勝事况此名區神龍不難于捨宅矧兹盛舉賢碩豈憚于捐貲伏願深心大士宏力高流各隨心願盡力莊嚴則黃金布地何必讓于昔賢而寶殿崇成自頓還乎舊觀豈惟既往與八十一祖廣結無上淨緣抑且將來為百千萬人助成出世道果謹疏徑山佛殿緣起釋真可達觀禪師雙徑冠世絕境也自崑崙南來翱翔萬里越天目而逶迤隱隱隆隆雄雌萬狀勢方奔舞直趋東溟而雙溪一阻則英靈秀傑之氣回而氤氳盤薄怒拔于五峰之間世為龍象窟宅自唐國一欽祖開山乃至宋大慧杲禪師傳心如貫珠燈燈相續以迄于今則去聖彌遠世與道䘮僧不能轉俗更為俗轉矣夫經曰若能轉物即同如來今不能轉俗竟為俗轉豈非現成肉佛自作眾生嗚呼一心不生凡聖路斷一微涉動𣑱淨俄分即此而觀眾生諸佛初無差別了悟者夢覺都除未了悟者不惟於無夢中作夢更於大夢中强為己覺殊可嘆耳昔佛經行時俄指曰此地可建一梵剎帝釋信手拈一莖草插已曰建剎竟比幻居講主作徑山僧引進導師不遠千里來曲阿見老漢曰徑山眾上人某曾引渠䟦涉燕山請開藏主并祈旁鼓修殿嚴像藏主已諾會病未至蒙大師代以幻余本公今復遷化則向求所舉似同說夢故某與眾僧不憚勞勤今更强顏求禮和尚所願不惜彈指震大法雷破眾生癡夢成就如上勝事老漢曰公等此來既不為自己求專為祖道今老漢有轉語舉似公等公等答以相應即夢中說覺覺中說夢恣我舌端無不可者試問帝釋插草建梵剎耶不建梵剎耶建則琳宮寶坊了不現前不建則佛與帝釋兩皆脫空時諸上人俱以默答老漢亦以默領唯喝石巖旁觀不禁向老漢曰和尚不必拋擲古今廣打葛藤國一大慧鼻孔要與和尚不別道開法本雖皆夢中承當和尚大須覺中著到管取徑山大雄寶殿剎那成就諸祖殘棋移星換斗唯時王內翰于比部只解順水推船不能逆風把柁攛掇喝石生兒并諸現前黑白大眾擎跽而請唯願和尚發大慈悲勿孤負喝石亦令某等各各願滿噫雙徑五峰江海秀瀨陽江徹影重重相逢若問誰家曲管取聲聲落眼中議復化城緣引馮夢禎字開之南京祭酒刻經之緣始於清涼之妙德庵地寒而峻遠役南匠轉輸工力倍費功半不得已而有徑山之遷徑山為東天目正幹五峰攅廻中開佛界我東南勝道塲無逾此而雲霧籠罩十日而九藏板其中最易朽腐又不得已而有化城之議化城踞徑山之東麓去雙溪數里地坦平無雲霧既便藏板而輸工力事事皆宐因故址而新之先為屋十間令足以安經板處工匠而化役徐俟其後似無甚難舉今約同志以十緣倡之緣五十緡禎雖貧勉任一緣夫刻經大役自北而南而其南也又自徑山而化城三徙而後定而任事之人始于密藏繼於幻予而終之者又未卜何人也因緣時節惟佛與佛乃能究盡而自剏緣以至未來凡于此事曾捨一錢半銖及一手一足之力已上福不唐捐直至成佛而吾等與焉豈不幸甚題重興化城接待寺疏吳用先字體中薊遼總督余從紫栢尊者游逾二十載所承鉗鎚錐劄罔所不至通身𤍠汗不知透出幾畨矣末後以流通佛法付囑不佞唯唯徼天之倖承乏越中即悉心殫力求刻藏之役兹功已過半緣成或有日矣乃謀藏板善地卜及化城化城故宋佛日禪師宣公所剏接待寺郎官楊汝明記之甚詳見徑山集中及我朝而香火猶盛漸次凌夷僧徒凋落遂以寺田轉佃於方姓者轉轉相侵盡為居隣所剝蝕矣然其徑尚存化城巷之名至今在人口今年𣽃居上人圖恢復之而鄉紳王中泉公首倡義舉願以其地歸寺于是左右聞風者響應乃𣽃居猶運慈心量其多寡各給其直余于吳下諸君子恊濟之雖未盡復舊址從此誅茅建剎亦幾可觀矣然此非今日創議也葢自馮開之司成始矣而余又不知司成之原有此議也一日𣽃公過余持開之手卷見示謂偶從密藏棄篋中檢得之余展閱疏引即向時與藏公所謀卜化城以厝經板者也噫奇哉司成住矣謀于十數載之前而余與𣽃公成于十數載之後不約而合無心而成九原可作當為鼓掌第勝地既復梵宇𪔂新向後更有許多商量不無藉十方大檀之力余小子亦不敢不賈勇從事道化重興法輪當轉誓頭目腦髓之不恤而遑恤其他時萬曆辛亥歲浴佛日重興化城寺疏黃汝亨昔楚漢相距約曰先入關中者王之迢漢入咸陽諸將競取子女玉帛蕭何獨收秦圖籍以此知天下戶口山川要害之處然則大藏固佛祖之圖籍而天下之名山勝境固法嗣聖僧之關中也此藏經板不可以無刻而化城寺在雙溪踞徑山之東有林木而無雲霧作經笥工署甚善寺故宋佛日禪師宣公所剏為接待所不可以久就堙滅方伯體中吳公本經世人負出世力以𣽃居禪師淨心湛智足以任此遂欣然與化導經營漸次恢復其地先以厝置經板而徐議誅茆建剎𪔂新佛日之業佛寶法寶才施法施可謂一舉兩得片刻千古者矣而澹公復從棄篋中得勸緣一疏亦為藏經名剎經始此地葢馮司成開之與密藏禪師起緣于十數載之前者也嗟乎一真必應靈山同會司成之後有方伯而密藏之後有澹居誰為為之豈非道念之合符凡聖之證印者哉而腐生侶理以拒真慳人據欲而成鄙棄經言於草莽委佛地于荊榛將令楚王不入關而取子女玉帛者之出圖籍上乎亦慈氏之所大愍矣嗟乎昌𥠖有言怠者不能修忌者畏人修守虜殞軀永隔聖路假令去腐破慳振怠銷忌知身外之皆長物而性中之有覺塲則方伯不云乎頭目腦髓之不恤而遑恤其他世間善信人必當踊躍應緣大者牛車小者蚊負不患資糧之不給勝事之不成不佞亨即貧士乎亦願以螳臂當轍涓滴輸海也募植松杉引釋廣印聞谷禪師栽松道者曰亭亭三尺餘欝欝覆荒草不知何代人得見此松老古人之為山門何意味深長也是山先有大池龍神主之百萬松杉欝蒼深秀而樵者不敢犯焉李唐天寶間有國一禪師自寉林來巖居穴處為法亾軀神以師道大德備即獻池居師復化堂于池上池尋涸遂成伽藍相承住持者八十七人雄殿傑閣奕世莊嚴至萬曆間大殿傾圮唯妙喜塔龍王祠僅存焉中吳居士沈太素公布金重建落成于三十六年戊申然貿材千里之外道經揚子孟河材幾失人幾䘮予聞艱苦為之涕零及至雙溪驟雨溪漲隨流飄入丘陵蓁莽間轉運登山費將十倍于材矣念兹䟦涉安得不預為之計耶遂同桂庭上人恭𡭊龍神立誓募緣置買本寺佳山四十畒栽植柳杉五千柯諒過五六十年可成梁棟矣山高霧重殿宇不堅他日或修或造材木資于本山何其易哉噫今之視後雖世殊事異其難易可知後之視今雖不見其人見其心亦將有感於栽松道者題化城慈門師募齋僧緣疏宋奎光余嘗謂恢復難而守成則尤難昔光武以帝胄起誅簒莽非不稱一代中興令主顧永平之政綜核操切殊甚向非章帝長者每事務從寛厚以矯枉救獘則東京之業衰矣嗟乎守成豈易言哉化城故宋宣禪師道塲正德間為居民簒據𣽃居毅然為請復之舉徒眾未免雜霸以故故址雖復而人心未必盡悅去冬澹居化去難其主者本石吳先生為請慈門住此葢先是慈門以化城無佛自吾虞山裝造大佛一尊供此已是化城第一功臣論功禪位法應慈門而復德噐冲和正如東漢所謂慈祥賢君可與更化者其為化城靈長可知矣顧化城舊以接待得名即今為往禮徑山者必由之路二時飯食慈門不能為無米之炊也則不得不仰給于十方善乎貞父黃先生之言曰天下名山佛之關中大藏佛之圖籍也今得化城為置藏之地則既奄有關中并獲圖籍矣至于轉輸運粟端在信施即今朝魚暮梵且不能宿飽則重繭而來者枵然待食可知佛說六波羅密檀施為先眾生三毒輪廻破慳第一矧人命無常一息不繼都為長物何不以有待之資作無盡之福伏願十方信心念化城正中興之候轉輸值告急之秋隨力隨心普為運濟則恢復功臣不獨𣽃居與慈門已也試觀雲水駢集禪悅飽滿回向信施因果昭然當必以吾言為不妄者因為題其冊云西方合論標註䟦喝石如奇寒灰往予攜郢中張明教叅訪袁中郎先生一日出西方合論相視予驚歎其禪土合源超絕樂邦諸典從中有未甚了解者隨請質先生命明教標註其首及持歸南中每欲梓以度世而未就也歲己未海虞瞿元初終後遺法財見施予即就其靈前許刻經十卷薦其往生適從吳門瑞光臥病為憶前願因檢付袁無涯重為詮次讐校而屬吾徒性成董其役一以報袁先生法施之恩一以了瞿元初施財之願至於𢰅述之精詳議論之卓越是以明眼者自得之耳予復何贅卷之五目錄序文募刻大藏疏文釋真可募刻大藏文釋道開刻大藏緣起馮夢禎又陸光祖贈幻于密藏二上人刻大藏序陳瓚刻大藏緣起序王世貞又汪道昆刻藏緣起述曾乾亨募刻大藏唱導文瞿汝稷又傅光宅又于玉立又虞淳熈又管志道又張壽朋宋文憲公護法錄序錢謙益題無生募鑄鐵瓦文釋傳如又沈㴶又沈演又黃汝亨又文震孟又錢謙益又周祗化城寺迎佛飯僧緣疏錢謙益安樂寺募建殿堂及供单緣起王在公安樂寺重建禪堂疏錢謙益募建普慶福田寺疏宋奎光書一輪禪師徑山結庵卷陳繼儒題無從禪師徑草李縠全室外集序朱右又王達徑山節要引倪瑗徑山節要䟦文苪題無從禪師徑草宋奎光
